<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ball Fight Korea Inspired Simulator</title>
  <style>
    :root {
      --bg-1: #08111f;
      --bg-2: #13233f;
      --panel: rgba(7, 14, 26, 0.76);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #f4f7fb;
      --muted: #9fb2cb;
      --accent: #ffb84c;
      --accent-2: #59d6ff;
      --danger: #ff6b81;
      --success: #6df7b1;
      --arena: #0f1a2e;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Bahnschrift", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(89, 214, 255, 0.22), transparent 34%),
        radial-gradient(circle at 80% 20%, rgba(255, 184, 76, 0.22), transparent 30%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: 0.2;
      pointer-events: none;
    }

    .app {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
      position: relative;
      z-index: 1;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      align-items: stretch;
      margin-bottom: 20px;
    }

    .title-panel,
    .status-panel,
    .roster-panel,
    .log-panel {
      border: 1px solid var(--panel-border);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: 24px;
    }

    .title-panel {
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .title-panel::after {
      content: "";
      position: absolute;
      inset: auto -10% -28% auto;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(255, 184, 76, 0.35), transparent 66%);
      filter: blur(6px);
    }

    .eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent-2);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 4vw, 4.3rem);
      line-height: 0.94;
      letter-spacing: -0.04em;
      max-width: 10ch;
    }

    .subtitle {
      margin: 18px 0 0;
      max-width: 58ch;
      color: var(--muted);
      line-height: 1.55;
      font-size: 1rem;
    }

    .status-panel {
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }

    .status-badge {
      align-self: flex-start;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(109, 247, 177, 0.12);
      color: var(--success);
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid rgba(109, 247, 177, 0.22);
    }

    .matchup {
      font-size: clamp(1.8rem, 2vw, 2.6rem);
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .matchup small {
      display: block;
      margin-top: 10px;
      font-size: 0.92rem;
      color: var(--muted);
      letter-spacing: 0.02em;
      font-weight: 500;
    }

    .control-button {
      appearance: none;
      border: none;
      border-radius: 18px;
      padding: 16px 22px;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      color: #07111b;
      cursor: pointer;
      background:
        linear-gradient(135deg, #ffe07e, var(--accent)),
        linear-gradient(135deg, var(--accent), #ff9b6a);
      box-shadow: 0 14px 32px rgba(255, 184, 76, 0.34);
      transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
    }

    .control-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 20px 38px rgba(255, 184, 76, 0.42);
    }

    .control-button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .battle-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 20px;
    }

    .arena-shell {
      position: relative;
      border-radius: 30px;
      padding: 16px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: var(--shadow);
    }

    .arena {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      border-radius: 24px;
      background:
        radial-gradient(circle at center, rgba(89, 214, 255, 0.08), transparent 45%),
        linear-gradient(180deg, #13203a, var(--arena));
    }

    .overlay {
      position: absolute;
      inset: 16px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transition: opacity 300ms ease, transform 300ms ease;
      opacity: 0;
      transform: scale(0.96);
      background: radial-gradient(circle at center, rgba(0, 0, 0, 0.54), rgba(0, 0, 0, 0.78));
    }

    .overlay.visible {
      opacity: 1;
      transform: scale(1);
    }

    .overlay-card {
      text-align: center;
      padding: 28px 32px;
    }

    .overlay-card span {
      display: block;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.32em;
      color: var(--accent-2);
      margin-bottom: 14px;
    }

    .overlay-card strong {
      display: block;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: -0.05em;
    }

    .overlay-card p {
      margin: 12px 0 0;
      color: var(--muted);
    }

    .roster-panel {
      padding: 20px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .panel-title span {
      font-size: 0.8rem;
      color: var(--accent-2);
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .fighter-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: grid;
      gap: 10px;
      transition: border-color 180ms ease, transform 180ms ease, background 180ms ease;
    }

    .fighter-card.active {
      border-color: rgba(255, 184, 76, 0.45);
      background: rgba(255, 184, 76, 0.09);
      transform: translateY(-2px);
    }

    .fighter-head {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .fighter-token {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.22);
      box-shadow: inset 0 0 16px rgba(255, 255, 255, 0.22);
      flex: 0 0 auto;
    }

    .fighter-meta strong {
      display: block;
      font-size: 1rem;
    }

    .fighter-meta span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .fighter-description {
      margin: 0;
      color: #d4deed;
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .hp-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    .hp-fill {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      transition: width 140ms linear;
    }

    .log-panel {
      padding: 18px 20px 20px;
      margin-top: 20px;
    }

    .log-list {
      list-style: none;
      margin: 14px 0 0;
      padding: 0;
      display: grid;
      gap: 10px;
      max-height: 220px;
      overflow: auto;
    }

    .log-list li {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      color: #d9e4f3;
      line-height: 1.45;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .legend span {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    @media (max-width: 940px) {
      .hero,
      .battle-layout {
        grid-template-columns: 1fr;
      }

      .app {
        width: min(100vw - 20px, 1180px);
        padding-top: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }

    body {
      overflow: hidden;
      background: #d9d9d9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      display: none;
    }

    .app {
      width: 100vw;
      height: 100vh;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-frame {
      width: min(100vw - 4px, 1180px);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .battle-stage {
      width: min(calc(100vw - 292px), calc(100vh - 164px), 852px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 5px;
      align-items: stretch;
    }

    .top-bar {
      border: 3px solid #202020;
      background: #28c84e;
      color: #ffffff;
      min-height: 38px;
      display: grid;
      gap: 2px;
      align-items: center;
      justify-items: center;
      padding: 3px 9px;
      box-shadow: none;
    }

    .top-bar.overtime {
      background: linear-gradient(90deg, #ff3d00, #ffb300, #ff3d00);
      animation: overtimePulse 650ms ease-in-out infinite alternate;
    }

    .top-bar.result {
      background: #28c84e;
      animation: none;
    }

    @keyframes overtimePulse {
      from {
        filter: saturate(1);
      }
      to {
        filter: saturate(1.45) brightness(1.08);
      }
    }

    .top-bar .status-badge {
      background: transparent;
      border: 0;
      color: rgba(255, 255, 255, 0.86);
      padding: 0;
      font-size: 0.74rem;
      letter-spacing: 0.16em;
    }

    .top-bar .matchup {
      font-size: 0.88rem;
      letter-spacing: 0.01em;
      text-align: center;
      line-height: 1.04;
    }

    .top-bar .matchup small {
      color: rgba(255, 255, 255, 0.84);
      margin-top: 2px;
      font-size: 0.72rem;
    }

    .arena-shell {
      padding: 0;
      border-radius: 0;
      background: #ffffff;
      border: 4px solid #202020;
      box-shadow: none;
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }

    .arena {
      aspect-ratio: 1 / 1;
      background: #ffffff;
      border-radius: 0;
    }

    .overlay {
      inset: 0;
      border-radius: 0;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(2px);
    }

    .overlay-card span {
      color: #111111;
      letter-spacing: 0.18em;
      font-weight: 700;
    }

    .overlay-card strong {
      color: #111111;
      text-shadow: none;
      font-size: clamp(2rem, 8vw, 3.4rem);
    }

    .overlay-card p {
      color: rgba(17, 17, 17, 0.72);
    }

    .control-button {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      min-width: 220px;
      border-radius: 999px;
      background: #ffcb3d;
      box-shadow: none;
      z-index: 2;
    }

    .control-button.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .fighter-strip {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px;
    }

    .fighter-card {
      border-radius: 0;
      border: 3px solid #202020;
      background: #ffffff;
      padding: 5px 7px 6px;
      gap: 4px;
      transform: none;
    }

    .fighter-card.active {
      background: #ffffff;
      border-color: #202020;
      transform: none;
    }

    .fighter-head {
      display: block;
    }

    .fighter-token,
    .fighter-description {
      display: none;
    }

    .fighter-meta strong {
      font-size: 0.92rem;
      color: #222222;
      text-align: center;
      line-height: 1;
    }

    .fighter-meta span {
      margin-top: 2px;
      color: #555555;
      text-align: center;
      font-size: 0.68rem;
    }

    .hp-bar {
      height: 16px;
      border-radius: 0;
      border: 2px solid #202020;
      background: #dcdcdc;
    }

    .hp-fill {
      border-radius: 0;
    }

    .cooldown-wrap {
      display: grid;
      gap: 2px;
    }

    .cooldown-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.64rem;
      color: #4a4a4a;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .cooldown-bar {
      height: 7px;
      border: 2px solid #202020;
      background: #ececec;
    }

    .cooldown-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffa726, #ff6d00);
    }

    .debug-hidden,
    .hero,
    .roster-panel,
    .log-panel {
      display: none !important;
    }

    .tournament-panel {
      width: clamp(236px, 22vw, 286px);
      align-self: center;
      border: 3px solid #202020;
      background: #ffffff;
      color: #202020;
      padding: 8px;
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 8px);
      overflow: hidden;
    }

    .tournament-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding-bottom: 6px;
      border-bottom: 3px solid #202020;
    }

    .tournament-title strong {
      font-size: 0.94rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .tournament-title span {
      font-size: 0.68rem;
      font-weight: 700;
      color: #28a447;
      text-transform: uppercase;
    }

    .bracket {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
      min-height: 0;
    }

    .bracket-round {
      display: grid;
      gap: 7px;
      align-content: center;
    }

    .round-title {
      font-size: 0.62rem;
      font-weight: 800;
      color: #555555;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .bracket-match {
      border: 2px solid #202020;
      background: #f4f4f4;
      min-height: 58px;
      display: grid;
      align-content: center;
      gap: 2px;
      padding: 4px;
      position: relative;
    }

    .bracket-match.active {
      background: #fff2b8;
      box-shadow: inset 0 0 0 2px #ffcb3d;
    }

    .bracket-match.done {
      background: #e9ffef;
    }

    .bracket-match.bye {
      background: #eeeeee;
      color: #777777;
    }

    .bracket-slot {
      min-height: 19px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.68rem;
      font-weight: 800;
      line-height: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .bracket-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 1px solid #202020;
      flex: 0 0 auto;
      background: #d8d8d8;
    }

    .bracket-slot.empty {
      color: #999999;
      font-weight: 700;
    }

    .bracket-slot.winner {
      color: #0a8d32;
    }

    .bracket-status {
      position: absolute;
      right: 4px;
      bottom: 3px;
      font-size: 0.52rem;
      font-weight: 900;
      color: #777777;
      letter-spacing: 0.06em;
    }

    @media (max-width: 760px) {
      .game-frame {
        gap: 4px;
      }

      .tournament-panel {
        width: 178px;
        padding: 5px;
      }

      .battle-stage {
        width: min(calc(100vw - 190px), calc(100vh - 164px), 852px);
      }

      .bracket {
        gap: 4px;
      }

      .bracket-match {
        min-height: 50px;
        padding: 3px;
      }

      .bracket-slot {
        font-size: 0.58rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="game-frame">
    <section class="battle-stage">
      <header class="top-bar">
        <div class="status-badge" id="statusBadge">READY</div>
        <div class="matchup" id="matchupLabel">
          Press Start
          <small>랜덤 대진이 여기 표시됩니다.</small>
        </div>
      </header>

      <section class="arena-shell">
        <canvas class="arena" id="arenaCanvas" width="960" height="960"></canvas>
        <div class="overlay visible" id="overlay">
          <div class="overlay-card">
            <span>Waiting Room</span>
            <strong>START THE FIGHT</strong>
            <p>시작을 누르면 바로 랜덤 자동 전투가 시작됩니다.</p>
          </div>
        </div>
        <button class="control-button" id="startButton" type="button">싸움 시작</button>
      </section>

      <footer class="fighter-strip" id="fighterCards"></footer>
      <div class="debug-hidden"><ul id="battleLog"></ul></div>
    </section>
    <aside class="tournament-panel" aria-label="Tournament bracket">
      <div class="tournament-title">
        <strong>Bracket</strong>
        <span id="tournamentPhase">Ready</span>
      </div>
      <div class="bracket" id="tournamentBracket"></div>
    </aside>
    </section>
  </main>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
