<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ball Fight Korea Inspired Simulator</title>
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <link rel="stylesheet" href="src/styles.css" />
        <style>
            /* Hide Alpine components until compiled */
            [x-cloak] {
                display: none !important;
            }

            /* Loading screen shown before Alpine initializes */
            .app-loading {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #fafafa;
                font-family: "Bahnschrift", "Segoe UI", sans-serif;
            }

            .app-loading__card {
                text-align: center;
            }

            .app-loading__card strong {
                display: block;
                font-size: 1.4rem;
                color: #222222;
                margin-bottom: 8px;
            }

            .app-loading__card span {
                display: block;
                font-size: 0.82rem;
                color: #888888;
                letter-spacing: 0.12em;
                text-transform: uppercase;
            }

            .app-loading__spinner {
                width: 32px;
                height: 32px;
                margin: 0 auto 20px;
                border: 4px solid #e0e0e0;
                border-top-color: #222222;
                border-radius: 50%;
                animation: app-loading-spin 800ms linear infinite;
            }

            @keyframes app-loading-spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
        <link rel="modulepreload" href="src/ui.js" />
        <link rel="modulepreload" href="src/statAllocation.js" />
    </head>
    <body>
        <div id="app-loading" class="app-loading">
            <div class="app-loading__card">
                <div class="app-loading__spinner"></div>
                <strong>Ball Fight Simulator</strong>
                <span>Loading...</span>
            </div>
        </div>

        <main class="app" x-data="appStore" x-cloak>
            <section class="game-frame">
                <section class="battle-stage">
                    <section class="arena-shell">
                        <canvas class="arena" id="arenaCanvas" width="960" height="960"></canvas>

                        <!-- 토스트 알림 -->
                        <div
                            class="toast"
                            x-show="toastVisible"
                            x-transition:enter="toast-enter"
                            x-transition:leave="toast-leave"
                            x-text="toastMessage"
                        ></div>

                        <div
                            class="overlay"
                            id="overlay"
                            x-show="overlayVisible"
                            x-transition:enter="overlay-enter"
                            x-transition:enter-start="overlay-enter-start"
                            x-transition:enter-end="overlay-enter-end"
                            x-transition:leave="overlay-leave"
                            x-transition:leave-start="overlay-leave-start"
                            x-transition:leave-end="overlay-leave-end"
                            x-bind:class="{ transient: overlayTransient }"
                        >
                            <div class="overlay-card">
                                <span x-text="overlayLabel">Waiting Room</span>
                                <strong x-text="overlayText">START THE FIGHT</strong>
                                <p x-show="overlaySubtext" x-text="overlaySubtext"></p>
                                <div
                                    class="xp-reward"
                                    x-show="xpReward.visible"
                                    x-bind:class="{ levelup: xpReward.levelUp }"
                                >
                                    <div class="xp-reward-head">
                                        <span x-text="xpReward.characterName"></span>
                                        <b x-text="'+' + xpReward.xpGained + ' XP'"></b>
                                    </div>
                                    <div class="xp-reward-level">
                                        <strong x-text="xpReward.levelLabel"></strong>
                                        <em x-show="xpReward.levelUp">LEVEL UP</em>
                                    </div>
                                    <div class="xp-bar" aria-hidden="true">
                                        <div
                                            class="xp-bar-fill"
                                            x-bind:style="'width:' + xpReward.animatedProgressPct + '%'"
                                        ></div>
                                    </div>
                                    <div class="xp-reward-foot">
                                        <span x-text="xpReward.progressText"></span>
                                        <span x-text="xpReward.nextText"></span>
                                    </div>
                                    <div
                                        class="xp-reward-next"
                                        x-show="xpReward.nextRewardText"
                                        x-text="'다음 보상 · ' + xpReward.nextRewardText"
                                    ></div>
                                </div>
                            </div>
                        </div>

                        <button
                            class="control-button"
                            id="startButton"
                            type="button"
                            x-bind:class="{ hidden: startHidden }"
                            x-bind:disabled="startDisabled"
                            x-text="startText"
                            @click="$dispatch('start-tournament')"
                        >
                            싸움 시작
                        </button>
                    </section>

                    <footer class="fighter-strip" id="fighterCards">
                        <template x-for="fighter in fighters" :key="fighter.id">
                            <article
                                class="fighter-card"
                                x-bind:class="{ active: !fighter.defeated }"
                                x-bind:data-fighter-id="fighter.id"
                            >
                                <div class="fighter-head">
                                    <div class="fighter-meta">
                                        <strong
                                            x-text="fighter.isPlayer ? '내 캐릭터 · ' + fighter.name : fighter.name"
                                        ></strong>
                                        <span class="fighter-title" x-text="fighter.title"></span>
                                        <span x-text="fighter.isPlayer ? '내 배분' : 'AI 배분'"></span>
                                    </div>
                                </div>
                                <div class="hp-bar">
                                    <div
                                        class="hp-fill"
                                        x-bind:style="'background:' + fighter.color + ';width:' + fighter.hpPct + '%' + (fighter.defeated ? ';opacity:0.3' : '')"
                                    ></div>
                                </div>
                                <div class="fighter-hp-text">
                                    <span x-text="fighter.hp + ' / ' + fighter.maxHp"></span>
                                </div>
                                <div class="fighter-stat-line" x-bind:class="{ 'hero-stat-line': fighter.isHero }">
                                    <span x-show="!fighter.isHero" x-text="fighter.statLine"></span>
                                    <span class="hero-stat-parts" x-show="fighter.isHero">
                                        <template x-for="part in fighter.heroStatParts" :key="part.key">
                                            <span class="hero-stat-part">
                                                <span x-text="part.baseText"></span
                                                ><span
                                                    class="hero-stat-bonus"
                                                    x-show="part.bonusText"
                                                    x-text="part.bonusText"
                                                    x-bind:style="'color:' + part.color"
                                                ></span>
                                            </span>
                                        </template>
                                    </span>
                                    <span
                                        class="fighter-balance-mult"
                                        x-text="'×' + fighter.balanceMult.toFixed(3)"
                                    ></span>
                                </div>
                                <div class="cooldown-wrap">
                                    <div class="cooldown-meta">
                                        <span class="cooldown-label" x-text="fighter.skillLabel">Skill</span>
                                        <span class="cooldown-text" x-text="fighter.skillText">Ready</span>
                                        <span
                                            class="action-badge"
                                            x-show="fighter.actionName"
                                            x-text="fighter.actionName"
                                        ></span>
                                    </div>
                                    <div class="cooldown-bar">
                                        <div
                                            class="cooldown-fill"
                                            x-bind:style="'width:' + (fighter.skillPct * 100) + '%' + (fighter.defeated ? ';opacity:0.35' : '')"
                                        ></div>
                                    </div>
                                </div>
                            </article>
                        </template>
                    </footer>

                    <div>
                        <ul id="battleLog">
                            <template x-for="(item, index) in logItems" :key="index">
                                <li x-text="item"></li>
                            </template>
                        </ul>
                    </div>
                </section>

                <aside
                    class="tournament-panel"
                    id="tournamentPanel"
                    aria-label="Tournament bracket"
                    x-bind:class="{ 'setup-hidden': !tournamentActive }"
                >
                    <div class="tournament-title">
                        <strong>Bracket</strong>
                        <span id="tournamentPhase" x-text="tournamentPhase">Ready</span>
                    </div>

                    <section class="player-panel" id="playerPanel" x-bind:class="{ locked: locked }">
                        <div class="player-panel-actions" aria-label="보조 메뉴">
                            <button class="help-icon" type="button" title="게임 도움말" @click="$dispatch('open-help')">
                                ?
                            </button>
                            <button
                                class="collection-icon"
                                type="button"
                                title="컬렉션"
                                aria-label="컬렉션 열기"
                                @click="openCollectionHub('roster')"
                            >
                                C
                            </button>
                        </div>
                        <div class="player-title">
                            <span>내 캐릭터</span>
                            <div class="player-title-row">
                                <canvas
                                    id="playerFaceCanvas"
                                    width="50"
                                    height="50"
                                    x-init="
                                        $el.width = 50;
                                        $el.height = 50
                                    "
                                ></canvas>
                                <strong
                                    x-text="playerFighter?.name"
                                    x-bind:style="'color:' + (playerFighter?.color || '#000')"
                                ></strong>
                            </div>
                        </div>
                        <p class="player-note">
                            <span x-text="playerFighter?.title || ''"></span>
                            <span
                                x-show="!locked"
                                x-text="' · 시작 전 ' + totalPoints + ' 포인트를 배분하세요.'"
                            ></span>
                            <span
                                x-show="!locked && bonusPoints > 0"
                                class="bonus-points-badge"
                                x-text="' (+' + bonusPoints + ' 보너스)'"
                            ></span>
                        </p>
                        <div class="player-xp-meter">
                            <div class="player-xp-head">
                                <strong x-text="playerExperience.levelLabel"></strong>
                                <span x-text="Number(playerExperience.totalXp || 0).toLocaleString() + ' XP'"></span>
                            </div>
                            <div class="player-xp-bar" aria-hidden="true">
                                <div
                                    class="player-xp-fill"
                                    x-bind:style="'width:' + (playerExperience.progressPct || 0) + '%; background:' + (playerFighter?.color || '#59d6ff')"
                                ></div>
                            </div>
                            <div class="player-xp-foot">
                                <span x-text="playerExperience.progressText"></span>
                                <span x-text="playerExperience.nextText"></span>
                            </div>
                            <div
                                class="player-xp-reward"
                                x-show="playerExperience.nextRewardText"
                                x-text="'다음 보상 · ' + playerExperience.nextRewardText"
                            ></div>
                        </div>
                        <div class="point-meter">
                            <span x-text="'사용 ' + (totalPoints - remainingPoints) + '/' + totalPoints"></span>
                            <b x-text="remainingPoints > 0 ? remainingPoints + ' 남음' : '준비 완료'"></b>
                        </div>
                        <div class="allocation-summary">
                            <span x-text="allocationSummary"></span>
                        </div>
                        <div class="stat-board">
                            <template x-for="stat in statDefs" :key="stat.key">
                                <div class="stat-row">
                                    <div class="stat-copy">
                                        <strong x-text="stat.label"></strong>
                                        <span x-text="stat.description"></span>
                                    </div>
                                    <button
                                        type="button"
                                        @click="adjustStat(stat.key, -10)"
                                        x-bind:disabled="locked || (allocation[stat.key] ?? 0) <= 0"
                                    >
                                        -10
                                    </button>
                                    <button
                                        type="button"
                                        @click="adjustStat(stat.key, -1)"
                                        x-bind:disabled="locked || (allocation[stat.key] ?? 0) <= 0"
                                    >
                                        -
                                    </button>
                                    <em x-text="(allocation[stat.key] ?? 0) + '%'"></em>
                                    <button
                                        type="button"
                                        @click="adjustStat(stat.key, 1)"
                                        x-bind:disabled="locked || remainingPoints <= 0"
                                    >
                                        +
                                    </button>
                                    <button
                                        type="button"
                                        @click="adjustStat(stat.key, 10)"
                                        x-bind:disabled="locked || remainingPoints <= 0"
                                    >
                                        +10
                                    </button>
                                </div>
                            </template>
                        </div>
                        <!-- 도전 단계 선택 -->
                        <div class="challenge-level-row" x-show="!locked">
                            <span class="challenge-label">도전 단계</span>
                            <button
                                type="button"
                                class="challenge-btn"
                                @click="adjustChallengeLevel(-1)"
                                x-bind:disabled="challengeLevel <= 0"
                            >
                                -
                            </button>
                            <em class="challenge-value" x-text="challengeLevel"></em>
                            <button
                                type="button"
                                class="challenge-btn"
                                @click="adjustChallengeLevel(1)"
                                x-bind:disabled="challengeLevel >= highestUnlockedLevel"
                            >
                                +
                            </button>
                            <span class="challenge-max" x-text="'/ ' + highestUnlockedLevel"></span>
                        </div>
                        <div
                            class="bonus-summary"
                            x-show="progressionBonusSummary"
                            x-text="progressionBonusSummary"
                        ></div>
                        <div class="player-actions" data-player-actions>
                            <button
                                class="action-btn"
                                type="button"
                                @click="randomAllocation()"
                                x-bind:disabled="locked"
                            >
                                자동 배분
                            </button>
                            <button
                                class="action-btn reset"
                                type="button"
                                @click="resetAllocation()"
                                x-bind:disabled="locked"
                            >
                                초기화
                            </button>
                        </div>
                    </section>

                    <div class="bracket" id="tournamentBracket">
                        <template x-for="(round, rIndex) in tournamentRounds" :key="rIndex">
                            <div class="bracket-round">
                                <div class="round-title" x-text="['Round 1', 'Semi', 'Final'][rIndex]"></div>
                                <template x-for="match in round" :key="match.id">
                                    <div class="bracket-match" x-bind:class="match.status">
                                        <div
                                            class="bracket-slot"
                                            x-bind:class="{ winner: match.winnerId === (match.a?.id ?? -1), player: match.a?.isPlayer, empty: !match.a }"
                                        >
                                            <span
                                                class="bracket-dot"
                                                x-bind:style="match.a ? 'background:' + match.a.color : ''"
                                                x-show="match.a"
                                            ></span>
                                            <span
                                                x-text="match.a ? (match.a.isPlayer ? 'YOU · ' : '') + match.a.name : (rIndex === 0 ? 'BYE' : 'TBD')"
                                            ></span>
                                        </div>
                                        <div
                                            class="bracket-slot"
                                            x-bind:class="{ winner: match.winnerId === (match.b?.id ?? -1), player: match.b?.isPlayer, empty: !match.b }"
                                        >
                                            <span
                                                class="bracket-dot"
                                                x-bind:style="match.b ? 'background:' + match.b.color : ''"
                                                x-show="match.b"
                                            ></span>
                                            <span
                                                x-text="match.b ? (match.b.isPlayer ? 'YOU · ' : '') + match.b.name : (rIndex === 0 ? 'BYE' : 'TBD')"
                                            ></span>
                                        </div>
                                        <span class="bracket-status" x-text="match.label"></span>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </aside>
            </section>

            <!-- Patch notes popup -->
            <div class="patch-overlay" x-show="patchNotesVisible" x-transition.opacity.duration.200ms>
                <div class="patch-card" @click.outside="closePatchNotes()">
                    <div class="patch-card-scroll">
                        <template x-for="(entry, eIdx) in patchEntries" :key="entry.version">
                            <div>
                                <strong class="patch-title" x-text="entry.title"></strong>
                                <span class="patch-date" x-text="entry.date"></span>
                                <ul class="patch-list">
                                    <template x-for="item in entry.changes" :key="item.text">
                                        <li>
                                            <span
                                                class="patch-badge"
                                                x-bind:class="'patch-badge--' + item.type"
                                                x-text="item.type"
                                            ></span>
                                            <span x-text="item.text"></span>
                                        </li>
                                    </template>
                                </ul>
                                <hr class="patch-divider" x-show="eIdx < patchEntries.length - 1" />
                            </div>
                        </template>
                    </div>
                    <button class="patch-dismiss" type="button" @click="closePatchNotes()">확인</button>
                </div>
            </div>

            <!-- Alpine-driven popup (used by PopupService) -->
            <div
                class="bf-popup-overlay"
                x-show="popupVisible"
                x-transition.opacity.duration.200ms
                @click.self="popupContent?.closeOnOutside === false || closePopup('close')"
            >
                <div class="bf-popup-card">
                    <div class="bf-popup-scroll">
                        <strong class="bf-popup-title" x-text="popupContent?.title ?? ''"></strong>
                        <div class="bf-popup-body" x-html="popupContent?.bodyHtml ?? ''"></div>
                    </div>
                    <div class="bf-popup-footer" x-show="popupContent?.buttons?.length">
                        <template x-for="btn in popupContent?.buttons" :key="btn.value">
                            <button
                                type="button"
                                class="bf-popup-btn"
                                x-bind:class="btn.primary ? 'bf-popup-btn--primary' : ''"
                                x-text="btn.text"
                                @click="closePopup(btn.value ?? btn.text)"
                            ></button>
                        </template>
                    </div>
                </div>
            </div>

            <!-- 컬렉션 허브 (전용 Alpine 템플릿, PopupService 미사용) -->
            <div
                class="ch-overlay"
                x-show="collectionHub.visible"
                x-transition.opacity.duration.200ms
                role="dialog"
                aria-modal="true"
                aria-label="컬렉션"
                @keydown.escape="closeCollectionHub()"
                @keydown.left.prevent="setCollectionTab(collectionHub.tabs[Math.max(0, collectionHub.tabs.findIndex(t => t.id === collectionHub.activeTab) - 1)]?.id)"
                @keydown.right.prevent="setCollectionTab(collectionHub.tabs[Math.min(collectionHub.tabs.length - 1, collectionHub.tabs.findIndex(t => t.id === collectionHub.activeTab) + 1)]?.id)"
                tabindex="-1"
            >
                <div class="ch-frame" @click.outside="closeCollectionHub()">
                    <!-- 헤더 -->
                    <div class="ch-header">
                        <strong class="ch-title">컬렉션</strong>
                        <span class="ch-summary">
                            <span
                                >숙련도
                                <b
                                    x-text="collectionHub.summary.cumulativeLevels + '/' + collectionHub.summary.maxLevels"
                                ></b
                            ></span>
                            <span>·</span>
                            <span
                                >업적
                                <b
                                    x-text="collectionHub.summary.unlockedAchievements + '/' + collectionHub.summary.totalAchievements"
                                ></b
                            ></span>
                            <span>·</span>
                            <span>숙련도 합계 <b x-text="collectionHub.summary.masteryTotal"></b></span>
                        </span>
                        <button class="ch-close" type="button" aria-label="닫기" @click="closeCollectionHub()">
                            ✕
                        </button>
                    </div>

                    <!-- 탭 바 -->
                    <div class="ch-tabs" role="tablist">
                        <template x-for="tab in collectionHub.tabs" :key="tab.id">
                            <button
                                class="ch-tab"
                                type="button"
                                role="tab"
                                x-bind:aria-selected="collectionHub.activeTab === tab.id"
                                x-bind:class="{ active: collectionHub.activeTab === tab.id }"
                                x-text="tab.label"
                                @click="setCollectionTab(tab.id)"
                            ></button>
                        </template>
                    </div>

                    <!-- 도감 탭 -->
                    <div class="ch-content" x-show="collectionHub.activeTab === 'roster'" role="tabpanel">
                        <div class="ch-toolbar">
                            <input
                                class="ch-search"
                                type="search"
                                placeholder="캐릭터 검색..."
                                x-model="collectionHub.searchQueries.roster"
                            />
                            <select
                                class="ch-select"
                                x-model="collectionHub.filters.roster"
                                @change="setCollectionFilter($el.value)"
                            >
                                <option value="all">전체</option>
                                <option value="unplayed">미기록</option>
                                <option value="played">플레이</option>
                                <option value="won">우승</option>
                                <option value="master">마스터</option>
                            </select>
                            <select class="ch-select" x-model="collectionHub.sortModes.roster">
                                <option value="roster">로스터 순</option>
                                <option value="wins">우승 많은 순</option>
                                <option value="recent">최근 플레이</option>
                            </select>
                        </div>
                        <div class="ch-scroll-region">
                            <div class="ch-grid">
                                <template x-for="item in filteredRosterItems" :key="item.id">
                                    <div
                                        class="ch-card"
                                        x-bind:class="{ selected: collectionHub.selectedCharacterId === item.id }"
                                        @click="selectCollectionCharacter(item.id)"
                                    >
                                        <div
                                            class="ch-card-head"
                                            x-bind:style="'background:' + item.color"
                                            x-bind:class="{ unplayed: !item.hasRecord }"
                                        >
                                            <span class="ch-card-icon" x-text="item.name.charAt(0)"></span>
                                            <div class="ch-card-head-text">
                                                <span class="ch-card-name" x-text="item.name"></span>
                                                <span
                                                    class="ch-card-mastery"
                                                    x-text="['-','☆','☆☆','☆☆☆'][item.masteryLevel]"
                                                ></span>
                                            </div>
                                        </div>
                                        <div class="ch-card-body" x-bind:class="{ unplayed: !item.hasRecord }">
                                            <span x-show="!item.hasRecord" class="ch-empty-badge">미기록</span>
                                            <span x-show="item.hasRecord"
                                                >우승 <b x-text="item.tournamentWins"></b>회</span
                                            >
                                            <span
                                                class="ch-xp-chip"
                                                x-text="item.experienceLevelLabel + ' · ' + Number(item.experienceTotalXp || 0).toLocaleString() + 'XP'"
                                            ></span>
                                            <span x-show="item.bestPlacement"
                                                >최고 <b x-text="item.bestPlacement + '위'"></b
                                            ></span>
                                            <span x-show="item.masteryUnlocked" class="ch-mast-badge">숙련도 ✓</span>
                                            <span x-show="item.isCurrent" class="ch-current-badge">현재</span>
                                        </div>
                                    </div>
                                </template>
                                <div class="ch-empty" x-show="filteredRosterItems.length === 0">
                                    검색 결과가 없습니다
                                </div>
                            </div>
                        </div>
                        <!-- 캐릭터 상세 -->
                        <div class="ch-detail" x-show="collectionHub.selectedCharacterId">
                            <template x-for="item in filteredRosterItems" :key="item.id">
                                <div x-show="item.id === collectionHub.selectedCharacterId">
                                    <div class="ch-detail-close">
                                        <button type="button" @click="closeCollectionCharacterDetail()">
                                            ← 목록으로
                                        </button>
                                    </div>
                                    <div class="ch-detail-body">
                                        <div class="ch-detail-xp">
                                            <div class="ch-detail-xp-head">
                                                <strong x-text="item.experienceLevelLabel"></strong>
                                                <span
                                                    x-text="Number(item.experienceTotalXp || 0).toLocaleString() + ' XP'"
                                                ></span>
                                            </div>
                                            <div class="ch-detail-xp-bar" aria-hidden="true">
                                                <div
                                                    class="ch-detail-xp-fill"
                                                    x-bind:style="'width:' + item.experienceProgressPct + '%; background:' + item.color"
                                                ></div>
                                            </div>
                                            <div class="ch-detail-xp-foot">
                                                <span x-text="item.experienceProgressText"></span>
                                                <span x-text="item.experienceNextText"></span>
                                            </div>
                                            <div
                                                class="ch-detail-xp-reward"
                                                x-text="'다음 보상 · ' + item.experienceNextRewardText"
                                            ></div>
                                        </div>
                                        <span>토너먼트 완료 <b x-text="item.tournamentsCompleted"></b></span>
                                        <span>토너먼트 우승 <b x-text="item.tournamentWins"></b></span>
                                        <span>매치 승리 <b x-text="item.matchWins"></b></span>
                                        <span x-show="item.bestPlacement"
                                            >최고 등수 <b x-text="item.bestPlacement + '위'"></b
                                        ></span>
                                        <span
                                            >누적 피해
                                            <b x-text="Number(item.totalDamageDealt || 0).toLocaleString()"></b
                                        ></span>
                                        <span x-show="item.comebackMatchWins"
                                            >역전승 <b x-text="item.comebackMatchWins"></b
                                        ></span>
                                        <span>
                                            숙련도
                                            <b x-text="['미해금','BRONZE','SILVER','GOLD'][item.masteryLevel]"></b>
                                            <span x-show="item.masteryLevel === 0">· 이 캐릭터로 우승</span>
                                            <span x-show="item.masteryLevel === 1">· 다음: SILVER (난도 1)</span>
                                            <span x-show="item.masteryLevel === 2">· 다음: GOLD (난도 2)</span>
                                            <span x-show="item.masteryLevel === 3">· MAX</span>
                                        </span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- 숙련도 탭 -->
                    <div class="ch-content" x-show="collectionHub.activeTab === 'mastery'" role="tabpanel">
                        <div class="ch-toolbar">
                            <select
                                class="ch-select"
                                x-model="collectionHub.filters.mastery"
                                @change="setCollectionFilter($el.value)"
                            >
                                <option value="all">전체</option>
                                <option value="unlocked">해금</option>
                                <option value="locked">미해금</option>
                                <option value="active">현재 적용</option>
                            </select>
                        </div>
                        <div class="ch-scroll-region">
                            <div class="ch-list">
                                <template x-for="item in filteredMasteryItems" :key="item.id">
                                    <div
                                        class="ch-mast-card"
                                        x-bind:class="{ unlocked: item.unlocked, active: item.active }"
                                    >
                                        <div class="ch-mast-source" x-text="item.sourceName"></div>
                                        <div class="ch-mast-info">
                                            <strong x-text="item.name"></strong>
                                            <span
                                                class="ch-mast-tier"
                                                x-text="['미해금','BRONZE','SILVER','GOLD'][item.level]"
                                            ></span>
                                            <span
                                                class="ch-mast-desc"
                                                x-text="item.level > 0 ? item.description.replace('{value}', item.formatValue(item.tierValues[item.level])) : (item.description.replace('{value}', item.formatValue(item.tierValues[1])) + ' · 미해금')"
                                            ></span>
                                            <span class="ch-mast-next" x-show="item.level === 0"
                                                >해금 조건: <span x-text="item.unlockCondition"></span
                                            ></span>
                                            <span class="ch-mast-next" x-show="item.level === 1"
                                                >다음: SILVER (난도 1 우승)</span
                                            >
                                            <span class="ch-mast-next" x-show="item.level === 2"
                                                >다음: GOLD (난도 2 우승)</span
                                            >
                                            <span class="ch-mast-next" x-show="item.level === 3">최대 등급</span>
                                        </div>
                                        <div class="ch-mast-status">
                                            <span x-show="item.unlocked && item.active" class="ch-mast-badge"
                                                >적용 중</span
                                            >
                                            <span
                                                x-show="item.unlocked && item.isSelf"
                                                class="ch-mast-badge ch-mast-badge--self"
                                                >보유 · 현재 캐릭터에는 미적용</span
                                            >
                                            <span x-show="!item.unlocked" class="ch-mast-badge ch-mast-badge--locked"
                                                >미해금</span
                                            >
                                        </div>
                                    </div>
                                </template>
                                <div class="ch-empty" x-show="filteredMasteryItems.length === 0">
                                    <span x-show="collectionHub.filters.mastery === 'unlocked'"
                                        >해금한 숙련도 효과가 없습니다</span
                                    >
                                    <span x-show="collectionHub.filters.mastery !== 'unlocked'"
                                        >숙련도 효과가 없습니다</span
                                    >
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 업적 탭 -->
                    <div class="ch-content" x-show="collectionHub.activeTab === 'achievements'" role="tabpanel">
                        <div class="ch-toolbar">
                            <select
                                class="ch-select"
                                x-model="collectionHub.filters.achievements"
                                @change="setCollectionFilter($el.value)"
                            >
                                <option value="all">전체</option>
                                <option value="unlocked">달성</option>
                                <option value="locked">미달성</option>
                            </select>
                        </div>
                        <div class="ch-scroll-region">
                            <div class="ch-list">
                                <template x-for="item in filteredAchievementItems" :key="item.id">
                                    <div
                                        class="ch-ach-card"
                                        x-bind:class="'ch-ach-tier--' + item.tier + (item.unlocked ? ' unlocked' : '')"
                                    >
                                        <div class="ch-ach-info">
                                            <strong x-text="item.name"></strong>
                                            <span class="ch-ach-desc" x-text="item.description"></span>
                                            <span
                                                class="ch-ach-reward"
                                                x-show="item.rewardText"
                                                x-text="'보상: ' + item.rewardText"
                                            ></span>
                                        </div>
                                        <div class="ch-ach-status">
                                            <span
                                                class="ch-ach-tier-label"
                                                x-text="item.tier"
                                                x-bind:class="'ch-tier--' + item.tier"
                                            ></span>
                                        </div>
                                    </div>
                                </template>
                                <div class="ch-empty" x-show="filteredAchievementItems.length === 0">
                                    등록된 업적이 없습니다
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 보관함 탭 -->
                    <div class="ch-content" x-show="collectionHub.activeTab === 'storage'" role="tabpanel">
                        <div class="ch-toolbar">
                            <input
                                class="ch-search"
                                type="search"
                                placeholder="상자 등급 검색..."
                                x-model="collectionHub.searchQueries.storage"
                            />
                            <select
                                class="ch-select"
                                x-model="collectionHub.filters.storage"
                                @change="setCollectionFilter($el.value)"
                            >
                                <option value="all">전체</option>
                                <option value="openable">개봉 가능</option>
                                <option value="common">Common</option>
                                <option value="uncommon">Uncommon</option>
                                <option value="rare">Rare</option>
                            </select>
                            <span class="ch-storage-currency">
                                해조각 <b x-text="Number(collectionHub.storage.keyShards || 0).toLocaleString()"></b>
                            </span>
                        </div>
                        <div class="ch-scroll-region">
                            <div class="ch-list">
                                <template x-for="item in filteredStorageItems" :key="item.id">
                                    <div class="ch-ach-card" x-bind:class="'ch-chest--' + item.rarity">
                                        <div class="ch-ach-info">
                                            <strong x-text="item.rarity.toUpperCase() + ' 상자'"></strong>
                                            <span class="ch-ach-desc" x-text="item.rewardText"></span>
                                            <span
                                                class="ch-ach-reward"
                                                x-text="'개봉 비용: 해조각 ' + item.openCost"
                                            ></span>
                                        </div>
                                        <div class="ch-ach-status">
                                            <span
                                                class="ch-ach-tier-label"
                                                x-bind:class="{ unlocked: item.canOpen }"
                                                x-text="item.canOpen ? '개봉 가능' : '잠김'"
                                            ></span>
                                        </div>
                                    </div>
                                </template>
                                <div class="ch-empty" x-show="filteredStorageItems.length === 0">
                                    보관 중인 상자가 없습니다
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action picker (Alpine template, no x-html) — disableClose: 반드시 선택해야 함 -->
            <div class="bf-popup-overlay" x-show="actionPickerVisible" x-transition.opacity.duration.200ms>
                <div class="bf-popup-card">
                    <div class="bf-popup-scroll">
                        <strong class="bf-popup-title">매치 액션 선택</strong>
                        <p style="text-align: center; font-size: 0.85rem; color: #555; margin: 0 0 10px">
                            전투 중 클릭하여 발동하세요
                        </p>
                        <div class="action-cards">
                            <template x-for="(card, index) in actionPickerCards" :key="card.id">
                                <button class="action-card" type="button" @click="pickAction(index)">
                                    <strong x-text="card.name"></strong>
                                    <span x-text="card.description"></span>
                                    <small x-text="'HP ' + card.hpCost + '% 소모'"></small>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
        <script type="module">
            import Alpine from "https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/module.esm.js";

            // GitHub Pages 캐시 방지용 버전 파라미터
            const V = "0.24.0";

            const { registerAlpineComponentSystem } = await import(`./src/alpineTemplateComponents.js?v=${V}`);
            const { appStore } = await import(`./src/ui.js?v=${V}`);

            registerAlpineComponentSystem(Alpine);
            Alpine.data("appStore", appStore);
            window.Alpine = Alpine;

            Alpine.start();
            await Promise.resolve();
            await import(`./src/main.js?v=${V}`);

            const { PopupService } = await import(`./src/popup.js?v=${V}`);
            const { HELP_TITLE, HELP_CONTENT } = await import(`./src/helpContent.js?v=${V}`);
            document.addEventListener("open-help", () =>
                PopupService.show({ title: HELP_TITLE, bodyHtml: HELP_CONTENT })
            );
            document.getElementById("app-loading")?.remove();
        </script>
    </body>
</html>
