<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="application-name" content="Ball Fight Simulator" />
        <meta name="apple-mobile-web-app-title" content="Ball Fight" />
        <meta name="theme-color" content="#222222" />
        <title>Ball Fight Simulator</title>
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <link rel="manifest" href="site.webmanifest?v=0.24.7" />
        <link rel="stylesheet" href="src/styles.css" />
        <style>
            /* Hide Alpine components until compiled */
            [x-cloak] {
                display: none !important;
            }

            /* Loading screen shown before Alpine initializes */
            .app-loading {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #fafafa;
                font-family: "Bahnschrift", "Segoe UI", sans-serif;
            }

            .app-loading__card {
                text-align: center;
            }

            .app-loading__card strong {
                display: block;
                font-size: 1.4rem;
                color: #222222;
                margin-bottom: 8px;
            }

            .app-loading__card span {
                display: block;
                font-size: 0.82rem;
                color: #888888;
                letter-spacing: 0.12em;
                text-transform: uppercase;
            }

            .app-loading__spinner {
                width: 32px;
                height: 32px;
                margin: 0 auto 20px;
                border: 4px solid #e0e0e0;
                border-top-color: #222222;
                border-radius: 50%;
                animation: app-loading-spin 800ms linear infinite;
            }

            @keyframes app-loading-spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
        <link rel="modulepreload" href="src/ui.js" />
        <link rel="modulepreload" href="src/statAllocation.js" />
    </head>
    <body>
        <div id="app-loading" class="app-loading">
            <div class="app-loading__card">
                <div class="app-loading__spinner"></div>
                <strong>Ball Fight Simulator</strong>
                <span>Loading...</span>
            </div>
        </div>

        <main class="app" x-data="appStore" x-bind:class="{ 'setup-mode': !tournamentActive }" x-cloak>
            <section class="game-frame">
                <section class="battle-stage">
                    <section class="arena-shell">
                        <canvas class="arena" id="arenaCanvas" width="960" height="960"></canvas>

                        <!-- 토스트 알림 -->
                        <toast-notification></toast-notification>

                        <game-overlay></game-overlay>

                        <start-button></start-button>

                        <hunting-button></hunting-button>
                    </section>

                    <fighter-strip></fighter-strip>

                    <battle-log></battle-log>
                </section>

                <aside
                    class="tournament-panel"
                    id="tournamentPanel"
                    aria-label="Tournament bracket"
                    x-bind:class="{ 'setup-hidden': !tournamentActive }"
                >
                    <player-panel></player-panel>
                    <tournament-bracket></tournament-bracket>
                </aside>
            </section>

            <!-- Patch notes (component) -->
            <patch-notes></patch-notes>

            <!-- Alpine-driven popup (component) -->
            <popup-dialog></popup-dialog>

            <!-- Collection hub (component) -->
            <collection-hub></collection-hub>

            <!-- Action picker (component) -->
            <action-picker></action-picker>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
        <script type="module">
            import Alpine from "https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/module.esm.js";

            // GitHub Pages 캐시 방지용 버전 파라미터
            const V = "0.24.9";

            window.BFS_ASSET_VERSION = V;
            const { loadTemplates } = await import(`./src/componentLoader.js?v=${V}`);
            const { registerAlpineComponentSystem } = await import(`./src/alpineTemplateComponents.js?v=${V}`);
            const { createComponentBridge } = await import(`./src/componentBridge.js?v=${V}`);
            const { appStore } = await import(`./src/ui.js?v=${V}`);

            window.Alpine = Alpine;
            window.BallFightComponentBridge = createComponentBridge(Alpine);
            await loadTemplates();
            Alpine.store("startButton", {
                hidden: true,
                disabledOverride: null,
                textOverride: null,
                remainingPoints: 0,
                locked: false
            });
            Alpine.store("fighterStrip", {
                fighters: []
            });
            Alpine.store("battleLog", {
                items: []
            });
            Alpine.store("huntingButton", {
                available: false,
                active: false,
                tournamentActive: false
            });
            Alpine.store("gameOverlay", {
                visible: false,
                transient: false,
                label: "",
                text: "",
                subtext: "",
                huntingChoiceVisible: false,
                huntingFloor: 1,
                huntingCharacterName: "",
                huntingLootSummary: "",
                huntingCanRetreat: false,
                huntingMoving: false,
                huntingMoveFrom: 0,
                huntingMoveTo: 0,
                huntingMoveStep: 0,
                huntingMoveMax: 10,
                huntingMoveMessage: "",
                huntingMerchantActive: false,
                huntingMerchantOffers: null,
                huntingLootHudVisible: false,
                huntingLootHudShards: 0,
                huntingLootHudChests: 0
            });
            Alpine.store("xpReward", {
                visible: false,
                characterName: "",
                xpGained: 0,
                levelLabel: "Lv.1",
                levelUp: false,
                animatedProgressPct: 0,
                progressText: "",
                nextText: "",
                nextRewardText: ""
            });
            Alpine.store("playerPanel", {
                fighter: null,
                experience: {
                    levelLabel: "Lv.1",
                    totalXp: 0,
                    progressPct: 0,
                    progressText: "0/100 XP",
                    nextText: "다음 레벨까지 100XP",
                    nextRewardText: ""
                },
                equipmentSummary: {
                    characterLevel: 1,
                    inventoryUsed: 0,
                    inventorySlots: 5,
                    equippedCount: 0,
                    activeCount: 0,
                    slots: [],
                    statLine: "적용 중인 장비 스탯 없음"
                },
                allocation: {},
                totalPoints: 0,
                bonusPoints: 0,
                remainingPoints: 0,
                locked: false,
                statDefs: [],
                challengeLevel: 0,
                highestUnlockedLevel: 0,
                progressionBonusSummary: "",
                allocationSummary: ""
            });
            Alpine.store("tournamentBracket", {
                visible: false,
                phase: "Ready",
                rounds: []
            });
            registerAlpineComponentSystem(Alpine);
            Alpine.data("appStore", appStore);

            Alpine.start();
            await Promise.resolve();
            await import(`./src/main.js?v=${V}`);

            const { PopupService } = await import(`./src/popup.js?v=${V}`);
            window.PopupService = PopupService;
            const { ActionPickerService } = await import(`./src/actionPicker.js?v=${V}`);
            window.ActionPickerService = ActionPickerService;
            const { PatchNotesService } = await import(`./src/patchNotesService.js?v=${V}`);
            window.PatchNotesService = PatchNotesService;
            const { CollectionHubService } = await import(`./src/collectionHubService.js?v=${V}`);
            window.CollectionHubService = CollectionHubService;

            const { getUnseenEntries } = await import(`./src/utils.js?v=${V}`);
            const unseenEntries = getUnseenEntries();
            if (unseenEntries.length > 0) PatchNotesService.show(unseenEntries);

            document.getElementById("app-loading")?.remove();
        </script>
    </body>
</html>
