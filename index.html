<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="application-name" content="Ball Fight Simulator" />
        <meta name="apple-mobile-web-app-title" content="Ball Fight" />
        <meta name="theme-color" content="#222222" />
        <title>Ball Fight Simulator</title>
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <link rel="manifest" href="site.webmanifest?v=0.31.3" />
        <link rel="stylesheet" href="src/styles.css" />
        <style>
            /* Hide Alpine components until compiled */
            [x-cloak] {
                display: none !important;
            }

            /* Loading screen shown before Alpine initializes */
            .app-loading {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #fafafa;
                font-family: "Bahnschrift", "Segoe UI", sans-serif;
            }

            .app-loading__card {
                text-align: center;
            }

            .app-loading__card strong {
                display: block;
                font-size: 1.4rem;
                color: #222222;
                margin-bottom: 8px;
            }

            .app-loading__card span {
                display: block;
                font-size: 0.82rem;
                color: #888888;
                letter-spacing: 0.12em;
                text-transform: uppercase;
            }

            .app-loading__spinner {
                width: 32px;
                height: 32px;
                margin: 0 auto 20px;
                border: 4px solid #e0e0e0;
                border-top-color: #222222;
                border-radius: 50%;
                animation: app-loading-spin 800ms linear infinite;
            }

            @keyframes app-loading-spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
        <link rel="modulepreload" href="src/ui.js" />
        <link rel="modulepreload" href="src/statAllocation.js" />
    </head>
    <body>
        <div id="app-loading" class="app-loading">
            <div class="app-loading__card">
                <div class="app-loading__spinner"></div>
                <strong>Ball Fight Simulator</strong>
                <span>Loading...</span>
            </div>
        </div>

        <main class="app" x-data="appRoot" x-cloak>
            <section class="game-frame">
                <section class="battle-stage">
                    <div class="arena-slot">
                        <section class="arena-shell">
                            <canvas class="arena" id="arenaCanvas" width="960" height="960"></canvas>

                            <!-- 토스트 알림 -->
                            <toast-notification></toast-notification>

                            <game-overlay></game-overlay>
                            <hunting-overlay></hunting-overlay>

                            <mode-segment></mode-segment>

                            <start-button></start-button>
                        </section>
                    </div>

                    <fighter-strip></fighter-strip>

                    <battle-log></battle-log>
                </section>

                <aside
                    class="tournament-panel"
                    id="tournamentPanel"
                    aria-label="Tournament bracket"
                    x-bind:class="{ 'setup-hidden': !tournamentActive }"
                >
                    <player-panel></player-panel>
                    <tournament-bracket></tournament-bracket>
                </aside>
            </section>

            <!-- Patch notes (component) -->
            <patch-notes></patch-notes>

            <!-- Alpine-driven popup (component) -->
            <popup-dialog></popup-dialog>

            <!-- Collection hub (component) -->
            <collection-hub></collection-hub>

            <!-- Action picker (component) -->
            <action-picker></action-picker>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
        <script type="module">
            import Alpine from "https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/module.esm.js";

            // GitHub Pages 캐시 방지용 버전 파라미터
            const V = "0.36.22";

            window.BFS_ASSET_VERSION = V;
            window.Alpine = Alpine;

            // ── Core Infrastructure: uiManager + createGameUI ──

            Alpine.store("uiManager", {
                components: {},
                gameActionBridge: null,
                register(id, instance) {
                    this.components[id] = instance;
                },
                unregister(id) {
                    delete this.components[id];
                },

                getComponent(componentId) {
                    const instance = this.components[componentId];
                    if (!instance) {
                        console.warn(`[uiManager] '${componentId}' 컴포넌트를 찾을 수 없습니다.`);
                        return null;
                    }
                    return new Proxy(instance, {
                        get(target, prop) {
                            if (typeof target[prop] === "function") {
                                return target[prop].bind(target);
                            }
                            return target[prop];
                        },
                        set(target, prop, value) {
                            target[prop] = value;
                            return true;
                        }
                    });
                },

                requireComponent(componentId) {
                    const component = this.getComponent(componentId);
                    if (!component) {
                        throw new Error(
                            `[BattleApp] 필수 UI 컴포넌트 '${componentId}'를 찾을 수 없습니다. ` +
                                `createGameUI("${componentId}", ...)로 등록되었는지 확인하세요.`
                        );
                    }
                    return component;
                },
                setGameActionBridge(bridge) {
                    this.gameActionBridge = bridge;
                },
                requireGameActionBridge(actionName) {
                    const bridge = this.gameActionBridge;
                    if (!bridge) {
                        throw new Error("[uiManager] gameActionBridge가 아직 등록되지 않았습니다.");
                    }
                    if (actionName && typeof bridge[actionName] !== "function") {
                        throw new Error(`[uiManager] gameActionBridge에 '${actionName}' 액션이 등록되지 않았습니다.`);
                    }
                    return bridge;
                },
                invokeGameAction(actionName, ...args) {
                    const bridge = this.requireGameActionBridge(actionName);
                    return bridge[actionName](...args);
                }
            });

            window.createGameUI = function (componentName, componentFactory) {
                Alpine.data(componentName, (customId) => {
                    const instance = componentFactory(customId);
                    instance.id = customId || componentName;

                    const originalInit = instance.init;
                    const originalDestroy = instance.destroy;

                    instance.init = function () {
                        Alpine.store("uiManager").register(this.id, this);
                        if (typeof originalInit === "function") originalInit.call(this);
                    };

                    instance.destroy = function () {
                        if (typeof originalDestroy === "function") originalDestroy.call(this);
                        Alpine.store("uiManager").unregister(this.id);
                    };

                    return instance;
                });
            };

            // ── Lightweight root component ──

            window.createGameUI("appRoot", () => ({
                tournamentActive: false,
                statusBadge: "Setup",
                statusText: "내 캐릭터 스탯을 배분하세요",
                statusSubtext: "랜덤 대진과 전투 결과가 여기에 갱신됩니다.",
                reset() {
                    this.tournamentActive = false;
                    this.statusBadge = "Setup";
                    this.statusText = "내 캐릭터 스탯을 배분하세요";
                    this.statusSubtext = "랜덤 대진과 전투 결과가 여기에 갱신됩니다.";
                }
            }));

            // ── Pre-load shared modules for component scripts ──

            const { HELP_TITLE, HELP_CONTENT } = await import(`./src/helpContent.js?v=${V}`);
            window.__helpTitle = HELP_TITLE;
            window.__helpContent = HELP_CONTENT;
            const { dismissPatchNotes } = await import(`./src/utils.js?v=${V}`);
            window.__dismissPatchNotes = dismissPatchNotes;

            // ── Component template loading ──

            const { loadTemplates } = await import(`./src/componentLoader.js?v=${V}`);
            const { registerAlpineComponentSystem } = await import(`./src/alpineTemplateComponents.js?v=${V}`);
            const { registerCharacterPortraitDirective } = await import(`./src/characterPortrait.js?v=${V}`);

            await loadTemplates();
            registerAlpineComponentSystem(Alpine);
            registerCharacterPortraitDirective(Alpine);

            Alpine.start();
            await Promise.resolve();
            await import(`./src/main.js?v=${V}`);

            const { ActionPickerService } = await import(`./src/actionPicker.js?v=${V}`);
            window.ActionPickerService = ActionPickerService;
            const { PatchNotesService } = await import(`./src/patchNotesService.js?v=${V}`);
            window.PatchNotesService = PatchNotesService;
            const { CollectionHubService } = await import(`./src/collectionHubService.js?v=${V}`);
            window.CollectionHubService = CollectionHubService;

            const { getUnseenEntries } = await import(`./src/utils.js?v=${V}`);
            const unseenEntries = getUnseenEntries();
            if (unseenEntries.length > 0) PatchNotesService.show(unseenEntries);

            document.getElementById("app-loading")?.remove();
        </script>
    </body>
</html>
