<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ball Fight Korea Inspired Simulator</title>
        <link rel="stylesheet" href="src/styles.css" />
        <style>
            /* Hide Alpine components until compiled */
            [x-cloak] {
                display: none !important;
            }

            /* Loading screen shown before Alpine initializes */
            .app-loading {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #fafafa;
                font-family: "Bahnschrift", "Segoe UI", sans-serif;
            }

            .app-loading__card {
                text-align: center;
            }

            .app-loading__card strong {
                display: block;
                font-size: 1.4rem;
                color: #222222;
                margin-bottom: 8px;
            }

            .app-loading__card span {
                display: block;
                font-size: 0.82rem;
                color: #888888;
                letter-spacing: 0.12em;
                text-transform: uppercase;
            }

            .app-loading__spinner {
                width: 32px;
                height: 32px;
                margin: 0 auto 20px;
                border: 4px solid #e0e0e0;
                border-top-color: #222222;
                border-radius: 50%;
                animation: app-loading-spin 800ms linear infinite;
            }

            @keyframes app-loading-spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
        <script>
            // ── appStore for Alpine.js (loads synchronously before Alpine) ──
            var STAT_KEYS = ["hp", "damage", "speed"];
            var PLAYER_STAT_POINTS = 100;
            var MAX_POINTS_PER_STAT = 100;
            var ALLOCATABLE_STATS = [
                { key: "hp", label: "체력", shortLabel: "HP", description: "종족값 체력을 포인트당 1% 올립니다." },
                {
                    key: "damage",
                    label: "공격",
                    shortLabel: "ATK",
                    description: "종족값 공격 배율을 포인트당 1% 올립니다."
                },
                {
                    key: "speed",
                    label: "속도",
                    shortLabel: "SPD",
                    description: "종족값 이동 속도를 포인트당 1% 올립니다."
                }
            ];
            function _emptyAlloc() {
                return { hp: 0, damage: 0, speed: 0 };
            }
            function _spent(a) {
                return STAT_KEYS.reduce(function (t, k) {
                    return t + (a[k] ?? 0);
                }, 0);
            }
            function _remaining(a) {
                return Math.max(0, PLAYER_STAT_POINTS - _spent(a));
            }
            function _adjust(a, k, d) {
                if (!STAT_KEYS.includes(k) || d === 0) return Object.assign({}, a);
                var n = Object.assign({}, a);
                var c = n[k] ?? 0;
                if (d > 0) {
                    var r = _remaining(n);
                    n[k] = Math.min(MAX_POINTS_PER_STAT, c + Math.min(d, r));
                } else {
                    n[k] = Math.max(0, c + d);
                }
                return n;
            }
            function _randomAlloc() {
                var a = _emptyAlloc();
                for (var p = 0; p < PLAYER_STAT_POINTS; p++) {
                    var avail = STAT_KEYS.filter(function (k) {
                        return a[k] < MAX_POINTS_PER_STAT;
                    });
                    a[avail[Math.min(avail.length - 1, Math.floor(Math.random() * avail.length))]]++;
                }
                return a;
            }
            function _fmt(a) {
                return ALLOCATABLE_STATS.map(function (s) {
                    return s.label + " +" + (a[s.key] ?? 0) + "%";
                }).join(" · ");
            }
            function _balanceMult(a) {
                var fn =
                    window._balanceMult ||
                    function (x) {
                        var v = [x.hp ?? 0, x.damage ?? 0, x.speed ?? 0];
                        var s = v[0] + v[1] + v[2];
                        if (s === 0) return { multiplier: 1, stdDev: 0 };
                        var avg = s / 3;
                        var sq =
                            v.reduce(function (t, c) {
                                return t + Math.pow(c - avg, 2);
                            }, 0) / 3;
                        var std = Math.sqrt(sq);
                        return {
                            multiplier: Number((1.0 + 20 / (20 + std)).toFixed(3)),
                            stdDev: Number(std.toFixed(3))
                        };
                    };
                return fn(a);
            }

            window.appStore = function () {
                return {
                    init: function () {
                        this._syncStartButton();
                    },
                    playerFighter: null,
                    allocation: _emptyAlloc(),
                    totalPoints: PLAYER_STAT_POINTS,
                    remainingPoints: PLAYER_STAT_POINTS,
                    locked: false,
                    statDefs: ALLOCATABLE_STATS,
                    statusBadge: "Setup",
                    statusText: "내 캐릭터 스탯을 배분하세요",
                    statusSubtext: "랜덤 대진과 전투 결과가 여기에 갱신됩니다.",
                    overlayVisible: false,
                    overlayTransient: false,
                    overlayLabel: "",
                    overlayText: "",
                    startHidden: true,
                    startDisabled: true,
                    startText: "싸움 시작",
                    fighters: [],
                    logItems: [],
                    tournamentActive: false,
                    tournamentPhase: "Ready",
                    tournamentRounds: [],
                    get allocationSummary() {
                        return _fmt(this.allocation);
                    },
                    get balanceMultiplier() {
                        return _balanceMult(this.allocation).multiplier;
                    },
                    adjustStat: function (key, delta) {
                        if (this.locked) return;
                        this.allocation = _adjust(this.allocation, key, delta);
                        this.remainingPoints = _remaining(this.allocation);
                        this._syncStartButton();
                        this.$el?.dispatchEvent(new CustomEvent("allocation-changed", { bubbles: true }));
                    },
                    randomAllocation: function () {
                        if (this.locked) return;
                        this.allocation = _randomAlloc();
                        this.remainingPoints = _remaining(this.allocation);
                        this._syncStartButton();
                        this.$el?.dispatchEvent(new CustomEvent("allocation-changed", { bubbles: true }));
                    },
                    _syncStartButton: function () {
                        this.startDisabled = this.remainingPoints > 0 || this.locked;
                        this.startText =
                            this.remainingPoints > 0 ? "스탯 " + this.remainingPoints + " 남음" : "토너먼트 시작";
                    }
                };
            };
        </script>
        <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
    </head>
    <body>
        <div id="app-loading" class="app-loading">
            <div class="app-loading__card">
                <div class="app-loading__spinner"></div>
                <strong>Ball Fight Simulator</strong>
                <span>Loading...</span>
            </div>
        </div>

        <main class="app" x-data="appStore" x-cloak x-init="document.getElementById('app-loading')?.remove()">
            <section class="game-frame">
                <section class="battle-stage">
                    <header
                        class="top-bar"
                        x-bind:class="{
                            overtime: statusBadge === 'Overtime',
                            result: statusBadge === 'Result'
                        }"
                    >
                        <div class="status-badge" x-text="statusBadge">READY</div>
                        <div class="matchup">
                            <span x-text="statusText">Press Start</span>
                            <small x-text="statusSubtext">랜덤 대진과 전투 결과가 여기에 갱신됩니다.</small>
                        </div>
                    </header>

                    <section class="arena-shell">
                        <canvas class="arena" id="arenaCanvas" width="960" height="960"></canvas>

                        <div
                            class="overlay"
                            id="overlay"
                            x-bind:class="{ visible: overlayVisible, transient: overlayTransient }"
                        >
                            <div class="overlay-card">
                                <span x-text="overlayLabel">Waiting Room</span>
                                <strong x-text="overlayText">START THE FIGHT</strong>
                            </div>
                        </div>

                        <button
                            class="control-button"
                            id="startButton"
                            type="button"
                            x-bind:class="{ hidden: startHidden }"
                            x-bind:disabled="startDisabled"
                            x-text="startText"
                            @click="$dispatch('start-tournament')"
                        >
                            싸움 시작
                        </button>
                    </section>

                    <footer class="fighter-strip" id="fighterCards">
                        <template x-for="fighter in fighters" :key="fighter.id">
                            <article
                                class="fighter-card"
                                x-bind:class="{ active: !fighter.defeated }"
                                x-bind:data-fighter-id="fighter.id"
                            >
                                <div class="fighter-head">
                                    <div class="fighter-meta">
                                        <strong
                                            x-text="fighter.isPlayer ? '내 캐릭터 · ' + fighter.name : fighter.name"
                                        ></strong>
                                        <span x-text="fighter.isPlayer ? '내 배분' : 'AI 배분'"></span>
                                    </div>
                                </div>
                                <div class="hp-bar">
                                    <div
                                        class="hp-fill"
                                        x-bind:style="'background:' + fighter.color + ';width:' + fighter.hpPct + '%' + (fighter.defeated ? ';opacity:0.3' : '')"
                                    ></div>
                                </div>
                                <div class="fighter-hp-text">
                                    <span x-text="fighter.hp + ' / ' + fighter.maxHp"></span>
                                </div>
                                <div class="fighter-stat-line">
                                    <span x-text="fighter.statLine"></span>
                                    <span
                                        class="fighter-balance-mult"
                                        x-text="'×' + fighter.balanceMult.toFixed(3)"
                                    ></span>
                                </div>
                                <div class="cooldown-wrap">
                                    <div class="cooldown-meta">
                                        <span class="cooldown-label" x-text="fighter.skillLabel">Skill</span>
                                        <span class="cooldown-text" x-text="fighter.skillText">Ready</span>
                                    </div>
                                    <div class="cooldown-bar">
                                        <div
                                            class="cooldown-fill"
                                            x-bind:style="'width:' + (fighter.skillPct * 100) + '%' + (fighter.defeated ? ';opacity:0.35' : '')"
                                        ></div>
                                    </div>
                                </div>
                            </article>
                        </template>
                    </footer>

                    <div class="debug-hidden">
                        <ul id="battleLog">
                            <template x-for="(item, index) in logItems" :key="index">
                                <li x-text="item"></li>
                            </template>
                        </ul>
                    </div>
                </section>

                <aside
                    class="tournament-panel"
                    id="tournamentPanel"
                    aria-label="Tournament bracket"
                    x-bind:class="{ 'setup-hidden': !tournamentActive }"
                >
                    <div class="tournament-title">
                        <strong>Bracket</strong>
                        <span id="tournamentPhase" x-text="tournamentPhase">Ready</span>
                    </div>

                    <section class="player-panel" id="playerPanel" x-bind:class="{ locked: locked }">
                        <div class="player-title">
                            <span>내 캐릭터</span>
                            <strong
                                x-text="playerFighter?.name"
                                x-bind:style="'color:' + (playerFighter?.color || '#000')"
                            ></strong>
                        </div>
                        <p class="player-note">
                            <span x-text="playerFighter?.title || ''"></span>
                            <span
                                x-show="!locked"
                                x-text="' · 시작 전 ' + totalPoints + ' 포인트를 배분하세요.'"
                            ></span>
                        </p>
                        <div class="point-meter">
                            <span x-text="'사용 ' + (totalPoints - remainingPoints) + '/' + totalPoints"></span>
                            <b x-text="remainingPoints > 0 ? remainingPoints + ' 남음' : '준비 완료'"></b>
                        </div>
                        <div class="allocation-summary">
                            <span x-text="allocationSummary"></span>
                            <span class="balance-badge">
                                <span class="balance-badge__value" x-text="'×' + balanceMultiplier.toFixed(3)"></span>
                                <span class="balance-badge__info">
                                    <span class="balance-badge__icon">i</span>
                                    <span class="balance-badge__tooltip">
                                        스탯을 고르고 분배할수록 모든 스탯에 추가 배율이 적용됩니다.<br /><br />
                                        균등 분배(예: 34/33/33) 시 최대 ×2.0<br />
                                        극단 올인(예: 100/0/0) 시 최소 ×1.3<br /><br />
                                        이를 통해 고르게 키우는 캐릭터가 더 강해집니다.
                                    </span>
                                </span>
                            </span>
                        </div>
                        <div class="stat-board">
                            <template x-for="stat in statDefs" :key="stat.key">
                                <div class="stat-row">
                                    <div class="stat-copy">
                                        <strong x-text="stat.label"></strong>
                                        <span x-text="stat.description"></span>
                                    </div>
                                    <button
                                        type="button"
                                        @click="adjustStat(stat.key, -10)"
                                        x-bind:disabled="locked || (allocation[stat.key] ?? 0) <= 0"
                                    >
                                        -10
                                    </button>
                                    <button
                                        type="button"
                                        @click="adjustStat(stat.key, -1)"
                                        x-bind:disabled="locked || (allocation[stat.key] ?? 0) <= 0"
                                    >
                                        -
                                    </button>
                                    <em x-text="(allocation[stat.key] ?? 0) + '%'"></em>
                                    <button
                                        type="button"
                                        @click="adjustStat(stat.key, 1)"
                                        x-bind:disabled="locked || remainingPoints <= 0"
                                    >
                                        +
                                    </button>
                                    <button
                                        type="button"
                                        @click="adjustStat(stat.key, 10)"
                                        x-bind:disabled="locked || remainingPoints <= 0"
                                    >
                                        +10
                                    </button>
                                </div>
                            </template>
                        </div>
                        <button
                            class="random-stat-button"
                            type="button"
                            @click="randomAllocation()"
                            x-bind:disabled="locked"
                        >
                            자동 배분
                        </button>
                        <div class="player-actions" data-player-actions></div>
                    </section>

                    <div class="bracket" id="tournamentBracket">
                        <template x-for="(round, rIndex) in tournamentRounds" :key="rIndex">
                            <div class="bracket-round">
                                <div class="round-title" x-text="['Round 1', 'Semi', 'Final'][rIndex]"></div>
                                <template x-for="match in round" :key="match.id">
                                    <div class="bracket-match" x-bind:class="match.status">
                                        <div
                                            class="bracket-slot"
                                            x-bind:class="{ winner: match.winnerId === (match.a?.id ?? -1), player: match.a?.isPlayer, empty: !match.a }"
                                        >
                                            <span
                                                class="bracket-dot"
                                                x-bind:style="match.a ? 'background:' + match.a.color : ''"
                                                x-show="match.a"
                                            ></span>
                                            <span
                                                x-text="match.a ? (match.a.isPlayer ? 'YOU · ' : '') + match.a.name : (rIndex === 0 ? 'BYE' : 'TBD')"
                                            ></span>
                                        </div>
                                        <div
                                            class="bracket-slot"
                                            x-bind:class="{ winner: match.winnerId === (match.b?.id ?? -1), player: match.b?.isPlayer, empty: !match.b }"
                                        >
                                            <span
                                                class="bracket-dot"
                                                x-bind:style="match.b ? 'background:' + match.b.color : ''"
                                                x-show="match.b"
                                            ></span>
                                            <span
                                                x-text="match.b ? (match.b.isPlayer ? 'YOU · ' : '') + match.b.name : (rIndex === 0 ? 'BYE' : 'TBD')"
                                            ></span>
                                        </div>
                                        <span class="bracket-status" x-text="match.label"></span>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </aside>
            </section>
        </main>

        <script type="module" src="src/main.js"></script>
    </body>
</html>
