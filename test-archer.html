<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Archer Animation Test</title>
        <style>
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #f0f0f0;
                font-family: "Bahnschrift", "Segoe UI", sans-serif;
            }
            .test-app {
                text-align: center;
            }
            canvas {
                border: 3px solid #202020;
                background: #fafafa;
                display: block;
                margin: 0 auto 16px;
                border-radius: 12px;
            }
            .controls {
                display: flex;
                gap: 8px;
                justify-content: center;
                flex-wrap: wrap;
            }
            .controls button {
                padding: 8px 20px;
                border: 2px solid #202020;
                border-radius: 8px;
                background: #ffffff;
                font:
                    700 0.85rem "Bahnschrift",
                    "Segoe UI",
                    sans-serif;
                cursor: pointer;
                transition: background 0.12s;
            }
            .controls button:hover {
                background: #e0e0e0;
            }
            .controls button.primary {
                background: #202020;
                color: #ffffff;
            }
            .controls button.primary:hover {
                opacity: 0.8;
            }
            .status {
                margin-top: 12px;
                font-size: 0.9rem;
                color: #555;
            }
        </style>
    </head>
    <body>
        <div class="test-app">
            <canvas id="c" width="500" height="500"></canvas>
            <div class="controls">
                <button class="primary" id="btnRelease">발사</button>
                <button id="btnTriple">3발사</button>
            </div>
            <div class="status" id="status">준비</div>
        </div>

        <script type="module">
            import { TestEnv, TestTarget } from "./src/test-env.js";
            import { Vector2 } from "./src/core.js";
            import { ArcherAbility } from "./src/abilities/ArcherAbility.js";
            import { BattleBall } from "./src/entities.js";
            import { TestSimulation } from "./src/simulation/TestSimulation.js";

            // ── Simulation ─────────────────────────────────────────────────

            const sim = new TestSimulation();
            const target = new TestTarget(new Vector2(380, 180));
            sim.entities.push(target);

            // ── Environment ──────────────────────────────────────────────────

            const canvas = document.getElementById("c");
            const env = new TestEnv(canvas, sim);
            env.statusEl = document.getElementById("status");

            // ── Entities ─────────────────────────────────────────────────────

            const ball = new BattleBall(
                {
                    id: "archer",
                    name: "Archer Ball",
                    color: "#f7b34d",
                    stats: { hp: 112, damage: 1.02, speed: 270, radius: 50, mass: 1.2 }
                },
                new Vector2(250, 250)
            );
            ball.velocity = new Vector2(0, 0);
            ball.simulation = sim;
            sim.fighters.push(ball);
            sim.entities.push(ball);

            const ability = new ArcherAbility(ball, sim);
            ball.ability = ability;
            ball.bindAbility(ability);

            // ── Custom hooks ────────────────────────────────────────────────

            env.onUpdate = (dt) => {
                ability.update(dt, target);
                env.statusEl &&
                    (env.statusEl.textContent =
                        ability.windUp > 0
                            ? `🏹 당기는 중... ${((1 - ability.windUp / 0.6) * 100).toFixed(0)}%`
                            : "준비");
            };

            env.onRender = (ctx) => {
                // Top HUD
                ctx.font = "700 14px Bahnschrift, sans-serif";
                ctx.textAlign = "center";
                ctx.fillStyle = ability.windUp > 0 ? "#202020" : "#888";
                ctx.fillText(ability.windUp > 0 ? "DRAWING" : "READY", canvas.width / 2, 28);

                if (ability.missStreak >= 2) {
                    ctx.fillStyle = "#d97706";
                    ctx.fillText(`TRIPLE (miss: ${ability.missStreak})`, canvas.width / 2, 48);
                } else if (ability.missStreak > 0) {
                    ctx.fillStyle = "#888";
                    ctx.fillText(`Miss: ${ability.missStreak}`, canvas.width / 2, 48);
                }
            };

            // ── Buttons ──────────────────────────────────────────────────────

            document.getElementById("btnRelease").addEventListener("click", () => {
                ability.windUp = 0;
                ability.release();
            });

            document.getElementById("btnTriple").addEventListener("click", () => {
                ability.missStreak = 3;
                ability.timer = 0;
            });

            // ── Go ───────────────────────────────────────────────────────────

            env.start();
        </script>
    </body>
</html>
