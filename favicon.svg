<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Bat Ball (left) -->
  <g transform="translate(-1,0)">
    <circle cx="11" cy="16" r="8" fill="#66ccff" stroke="#202020" stroke-width="0.7"/>
    <!-- cap crown -->
    <path d="M5 12 Q11 7 17 12" fill="#2244aa" stroke="#1a3388" stroke-width="0.4"/>
    <line x1="5" y1="12" x2="17" y2="12" stroke="#1a3388" stroke-width="1" stroke-linecap="round"/>
    <!-- eyes -->
    <line x1="7" y1="15" x2="9" y2="16" stroke="#202020" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="15" y1="15" x2="13" y2="16" stroke="#202020" stroke-width="0.8" stroke-linecap="round"/>
    <!-- mouth -->
    <line x1="9" y1="20" x2="13" y2="19.5" stroke="#202020" stroke-width="0.7" stroke-linecap="round"/>
  </g>

  <!-- Rage Ball (right) -->
  <g transform="translate(1,0)">
    <circle cx="21" cy="16" r="8" fill="#ff421a" stroke="#202020" stroke-width="0.7"/>
    <!-- angry brows -->
    <line x1="16" y1="12" x2="19" y2="13" stroke="#202020" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="26" y1="12" x2="23" y2="13" stroke="#202020" stroke-width="0.9" stroke-linecap="round"/>
    <!-- eyes -->
    <circle cx="18" cy="15" r="0.65" fill="#202020"/>
    <circle cx="24" cy="15" r="0.65" fill="#202020"/>
    <!-- mouth -->
    <path d="M18 19 Q21 21 24 19" stroke="#202020" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>
