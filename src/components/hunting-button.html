<button
    class="control-button hunting-btn"
    type="button"
    x-data="huntingButton"
    x-show="available && !tournamentActive && !active"
    @click="openLobby()"
>
    사냥터
</button>
<script>
    window.createGameUI("huntingButton", () => ({
        available: false,
        active: false,
        tournamentActive: false,
        openLobby() {
            window.requireGameActionBridge("openHuntingLobby").openHuntingLobby();
        }
    }));
</script>
