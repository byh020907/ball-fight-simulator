<footer class="fighter-strip" id="fighterCards" x-data="fighterStrip">
    <template x-for="fighter in fighters" :key="fighter.id">
        <article class="fighter-card" x-bind:class="{ active: !fighter.defeated }" x-bind:data-fighter-id="fighter.id">
            <div class="fighter-head">
                <div class="fighter-meta">
                    <strong x-text="fighter.isPlayer ? '내 캐릭터 · ' + fighter.name : fighter.name"></strong>
                    <span class="fighter-title" x-text="fighter.title"></span>
                    <span x-text="fighter.isPlayer ? '내 배분' : 'AI 배분'"></span>
                </div>
            </div>
            <div class="hp-bar">
                <div
                    class="hp-fill"
                    x-bind:style="'background:' + fighter.color + ';width:' + fighter.hpPct + '%' + (fighter.defeated ? ';opacity:0.3' : '')"
                ></div>
            </div>
            <div class="fighter-hp-text">
                <span x-text="fighter.hp + ' / ' + fighter.maxHp"></span>
            </div>
            <div class="fighter-stat-line" x-bind:class="{ 'hero-stat-line': fighter.isHero }">
                <span x-show="!fighter.isHero" x-text="fighter.statLine"></span>
                <span class="hero-stat-parts" x-show="fighter.isHero">
                    <template x-for="part in fighter.heroStatParts" :key="part.key">
                        <span class="hero-stat-part">
                            <span x-text="part.baseText"></span>
                            <span
                                class="hero-stat-bonus"
                                x-show="part.bonusText"
                                x-text="part.bonusText"
                                x-bind:style="'color:' + part.color"
                            ></span>
                        </span>
                    </template>
                </span>
                <span class="fighter-balance-mult" x-text="'×' + fighter.balanceMult.toFixed(3)"></span>
            </div>
            <div class="ability-state-list">
                <template x-for="(abilityState, index) in fighter.abilityStates" :key="abilityState.key">
                    <div class="cooldown-wrap" x-bind:data-ability-role="abilityState.role">
                        <div class="cooldown-meta">
                            <span class="cooldown-label" x-text="abilityState.displayName">Ability</span>
                            <span class="cooldown-state-label" x-text="abilityState.label">Ready</span>
                            <span class="cooldown-text" x-text="abilityState.text">Ready</span>
                            <span class="ability-role" x-show="abilityState.role === 'sub'">Sub</span>
                            <span
                                class="action-badge"
                                x-show="index === 0 && fighter.actionName"
                                x-text="fighter.actionName"
                            ></span>
                        </div>
                        <div class="cooldown-bar">
                            <div
                                class="cooldown-fill"
                                x-bind:style="'width:' + (abilityState.progress * 100) + '%' + (fighter.defeated ? ';opacity:0.35' : '')"
                            ></div>
                        </div>
                    </div>
                </template>
            </div>
        </article>
    </template>
</footer>
<script>
    window.createGameUI("fighterStrip", () => ({
        fighters: [],
        reset() {
            this.fighters = [];
        }
    }));
</script>
