<div
    class="hunting-overlay"
    id="huntingOverlay"
    x-data="huntingOverlay"
    x-show="visible || huntingPartyHudVisible"
    x-transition:enter="hunting-overlay-enter"
    x-transition:enter-start="hunting-overlay-enter-start"
    x-transition:enter-end="hunting-overlay-enter-end"
    x-transition:leave="hunting-overlay-leave"
    x-transition:leave-start="hunting-overlay-leave-start"
    x-transition:leave-end="hunting-overlay-leave-end"
    x-bind:class="{
        'hunting-merchant-active': huntingMerchantActive,
        'hunting-chest-active': huntingChestEventActive,
        'hunting-event-active': huntingEventActive,
        'hunting-battle-preparation-active': huntingBattlePreparationActive,
        'hunting-moving': huntingMoving,
        'hunting-combat-result-active': huntingCombatResultActive,
        'hunting-party-hud-active': huntingPartyHudVisible && !visible
    }"
>
    <div class="hunting-overlay-frame" x-show="visible">
        <div
            class="hunting-combat-unlock-card"
            x-show="huntingCombatResultActive && huntingCombatResultStep === 'unlock'"
        >
            <span>새 캐릭터 해금</span>
            <div class="hunting-combat-unlock-reveal">
                <strong x-text="huntingCharacterUnlock?.previousName || '???'"></strong>
                <b aria-hidden="true">→</b>
                <strong x-text="huntingCharacterUnlock?.name || ''"></strong>
            </div>
            <p>사냥터의 정체불명 챔피언이 동료가 되었습니다.</p>
        </div>
        <div
            class="hunting-overlay-card"
            x-show="!huntingCombatResultActive || huntingCombatResultStep === 'experience'"
        >
            <div class="hunting-overlay-heading">
                <span x-show="!huntingCombatResultActive" x-text="label">사냥터</span>
                <span class="hunting-combat-experience-label" x-show="huntingCombatResultActive">경험치</span>
                <strong x-show="!huntingCombatResultActive" x-text="text">원정 시작</strong>
                <p x-show="subtext && !huntingCombatResultActive" x-text="subtext"></p>
            </div>
            <xp-reward-panel data-component-id="huntingXpRewardPanel"></xp-reward-panel>
            <div
                class="hunting-party-experience-grid"
                x-show="huntingCombatResultActive && huntingPartyExperienceRewards.length > 1"
            >
                <template x-for="reward in huntingPartyExperienceRewards" :key="reward.role">
                    <div class="hunting-party-experience-card">
                        <span x-text="reward.roleLabel"></span>
                        <strong x-text="reward.name"></strong>
                        <b x-text="'+' + reward.xpGained + ' XP'"></b>
                        <small x-text="reward.levelUp ? reward.levelLabel + ' 승급' : reward.levelLabel"></small>
                    </div>
                </template>
            </div>

            <div class="hunting-route" x-show="huntingMoving">
                <div class="hunting-route-head">
                    <span x-text="huntingMoveFrom + 'F'"></span>
                    <strong x-text="huntingMoveTo + 'F'"></strong>
                </div>
                <div class="hunting-route-track" aria-hidden="true">
                    <i
                        x-bind:style="'width:' + Math.min(100, Math.round(((huntingMoveStep || 0) / Math.max(1, huntingMoveMax || 10)) * 100)) + '%'"
                    ></i>
                </div>
                <div class="hunting-route-foot">
                    <span x-text="huntingMoveMessage"></span>
                    <b x-text="(huntingMoveStep || 0) + '/' + (huntingMoveMax || 10)"></b>
                </div>
            </div>

            <div
                class="hunting-choice"
                x-show="huntingChoiceVisible && !huntingCombatResultActive && !huntingMoving && !huntingMerchantActive"
            >
                <div class="hunting-choice-info">
                    <span x-text="huntingLootSummary"></span>
                </div>
                <div class="hunting-choice-hint" x-show="huntingMoveMessage">
                    <span x-text="huntingMoveMessage"></span>
                </div>
                <div class="hunting-choice-buttons">
                    <button
                        class="hunting-btn retreat"
                        type="button"
                        x-show="huntingCanRetreat"
                        @click="huntingRetreat()"
                    >
                        포탈 귀환
                    </button>
                    <button class="hunting-btn advance" type="button" @click="huntingAdvance()">10층 전진</button>
                </div>
            </div>

            <div class="hunting-chest-event" x-show="huntingChestEventActive">
                <div class="hunting-event-scroll-body">
                    <chest-icon class="hunting-chest-token" x-bind:data-rarity="huntingChestRarity"></chest-icon>
                    <strong x-text="huntingChestTitle"></strong>
                    <span x-text="huntingChestSubtext"></span>
                    <span class="hunting-chest-loot" x-text="huntingLootSummary"></span>
                </div>
                <div class="hunting-event-actions">
                    <button
                        class="hunting-btn advance"
                        type="button"
                        @click="huntingChestContinue()"
                        x-text="huntingChestConfirmLabel || '계속 전진'"
                    ></button>
                </div>
            </div>

            <div class="hunting-event-result" x-show="huntingEventActive">
                <div class="hunting-event-scroll-body">
                    <span>이벤트 결과</span>
                    <strong x-text="huntingEventDetail"></strong>
                </div>
                <div class="hunting-event-actions">
                    <button
                        class="hunting-btn advance"
                        type="button"
                        @click="huntingEventContinue()"
                        x-text="huntingEventConfirmLabel || '계속 전진'"
                    ></button>
                </div>
            </div>

            <div class="hunting-battle-preparation" x-show="huntingBattlePreparationActive">
                <div class="hunting-event-scroll-body">
                    <span>전투 준비</span>
                    <strong x-text="huntingMoveMessage"></strong>
                    <p>잠시 후 전투가 자동으로 시작됩니다.</p>
                </div>
                <div class="hunting-event-actions">
                    <button
                        class="hunting-btn advance hunting-battle-start"
                        type="button"
                        @click="huntingStartPreparedBattle()"
                    >
                        전투 시작
                    </button>
                </div>
            </div>
        </div>

        <div
            class="hunting-combat-choice-card"
            x-show="huntingCombatResultActive && huntingCombatResultStep === 'summary'"
        >
            <span>전투 결과</span>
            <strong x-text="huntingCombatResultTitle"></strong>
            <p class="hunting-combat-result-summary" x-text="huntingCombatResultSummary"></p>
            <div class="hunting-combat-choice-actions" x-show="huntingChoiceVisible">
                <p class="hunting-choice-hint" x-show="huntingMoveMessage" x-text="huntingMoveMessage"></p>
                <div class="hunting-choice-buttons">
                    <button
                        class="hunting-btn retreat"
                        type="button"
                        x-show="huntingCanRetreat"
                        @click="huntingRetreat()"
                    >
                        포탈 귀환
                    </button>
                    <button class="hunting-btn advance" type="button" @click="huntingAdvance()">10층 전진</button>
                </div>
            </div>
            <button
                class="hunting-btn advance"
                type="button"
                x-show="huntingResultContinueVisible"
                @click="continueCharacterUnlockResult()"
            >
                전리품 확인
            </button>
        </div>

        <button
            class="hunting-combat-result-tab"
            type="button"
            x-show="huntingCombatResultActive && huntingCombatResultStep !== 'summary'"
            aria-label="전투 결과 보기"
            @click="advanceHuntingCombatResult()"
        >
            <span x-text="'결과 ' + getHuntingCombatResultIndex() + '/' + huntingCombatResultTotal"></span>
            <b>》</b>
        </button>

        <button
            class="hunting-auto-advance"
            type="button"
            x-show="huntingAutoAdvanceActive"
            x-bind:aria-label="huntingAutoAdvanceLabel + ' 바로 진행'"
            @click="huntingSkipAutoAdvance()"
        >
            <span
                class="hunting-auto-advance-label"
                x-text="'자동 진행 · ' + Math.max(0, huntingAutoAdvanceRemainingMs / 1000).toFixed(1) + '초'"
            ></span>
            <span class="hunting-auto-advance-track" aria-hidden="true">
                <i x-bind:style="'transform:scaleX(' + huntingAutoAdvanceProgress + ')'" ></i>
            </span>
        </button>
    </div>

    <div class="hunting-loot-hud" x-show="huntingLootHudVisible">
        <span class="hud-head">미확보 파편</span>
        <span class="hud-body">
            <span x-text="'파편 ' + huntingLootHudShards"></span>
            <span
                x-show="huntingLootHudEnhancementStones > 0"
                x-text="' · 강화석 ' + huntingLootHudEnhancementStones"
            ></span>
            <span x-show="huntingLootHudChests > 0" x-text="' · 상자 ' + huntingLootHudChests"></span>
        </span>
    </div>

</div>
<script>
    window.createGameUI("huntingOverlay", () => ({
        visible: false,
        label: "",
        text: "",
        subtext: "",
        huntingChoiceVisible: false,
        huntingFloor: 1,
        huntingCharacterName: "",
        huntingLootSummary: "",
        huntingCanRetreat: false,
        huntingMoving: false,
        huntingMoveFrom: 0,
        huntingMoveTo: 0,
        huntingMoveStep: 0,
        huntingMoveMax: 10,
        huntingMoveMessage: "",
        huntingCombatResultActive: false,
        huntingCombatResultStep: "experience",
        huntingCombatResultTitle: "",
        huntingCombatResultSummary: "",
        huntingCombatResultTotal: 2,
        huntingCharacterUnlock: null,
        huntingResultContinueVisible: false,
        huntingMerchantActive: false,
        huntingMerchantOffers: null,
        huntingMerchantResult: "",
        huntingChestEventActive: false,
        huntingChestRarity: "common",
        huntingChestTitle: "",
        huntingChestSubtext: "",
        huntingChestConfirmLabel: "",
        huntingEventActive: false,
        huntingEventDetail: "",
        huntingEventConfirmLabel: "",
        huntingBattlePreparationActive: false,
        huntingAutoAdvanceActive: false,
        huntingAutoAdvanceLabel: "",
        huntingAutoAdvanceRemainingMs: 0,
        huntingAutoAdvanceProgress: 0,
        huntingLootHudVisible: false,
        huntingLootHudShards: 0,
        huntingLootHudEnhancementStones: 0,
        huntingLootHudChests: 0,
        huntingPartyHudVisible: false,
        huntingSwapCharacter: null,
        huntingPartyExperienceRewards: [],

        huntingRetreat() {
            this.resetHuntingCombatResult();
            Alpine.store("uiManager").invokeGameAction("huntingRetreat");
        },
        huntingAdvance() {
            this.resetHuntingCombatResult();
            Alpine.store("uiManager").invokeGameAction("huntingAdvance");
        },
        advanceHuntingCombatResult() {
            Alpine.store("uiManager").invokeGameAction("huntingAdvanceCombatResult");
        },
        getHuntingCombatResultIndex() {
            if (this.huntingCombatResultStep === "unlock") return 1;
            return this.huntingCharacterUnlock ? 2 : 1;
        },
        continueCharacterUnlockResult() {
            this.resetHuntingCombatResult();
            Alpine.store("uiManager").invokeGameAction("huntingContinueCharacterUnlockResult");
        },
        resetHuntingCombatResult() {
            this.huntingCombatResultActive = false;
            this.huntingCombatResultStep = "experience";
            this.huntingCombatResultTitle = "";
            this.huntingCombatResultSummary = "";
            this.huntingCombatResultTotal = 2;
            this.huntingCharacterUnlock = null;
            this.huntingResultContinueVisible = false;
        },
        huntingChestContinue() {
            Alpine.store("uiManager").invokeGameAction("huntingChestContinue");
        },
        huntingEventContinue() {
            Alpine.store("uiManager").invokeGameAction("huntingEventContinue");
        },
        huntingStartPreparedBattle() {
            Alpine.store("uiManager").invokeGameAction("huntingStartPreparedBattle");
        },
        huntingSkipAutoAdvance() {
            Alpine.store("uiManager").invokeGameAction("huntingSkipAutoAdvance");
        },
        formatHuntingPartyHealth(character) {
            if (!character || !Number.isFinite(character.hp) || !Number.isFinite(character.maxHp)) return "";
            return `${Math.ceil(character.hp)} / ${Math.ceil(character.maxHp)}`;
        },
        show({ label, text, subtext = "", xpReward = null } = {}) {
            this.visible = true;
            this.label = label ?? "";
            this.text = text ?? "";
            this.subtext = subtext;
            const xpRewardPanel = Alpine.store("uiManager").requireComponent("huntingXpRewardPanel");
            if (xpReward) {
                xpRewardPanel.animate(xpReward);
            } else {
                xpRewardPanel.hide();
            }
        },
        hide() {
            this.reset();
        },
        reset() {
            this.visible = false;
            this.label = "";
            this.text = "";
            this.subtext = "";
            Alpine.store("uiManager").requireComponent("huntingXpRewardPanel").reset();
            this.resetHuntingState();
        },
        resetHuntingState() {
            this.huntingChoiceVisible = false;
            this.huntingFloor = 1;
            this.huntingCharacterName = "";
            this.huntingLootSummary = "";
            this.huntingCanRetreat = false;
            this.huntingMoving = false;
            this.huntingMoveFrom = 0;
            this.huntingMoveTo = 0;
            this.huntingMoveStep = 0;
            this.huntingMoveMax = 10;
            this.huntingMoveMessage = "";
            this.resetHuntingCombatResult();
            this.huntingMerchantActive = false;
            this.huntingMerchantOffers = null;
            this.huntingMerchantResult = "";
            this.huntingChestEventActive = false;
            this.huntingChestRarity = "common";
            this.huntingChestTitle = "";
            this.huntingChestSubtext = "";
            this.huntingChestConfirmLabel = "";
            this.huntingEventActive = false;
            this.huntingEventDetail = "";
            this.huntingEventConfirmLabel = "";
            this.huntingBattlePreparationActive = false;
            this.huntingAutoAdvanceActive = false;
            this.huntingAutoAdvanceLabel = "";
            this.huntingAutoAdvanceRemainingMs = 0;
            this.huntingAutoAdvanceProgress = 0;
            this.huntingLootHudVisible = false;
            this.huntingLootHudShards = 0;
            this.huntingLootHudEnhancementStones = 0;
            this.huntingLootHudChests = 0;
            this.huntingPartyHudVisible = false;
            this.huntingSwapCharacter = null;
            this.huntingPartyExperienceRewards = [];
        },
        setHuntingState(data) {
            if (data.visible !== undefined) this.visible = data.visible;
            if (data.label !== undefined) this.label = data.label;
            if (data.text !== undefined) this.text = data.text;
            if (data.subtext !== undefined) this.subtext = data.subtext;
            if (data.huntingChoiceVisible !== undefined) this.huntingChoiceVisible = data.huntingChoiceVisible;
            if (data.huntingFloor !== undefined) this.huntingFloor = data.huntingFloor;
            if (data.huntingCharacterName !== undefined) this.huntingCharacterName = data.huntingCharacterName;
            if (data.huntingLootSummary !== undefined) this.huntingLootSummary = data.huntingLootSummary;
            if (data.huntingCanRetreat !== undefined) this.huntingCanRetreat = data.huntingCanRetreat;
            if (data.huntingMoving !== undefined) this.huntingMoving = data.huntingMoving;
            if (data.huntingMoveFrom !== undefined) this.huntingMoveFrom = data.huntingMoveFrom;
            if (data.huntingMoveTo !== undefined) this.huntingMoveTo = data.huntingMoveTo;
            if (data.huntingMoveStep !== undefined) this.huntingMoveStep = data.huntingMoveStep;
            if (data.huntingMoveMax !== undefined) this.huntingMoveMax = data.huntingMoveMax;
            if (data.huntingMoveMessage !== undefined) this.huntingMoveMessage = data.huntingMoveMessage;
            if (data.huntingCombatResultActive !== undefined)
                this.huntingCombatResultActive = data.huntingCombatResultActive;
            if (data.huntingCombatResultStep !== undefined) this.huntingCombatResultStep = data.huntingCombatResultStep;
            if (data.huntingCombatResultTitle !== undefined)
                this.huntingCombatResultTitle = data.huntingCombatResultTitle;
            if (data.huntingCombatResultSummary !== undefined)
                this.huntingCombatResultSummary = data.huntingCombatResultSummary;
            if (data.huntingCombatResultTotal !== undefined)
                this.huntingCombatResultTotal = data.huntingCombatResultTotal;
            if (data.huntingCharacterUnlock !== undefined) this.huntingCharacterUnlock = data.huntingCharacterUnlock;
            if (data.huntingResultContinueVisible !== undefined)
                this.huntingResultContinueVisible = data.huntingResultContinueVisible;
            if (data.huntingMerchantActive !== undefined) this.huntingMerchantActive = data.huntingMerchantActive;
            if (data.huntingMerchantOffers !== undefined) this.huntingMerchantOffers = data.huntingMerchantOffers;
            if (data.huntingMerchantResult !== undefined) this.huntingMerchantResult = data.huntingMerchantResult;
            if (data.huntingChestEventActive !== undefined) this.huntingChestEventActive = data.huntingChestEventActive;
            if (data.huntingChestRarity !== undefined) this.huntingChestRarity = data.huntingChestRarity;
            if (data.huntingChestTitle !== undefined) this.huntingChestTitle = data.huntingChestTitle;
            if (data.huntingChestSubtext !== undefined) this.huntingChestSubtext = data.huntingChestSubtext;
            if (data.huntingChestConfirmLabel !== undefined)
                this.huntingChestConfirmLabel = data.huntingChestConfirmLabel;
            if (data.huntingEventActive !== undefined) this.huntingEventActive = data.huntingEventActive;
            if (data.huntingEventDetail !== undefined) this.huntingEventDetail = data.huntingEventDetail;
            if (data.huntingEventConfirmLabel !== undefined)
                this.huntingEventConfirmLabel = data.huntingEventConfirmLabel;
            if (data.huntingBattlePreparationActive !== undefined)
                this.huntingBattlePreparationActive = data.huntingBattlePreparationActive;
            if (data.huntingAutoAdvanceActive !== undefined)
                this.huntingAutoAdvanceActive = data.huntingAutoAdvanceActive;
            if (data.huntingAutoAdvanceLabel !== undefined) this.huntingAutoAdvanceLabel = data.huntingAutoAdvanceLabel;
            if (data.huntingAutoAdvanceRemainingMs !== undefined)
                this.huntingAutoAdvanceRemainingMs = data.huntingAutoAdvanceRemainingMs;
            if (data.huntingAutoAdvanceProgress !== undefined)
                this.huntingAutoAdvanceProgress = data.huntingAutoAdvanceProgress;
            if (data.huntingLootHudVisible !== undefined) this.huntingLootHudVisible = data.huntingLootHudVisible;
            if (data.huntingLootHudShards !== undefined) this.huntingLootHudShards = data.huntingLootHudShards;
            if (data.huntingLootHudEnhancementStones !== undefined)
                this.huntingLootHudEnhancementStones = data.huntingLootHudEnhancementStones;
            if (data.huntingLootHudChests !== undefined) this.huntingLootHudChests = data.huntingLootHudChests;
            if (data.huntingPartyHudVisible !== undefined) this.huntingPartyHudVisible = data.huntingPartyHudVisible;
            if (data.huntingSwapCharacter !== undefined) this.huntingSwapCharacter = data.huntingSwapCharacter;
            if (data.huntingPartyExperienceRewards !== undefined)
                this.huntingPartyExperienceRewards = data.huntingPartyExperienceRewards;
        }
    }));
</script>
<style scoped>

        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        background: #eeeeee;
    }

    :scope.hunting-party-hud-active {
        background: transparent;
    }

    .hunting-party-action-bar {
        position: absolute;
        right: clamp(6px, 2%, 18px);
        bottom: clamp(6px, 2%, 18px);
        display: flex;
        max-width: calc(100% - clamp(12px, 4%, 36px));
        gap: 6px;
        pointer-events: auto;
    }

        display: grid;
        min-width: 0;

        border-color: #3477a5;
    }

        border-color: #999;

    .hunting-party-action small {
        overflow: hidden;

    .hunting-party-action strong {

    }

        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 7.5rem), 1fr));

        overflow: hidden;

    .hunting-party-experience-card b {

        transition: opacity 400ms ease;
    }
    .hunting-overlay-enter-start {
        opacity: 0;

    }
    .hunting-overlay-leave-start {
        opacity: 1;

        opacity: 0;
    }

    .hunting-overlay-card {
        padding: 28px 32px;
        text-align: center;
    }

    :scope.hunting-combat-result-active .hunting-overlay-frame {
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 6fr) minmax(0, 1fr);
        align-items: center;
        pointer-events: auto;
    }

    :scope.hunting-combat-result-active .hunting-combat-unlock-card,
    :scope.hunting-combat-result-active .hunting-overlay-card,
    :scope.hunting-combat-result-active .hunting-combat-choice-card {
        grid-column: 2;
        grid-row: 1;
        width: 100%;
        max-height: 100%;
        box-sizing: border-box;
        overflow: hidden;

    }

    .hunting-combat-unlock-card {
        display: grid;
        gap: 1rem;
        place-items: center;
    }

    .hunting-combat-unlock-card > span {
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.14em;
    }

    .hunting-combat-unlock-reveal {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0.8em;
        font-size: clamp(1.35rem, 5vw, 2.5rem);
    }

    .hunting-combat-unlock-card > p {
        margin: 0;
        color: #555555;
        font-weight: 700;
    }

    .hunting-combat-choice-card > span {
        display: block;
        margin-bottom: 14px;
        color: #111111;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
    }

    .hunting-combat-choice-card > strong {
        display: block;
        color: #111111;
        font-size: clamp(2rem, 8vw, 3.4rem);
        letter-spacing: -0.05em;
    }

    .hunting-combat-result-summary {
        margin: 12px 0 0;
        color: #555555;
        font-size: 0.82rem;
