<div x-data="collectionFusionDialog">
    <div
        class="ch-fusion-modal"
        x-cloak
        x-show="state.visible"
        x-transition.opacity.duration.150ms
        @click.self="hide()"
        @keydown.escape.stop="hide()"
    >
        <section class="ch-fusion-dialog" role="dialog" aria-modal="true" aria-label="장비 합성">
            <div class="ch-shop-header">
                <strong>장비 합성</strong>
                <button class="ch-close" type="button" aria-label="닫기" @click="hide()">×</button>
            </div>
            <div class="ch-fusion-body">
                <p class="ch-fusion-description">
                    같은 등급 장비 3개를 선택하면 다음 등급의 새 장비 1개로 재탄생합니다.
                </p>
                <div class="ch-fusion-tier-tabs" role="tablist" aria-label="합성 등급 선택">
                    <template x-for="recipe in state.equipment.fusion.recipes" :key="recipe.rarity">
                        <button
                            class="ch-fusion-tier"
                            type="button"
                            x-bind:class="{ 'is-selected': state.selection.rarity === recipe.rarity }"
                            x-bind:aria-pressed="state.selection.rarity === recipe.rarity"
                            @click="selectRarity(recipe.rarity)"
                            x-text="recipe.rarityLabel + ' → ' + recipe.nextRarityLabel"
                        ></button>
                    </template>
                </div>
                <template x-if="selectedRecipe()">
                    <div class="ch-fusion-content">
                        <div class="ch-fusion-summary">
                            <div>
                                <strong x-text="selectedRecipe().rarityLabel + ' 장비 3개'"></strong>
                                <span x-text="'결과: ' + selectedRecipe().nextRarityLabel + ' 랜덤 장비'"></span>
                            </div>
                            <span
                                class="ch-fusion-cost"
                                x-text="'강화석 ' + selectedRecipe().cost.stones + ' · 파편 ' + selectedRecipe().cost.shards"
                            ></span>
                        </div>
                        <div class="ch-fusion-source-slots" aria-label="선택한 합성 재료">
                            <template x-for="index in state.equipment.fusion.sourceItemCount" :key="index">
                                <div class="ch-fusion-source-slot">
                                    <template x-if="selectedItems()[index - 1]">
                                        <div>
                                            <span x-text="'재료 ' + index"></span>
                                            <strong x-text="selectedItems()[index - 1].name"></strong>
                                            <small
                                                x-text="selectedItems()[index - 1].isEquipped ? '장착 중 · 합성 시 해제' : '선택됨'"
                                            ></small>
                                        </div>
                                    </template>
                                    <template x-if="!selectedItems()[index - 1]">
                                        <span x-text="'재료 ' + index + ' 선택'"></span>
                                    </template>
                                </div>
                            </template>
                        </div>
                        <div class="ch-fusion-candidates" aria-label="합성 재료 후보">
                            <template x-for="item in selectedRecipe().items" :key="item.instanceId">
                                <button
                                    class="ch-fusion-candidate"
                                    type="button"
                                    x-bind:class="{ 'is-selected': isItemSelected(item.instanceId) }"
                                    x-bind:aria-pressed="isItemSelected(item.instanceId)"
                                    x-bind:disabled="isSelectionFull() && !isItemSelected(item.instanceId)"
                                    @click="toggleItem(item.instanceId)"
                                >
                                    <strong x-text="item.name"></strong>
                                    <span
                                        x-text="item.stats.map(stat => stat.type + ' +' + stat.value).join(' · ')"
                                    ></span>
                                    <span
                                        class="ch-fusion-equipment-state"
                                        x-text="item.isEquipped ? '장착 중' : '보관 중'"
                                    ></span>
                                </button>
                            </template>
                            <div class="ch-empty" x-show="selectedRecipe().items.length === 0">
                                선택할 장비가 없습니다
                            </div>
                        </div>
                        <p class="ch-fusion-note">
                            선택한 장비는 모두 사라지며, 강화 단계와 장착 상태는 이어지지 않습니다.
                        </p>
                        <p class="ch-fusion-warning" x-show="resourceWarning()" x-text="resourceWarning()"></p>
                        <button
                            class="ch-btn ch-fusion-submit"
                            type="button"
                            x-bind:disabled="!canFuseSelectedItems()"
                            @click="fuseSelectedItems()"
                            x-text="'선택한 ' + state.equipment.fusion.sourceItemCount + '개 합성'"
                        ></button>
                    </div>
                </template>
            </div>
        </section>
    </div>
</div>

<script>
    window.createGameUI("collectionFusionDialog", () => {
        function getCollectionHubState() {
            return Alpine.store("uiManager").requireComponent("collectionHub").state;
        }

        const state = Alpine.reactive({
            visible: false,
            selection: { rarity: null, itemIds: [] },
            get equipment() {
                return getCollectionHubState().equipment;
            },
            get storage() {
                return getCollectionHubState().storage;
            }
        });

        function selectedRecipe() {
            return (state.equipment.fusion?.recipes ?? []).find((recipe) => recipe.rarity === state.selection.rarity);
        }

        function selectRarity(rarity) {
            state.selection = { rarity, itemIds: [] };
        }

        function selectedItems() {
            const items = selectedRecipe()?.items ?? [];
            return state.selection.itemIds
                .map((itemId) => items.find((item) => item.instanceId === itemId))
                .filter(Boolean);
        }

        function isItemSelected(instanceId) {
            return state.selection.itemIds.includes(instanceId);
        }

        function isSelectionFull() {
            return state.selection.itemIds.length >= (state.equipment.fusion?.sourceItemCount ?? 3);
        }

        function toggleItem(instanceId) {
            if (isItemSelected(instanceId)) {
                state.selection.itemIds = state.selection.itemIds.filter((itemId) => itemId !== instanceId);
                return;
            }
            if (!isSelectionFull()) state.selection.itemIds.push(instanceId);
        }

        function resourceWarning() {
            const recipe = selectedRecipe();
            if (!recipe) return "";
            if (state.equipment.enhancementStones < recipe.cost.stones) return "강화석이 부족합니다.";
            if (state.storage.shards < recipe.cost.shards) return "파편이 부족합니다.";
            return "";
        }

        function canFuseSelectedItems() {
            return (
                state.selection.itemIds.length === (state.equipment.fusion?.sourceItemCount ?? 3) && !resourceWarning()
            );
        }

        function hide() {
            state.visible = false;
            state.selection = { rarity: null, itemIds: [] };
        }

        return {
            state,
            show() {
                state.visible = true;
                selectRarity(state.equipment.fusion?.recipes?.[0]?.rarity ?? null);
            },
            hide,
            selectedRecipe,
            selectRarity,
            selectedItems,
            isItemSelected,
            isSelectionFull,
            toggleItem,
            resourceWarning,
            canFuseSelectedItems,
            fuseSelectedItems() {
                if (!canFuseSelectedItems()) return null;
                const sourceInstanceIds = [...state.selection.itemIds];
                hide();
                return Alpine.store("uiManager").invokeGameAction("fuseEquipmentItems", sourceInstanceIds);
            }
        };
    });
</script>

    }
