<button
    class="control-button"
    id="startButton"
    type="button"
    x-data="startButton"
    x-bind:class="{ hidden: hidden }"
    x-bind:disabled="disabledOverride !== null ? disabledOverride : (remainingPoints > 0 || locked)"
    x-text="textOverride !== null ? textOverride : (remainingPoints > 0 ? '스탯 ' + remainingPoints + ' 남음' : '토너먼트 시작')"
    @click="startTournament()"
>
    토너먼트 시작
</button>
<script>
    window.createGameUI("startButton", () => ({
        hidden: true,
        disabledOverride: null,
        textOverride: null,
        remainingPoints: 0,
        locked: false,
        startTournament() {
            window.requireGameActionBridge("startTournament").startTournament();
        },
        setState({ disabled, text, hidden } = {}) {
            if (hidden !== undefined) this.hidden = Boolean(hidden);
            this.disabledOverride = disabled !== undefined ? disabled : null;
            this.textOverride = text !== undefined ? text : null;
        }
    }));
</script>
<style scoped>
    :scope {
        position: absolute;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        min-width: 220px;
        z-index: 2;
    }

    :scope.hidden {
        opacity: 0;
        pointer-events: none;
    }

    @media (max-width: 760px) {
        :scope {
            bottom: 12px;
            min-width: min(280px, calc(100% - 32px));
            min-height: 48px;
            padding: 14px 18px;
            font-size: 1rem;
        }
    }
</style>
