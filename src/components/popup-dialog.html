<div
    x-data="popupDialog"
    class="bf-popup-overlay"
    x-show="state.visible"
    x-transition.opacity.duration.200ms
    @click.self="state.closeOnOutside === false || closePopup('close')"
>
    <div class="bf-popup-card">
        <div class="bf-popup-scroll">
            <strong class="bf-popup-title" x-text="state.title"></strong>
            <div class="bf-popup-body" x-html="state.bodyHtml"></div>
        </div>
        <div class="bf-popup-footer" x-show="state.buttons.length">
            <template x-for="btn in state.buttons" :key="btn.value">
                <button
                    type="button"
                    class="bf-popup-btn"
                    x-bind:class="btn.primary ? 'bf-popup-btn--primary' : ''"
                    x-text="btn.text"
                    @click="closePopup(btn.value ?? btn.text)"
                ></button>
            </template>
        </div>
    </div>
</div>

<script>
    Alpine.data("popupDialog", () => {
        const state = Alpine.reactive({
            visible: false,
            title: "",
            bodyHtml: "",
            buttons: [],
            closeOnOutside: true
        });

        function closePopup(value) {
            state.visible = false;
            setTimeout(() => {
                Alpine.store("popupDialog", { visible: false });
                if (window.PopupService) window.PopupService.resolve(value ?? "close");
            }, 250);
        }

        return {
            state,
            init() {
                this.$watch("$store.popupDialog", (val) => {
                    if (!val) {
                        state.visible = false;
                        return;
                    }
                    state.title = val.title ?? "";
                    state.bodyHtml = val.bodyHtml ?? "";
                    state.buttons = val.buttons ?? [];
                    state.closeOnOutside = val.closeOnOutside !== false;
                    state.visible = val.visible ?? false;
                }, { immediate: true });
            },
            closePopup
        };
    });
</script>
