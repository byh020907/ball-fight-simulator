<div
    x-data="popupDialog"
    class="bf-popup-overlay"
    x-show="visible"
    x-transition.opacity.duration.200ms
    role="dialog"
    aria-modal="true"
    aria-label="알림"
    tabindex="-1"
    @click.self="closeOnOutside === false || closePopup('close')"
    @keydown.escape="closePopup('close')"
>
    <div class="bf-popup-card">
        <div class="bf-popup-scroll">
            <strong class="bf-popup-title" x-text="title"></strong>
            <div class="bf-popup-body" x-show="content === null" x-html="bodyHtml"></div>
            <div class="hunting-stage-select" x-show="content?.type === 'hunting-stage-select'">
                <span class="hunting-section-label">원정지 선택</span>
                <div class="hunting-stage-grid">
                    <template x-for="stage in content?.stages ?? []" :key="stage.id">
                        <button
                            type="button"
                            class="hunting-stage-btn"
                            :class="{ active: stage.active }"
                            @click="selectHuntingStage(stage.id)"
                        >
                            <strong x-text="stage.name"></strong>
                            <span x-text="`기준 ${stage.arenaWidth}×${stage.arenaHeight}`"></span>
                        </button>
                    </template>
                </div>
                <p class="hunting-stage-desc" x-show="content?.selectedStage">
                    <span x-text="content?.selectedStage?.description"></span><br />
                    <span
                        x-text="`기준 전장 ${content?.selectedStage?.arenaWidth}×${content?.selectedStage?.arenaHeight} · 적 수에 따라 확장`"
                    ></span>
                </p>
            </div>
            <div class="hunting-checkpoint-select" x-show="content?.type === 'hunting-checkpoint-select'">
                <span class="hunting-section-label" x-show="!huntingPartyPickerSlotKey">원정 편성</span>
                <div class="hunting-party-grid" x-show="!huntingPartyPickerSlotKey">
                    <template x-for="slot in getHuntingPartySlots()" :key="slot.key">
                        <button
                            type="button"
                            class="hunting-party-slot"
                            :class="[`role-${slot.role}`, { empty: !slot.value }]"
                            :aria-label="`${slot.label} 선택`"
                            @click="openHuntingPartyPicker(slot.key)"
                        >
                            <span class="hunting-party-slot-heading">
                                <strong x-text="slot.label"></strong>
                                <small x-text="slot.detail"></small>
                            </span>
                            <template x-if="slot.value">
                                <span class="hunting-party-slot-character">
                                    <canvas
                                        class="character-portrait hunting-character-portrait"
                                        x-character-portrait="getHuntingPartyCharacter(slot.value).portrait"
                                    ></canvas>
                                    <span>
                                        <strong x-text="getHuntingPartyCharacter(slot.value).name"></strong>
                                        <small x-text="`Lv.${getHuntingPartyCharacter(slot.value).level}`"></small>
                                    </span>
                                    <b aria-hidden="true">›</b>
                                </span>
                            </template>
                            <span class="hunting-party-slot-empty" x-show="!slot.value">＋ 캐릭터 선택</span>
                        </button>
                    </template>
                </div>

                <div class="hunting-party-picker" x-show="huntingPartyPickerSlotKey">
                    <div class="hunting-party-picker-heading">
                        <button
                            type="button"
                            class="hunting-party-picker-back"
                            aria-label="편성으로 돌아가기"
                            @click="closeHuntingPartyPicker()"
                        >
                            ←
                        </button>
                        <span>
                            <strong x-text="getActiveHuntingPartySlot()?.label"></strong>
                            <small>캐릭터 선택</small>
                        </span>
                    </div>
                    <div class="hunting-party-character-grid">
                        <button
                            type="button"
                            class="hunting-party-character-card empty"
                            x-show="!getActiveHuntingPartySlot()?.required"
                            @click="clearHuntingPartySlot()"
                        >
                            <i class="hunting-character-orb empty">＋</i>
                            <span><strong>없음</strong><small>슬롯 비우기</small></span>
                        </button>
                        <template
                            x-for="character in getHuntingPartyCharacters(getActiveHuntingPartySlot())"
                            :key="character.id"
                        >
                            <button
                                type="button"
                                class="hunting-party-character-card"
                                :class="{ active: getActiveHuntingPartySlot()?.value === character.id }"
                                :disabled="isHuntingPartyCharacterUsed(character.id, huntingPartyPickerSlotKey)"
                                @click="selectHuntingPartyCharacter(character.id)"
                            >
                                <canvas
                                    class="character-portrait hunting-character-portrait"
                                    x-character-portrait="character.portrait"
                                ></canvas>
                                <span>
                                    <strong x-text="character.name"></strong>
                                    <small x-text="`Lv.${character.level}`"></small>
                                </span>
                                <b x-show="getActiveHuntingPartySlot()?.value === character.id">✓</b>
                            </button>
                        </template>
                    </div>
                </div>

                <div class="hunting-checkpoint-section" x-show="!huntingPartyPickerSlotKey">
                    <span class="hunting-section-label">첫 조우 층 선택</span>
                    <p class="hunting-checkpoint-desc">도달한 층까지의 체크포인트만 선택할 수 있습니다.</p>
                    <div class="hunting-checkpoint-grid">
                        <template x-for="checkpoint in content?.checkpoints ?? []" :key="checkpoint.floor">
                            <button
                                type="button"
                                class="hunting-checkpoint-btn"
                                :disabled="!checkpoint.available || !isHuntingPartyValid()"
                                @click="startHuntingParty(checkpoint.floor)"
                            >
                                <strong x-text="checkpoint.floor"></strong>
                                <span x-text="`${checkpoint.floor}층 첫 조우`"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </div>
        </div>
        <div class="bf-popup-footer" x-show="buttons.length">
            <template x-for="btn in buttons" :key="btn.value">
                <button
                    type="button"
                    class="bf-popup-btn"
                    x-bind:class="btn.primary ? 'bf-popup-btn--primary' : ''"
                    x-text="btn.text"
                    @click="closePopup(btn.value ?? btn.text)"
                ></button>
            </template>
        </div>
    </div>
</div>

<script>
    window.createGameUI("popupDialog", () => {
        let _resolve = null;
        let dialogElement = null;

        function focusDialog() {
            requestAnimationFrame(() => dialogElement.focus());
        }

        function closePopup(value) {
            const captured = _resolve;
            _resolve = null;
            this.visible = false;
            setTimeout(() => {
                if (captured) {
                    captured(value ?? "close");
                }
            }, 250);
        }

        return {
            visible: false,
            title: "",
            bodyHtml: "",
            content: null,
            buttons: [],
            closeOnOutside: true,
            huntingPartyPickerSlotKey: null,
            init() {
                dialogElement = this.$root;
            },
            closePopup,
            show(options = {}) {
                if (_resolve) {
                    const r = _resolve;
                    _resolve = null;
                    r("cancel");
                }
                return new Promise((resolve) => {
                    _resolve = resolve;
                    this.title = options.title ?? "";
                    this.bodyHtml = options.bodyHtml ?? "";
                    this.content = options.content ?? null;
                    this.buttons = options.buttons ?? [{ text: "닫기", value: "ok", primary: true }];
                    this.closeOnOutside = options.closeOnOutside !== false;
                    this.huntingPartyPickerSlotKey = null;
                    this.visible = true;
                    focusDialog();
                });
            },
            close() {
                closePopup.call(this, "close");
            },
            selectHuntingStage(stageId) {
                return Alpine.store("uiManager").invokeGameAction("selectHuntingStage", stageId);
            },
            getHuntingPartySelection() {
                const party = this.content?.party ?? {};
                const normalize = (value) => value || null;
                return {
                    leaderId: normalize(party.leaderId),
                    companionIds: (party.companionIds ?? []).map(normalize),
                    swapId: this.content?.swapEnabled ? normalize(party.swapId) : null
                };
            },
            getHuntingPartySlots() {
                const party = this.getHuntingPartySelection();
                const slots = [
                    {
                        key: "leader",
                        role: "leader",
                        label: "주 캐릭터",
                        detail: "장비 적용",
                        value: party.leaderId,
                        required: true,
                        leadOnly: true
                    },
                    ...party.companionIds.map((value, index) => ({
                        key: `companion-${index}`,
                        role: "companion",
                        label: `동료 ${index + 1}`,
                        detail: "장비 없음",
                        value
                    }))
                ];
                if (this.content?.swapEnabled) {
                    slots.push({ key: "swap", role: "swap", label: "교대", detail: "장비 공유", value: party.swapId });
                }
                return slots;
            },
            getHuntingPartyCharacters(slot) {
                const characters = this.content?.characters ?? [];
                return slot?.leadOnly ? characters.filter((character) => character.canLead) : characters;
            },
            getHuntingPartyCharacter(characterId) {
                return (
                    this.getHuntingPartyCharacters().find((character) => character.id === characterId) ?? {
                        id: null,
                        name: "선택",
                        color: "#e0e0e0",
                        level: 1
                    }
                );
            },
            getActiveHuntingPartySlot() {
                return this.getHuntingPartySlots().find((slot) => slot.key === this.huntingPartyPickerSlotKey) ?? null;
            },
            openHuntingPartyPicker(slotKey) {
                this.huntingPartyPickerSlotKey = slotKey;
            },
            closeHuntingPartyPicker() {
                this.huntingPartyPickerSlotKey = null;
            },
            selectHuntingPartyCharacter(characterId) {
                this.setHuntingPartySlot(this.huntingPartyPickerSlotKey, characterId);
                this.closeHuntingPartyPicker();
            },
            clearHuntingPartySlot() {
                const slot = this.getActiveHuntingPartySlot();
                if (!slot?.required) this.setHuntingPartySlot(slot.key, null);
                this.closeHuntingPartyPicker();
            },
            setHuntingPartySlot(slotKey, value) {
                const normalized = value || null;
                if (slotKey === "leader") this.content.party.leaderId = normalized;
                else if (slotKey === "swap") this.content.party.swapId = normalized;
                else this.content.party.companionIds[Number(slotKey.split("-")[1])] = normalized;
            },
            isHuntingPartyValid() {
                const party = this.getHuntingPartySelection();
                const selectedIds = [party.leaderId, ...party.companionIds, party.swapId].filter(Boolean);
                return Boolean(party.leaderId) && new Set(selectedIds).size === selectedIds.length;
            },
            isHuntingPartyCharacterUsed(characterId, currentSlot) {
                return this.getHuntingPartySlots().some(
                    (slot) => slot.key !== currentSlot && slot.value === characterId
                );
            },
            startHuntingParty(encounterFloor) {
                return Alpine.store("uiManager").invokeGameAction(
                    this.content?.startAction ?? "selectHuntingCheckpoint",
                    encounterFloor,
                    this.getHuntingPartySelection(),
                    this.content?.startContext ?? null
                );
            },
            resolve(value) {
                if (_resolve) {
                    const r = _resolve;
                    _resolve = null;
                    r(value);
                }
            }
        };
    });
</script>
