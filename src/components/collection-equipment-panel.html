<div x-data="collectionEquipmentPanel" @keydown.escape.window="closeSpecialTooltip()" @click.outside="closeSpecialTooltip()">
    <div class="ch-content" x-show="state.activeTab === 'equipment'" role="tabpanel">
        <div class="ch-toolbar">
            <span class="ch-toolbar-title">장비 인벤토리</span>
            <span class="ch-storage-currency">강화석 <b x-text="state.equipment.enhancementStones"></b></span>
            <button class="ch-btn" type="button" @click="openFusion()">합성</button>
            <button class="ch-btn ch-shop-button" type="button" @click="openShop()">상점</button>
        </div>
        <div class="ch-equip-slots">
            <h4>장착 슬롯</h4>
            <div class="ch-equip-slot-grid">
                <template
                    x-for="(slotName, slotId) in { weapon: '무기', armor: '방어구', accessory1: '장신구1', accessory2: '장신구2' }"
                >
                    <div class="ch-equip-slot-card">
                        <div class="ch-equip-slot-label" x-text="slotName"></div>
                        <div class="ch-equip-slot-item" x-text="state.equipment.equippedSlots[slotId] || '—'"></div>
                    </div>
                </template>
            </div>
            <div class="ch-equip-inventory-summary">
                <span
                    >인벤토리 <b x-text="state.equipment.inventoryUsed"></b>/<b
                        x-text="state.equipment.inventorySlots"
                    ></b
                ></span>
                <button
                    class="ch-btn"
                    x-show="state.equipment.canExpand"
                    @click="expandInventory()"
                    x-text="`확장 (파편 ${state.equipment.expandCost} · +${state.equipment.expandGain}칸)`"
                ></button>
                <span
                    x-show="!state.equipment.canExpand && state.equipment.inventoryUsed >= state.equipment.inventorySlots"
                    class="ch-equip-inventory-full"
                    >가득 참 — 장비를 분해하거나 확장하세요</span
                >
            </div>
        </div>
        <div class="ch-equip-list" @scroll="closeSpecialTooltip()">
            <h4>보유 장비</h4>
            <template x-for="item in state.equipment.items" :key="item.instanceId">
                <div class="ch-equip-card" x-bind:class="'ch-equip--' + item.rarity">
                    <div class="ch-equip-card-header">
                        <strong x-text="item.name"></strong>
                        <span class="ch-equip-rarity" x-text="item.rarityLabel"></span>
                        <span class="ch-equip-slot-badge" x-text="'Lv.' + item.requiredLevel"></span>
                        <span class="ch-equip-slot-badge" x-text="item.slot"></span>
                        <span
                            class="ch-equip-enhance"
                            x-show="item.enhanceLevel > 0"
                            x-text="'+' + item.enhanceLevel"
                        ></span>
                    </div>
                    <div class="ch-equip-card-stats">
                        <template x-for="stat in item.stats">
                            <span class="ch-equip-stat" x-text="stat.type + ' +' + stat.value"></span>
                        </template>
                        <template x-if="item.specialOptions.length > 0">
                            <div class="ch-equip-special-list">
                                <span class="ch-equip-special-prefix">특수:</span>
                                <template x-for="option in item.specialOptions" :key="option.type">
                                    <span
                                        class="ch-equip-special-option"
                                        tabindex="0"
                                        x-bind:aria-label="`${option.label} +${option.value}%. ${option.description}`"
                                        x-bind:aria-describedby="specialTooltip.id === specialTooltipId(item, option) ? specialTooltip.id : null"
                                        @mouseenter="openSpecialTooltip(item, option, $el)"
                                        @mouseleave="closeSpecialTooltip()"
                                        @focus="openSpecialTooltip(item, option, $el)"
                                        @blur="closeSpecialTooltip()"
                                        @click="openSpecialTooltip(item, option, $el)"
                                    >
                                        <span
                                            class="ch-equip-stat ch-equip-stat--special"
                                            x-text="option.label + ' +' + option.value + '%'"
                                        ></span>
                                    </span>
                                </template>
                            </div>
                        </template>
                    </div>
                    <div class="ch-equip-card-actions">
                        <button
                            x-show="!item.isEquipped"
                            class="ch-btn"
                            x-bind:disabled="!item.canEquip"
                            @click="equipItem(item.instanceId)"
                            x-text="item.canEquip ? '장착' : `잠김 Lv.${item.requiredLevel}`"
                        ></button>
                        <button
                            x-show="item.isEquipped"
                            class="ch-btn ch-btn--danger"
                            @click="unequipItem(item.instanceId)"
                            x-text="'해제'"
                        ></button>
                        <button
                            class="ch-btn"
                            x-show="item.canEnhance"
                            @click="enhanceItem(item.instanceId)"
                            x-text="`강화 (+${item.enhanceLevel}→+${item.enhanceLevel + 1}, ${Math.round(item.enhanceFailureRate * 100)}%실패)`"
                        ></button>
                        <button
                            class="ch-btn ch-btn--danger"
                            @click="disassembleItem(item.instanceId)"
                            x-text="`분해 (+${item.disassembleReward}강화석)`"
                        ></button>
                        <button
                            class="ch-btn"
                            @click="sellItem(item.instanceId)"
                            x-text="`판매 (+${item.sellReward}파편)`"
                        ></button>
                    </div>
                </div>
            </template>
            <div class="ch-empty" x-show="state.equipment.items.length === 0">보유한 장비가 없습니다</div>
        </div>
    </div>
    <template x-teleport="body">
        <div
            class="ch-equip-special-tooltip"
            x-cloak
            x-show="specialTooltip.visible"
            x-ref="specialTooltip"
            x-bind:id="specialTooltip.id"
            x-bind:style="specialTooltip.style"
            x-text="specialTooltip.description"
            role="tooltip"
        ></div>
    </template>
</div>

<script>
    window.createGameUI("collectionEquipmentPanel", () => {
        function getCollectionHub() {
            return Alpine.store("uiManager").requireComponent("collectionHub");
        }

        function invokeGameAction(actionName, ...args) {
            return Alpine.store("uiManager").invokeGameAction(actionName, ...args);
        }

        return {
            specialTooltip: {
                visible: false,
                id: "",
                description: "",
                placement: "below",
                style: ""
            },
            get state() {
                return getCollectionHub().state;
            },
            specialTooltipId(item, option) {
                return `equipment-special-tooltip-${item.instanceId}-${option.type}`;
            },
            openSpecialTooltip(item, option, anchor) {
                const rect = anchor.getBoundingClientRect();
                const viewportMargin = 8;
                const tooltipId = this.specialTooltipId(item, option);

                this.specialTooltip = {
                    visible: true,
                    id: tooltipId,
                    description: option.description,
                    placement: "below",
                    style: `left: ${viewportMargin}px; top: ${rect.bottom + 6}px; visibility: hidden;`
                };

                this.$nextTick(() => {
                    if (!this.specialTooltip.visible || this.specialTooltip.id !== tooltipId) return;

                    const tooltip = this.$refs.specialTooltip;
                    if (!tooltip) return;

                    const tooltipRect = tooltip.getBoundingClientRect();
                    const viewportWidth = document.documentElement.clientWidth;
                    const viewportHeight = document.documentElement.clientHeight;
                    const maxLeft = Math.max(viewportMargin, viewportWidth - tooltipRect.width - viewportMargin);
                    const maxTop = Math.max(viewportMargin, viewportHeight - tooltipRect.height - viewportMargin);
                    const canFitBelow = rect.bottom + 6 + tooltipRect.height <= viewportHeight - viewportMargin;
                    const canFitAbove = rect.top - 6 - tooltipRect.height >= viewportMargin;
                    const placement = canFitBelow || !canFitAbove ? "below" : "above";
                    const top = placement === "below" ? rect.bottom + 6 : rect.top - 6 - tooltipRect.height;

                    this.specialTooltip = {
                        ...this.specialTooltip,
                        placement,
                        style: `left: ${Math.min(Math.max(viewportMargin, rect.left), maxLeft)}px; top: ${Math.min(
                            Math.max(viewportMargin, top),
                            maxTop
                        )}px;`
                    };
                });
            },
            closeSpecialTooltip() {
                this.specialTooltip.visible = false;
            },
            openFusion() {
                return Alpine.store("uiManager").requireComponent("collectionFusionDialog").show();
            },
            openShop() {
                return Alpine.store("uiManager").requireComponent("collectionShopPanel").show();
            },
            expandInventory() {
                return invokeGameAction("expandInventory");
            },
            equipItem(instanceId) {
                return invokeGameAction("equipItem", instanceId);
            },
            unequipItem(instanceId) {
                return invokeGameAction("unequipItem", instanceId);
            },
            enhanceItem(instanceId) {
                return invokeGameAction("enhanceItem", instanceId);
            },
            disassembleItem(instanceId) {
                return invokeGameAction("disassembleItem", instanceId);
            },
            sellItem(instanceId) {
                return invokeGameAction("sellItem", instanceId);
            }
        };
    });
</script>
