                                class="bracket-dot"
                                x-bind:style="match.a ? 'background:' + match.a.color : ''"
                                x-show="match.a"
                            ></span>
                            <span
                                x-text="match.a ? (match.a.isPlayer ? 'YOU \u00B7 ' : '') + match.a.name : (rIndex === 0 ? 'BYE' : 'TBD')"

                        </div>
                        <div
                            class="bracket-slot"
                            x-bind:class="{ winner: match.winnerId === (match.b?.id ?? -1), player: match.b?.isPlayer, empty: !match.b }"
