<div
    class="overlay"
    id="overlay"
    x-data="gameOverlay"
    x-show="$store.gameOverlay.visible"
    x-transition:enter="overlay-enter"
    x-transition:enter-start="overlay-enter-start"
    x-transition:enter-end="overlay-enter-end"
    x-transition:leave="overlay-leave"
    x-transition:leave-start="overlay-leave-start"
    x-transition:leave-end="overlay-leave-end"
    x-bind:class="{ transient: $store.gameOverlay.transient }"
>
    <div class="overlay-card">
        <span x-text="$store.gameOverlay.label">Waiting Room</span>
        <strong x-text="$store.gameOverlay.text">START THE FIGHT</strong>
        <p x-show="$store.gameOverlay.subtext" x-text="$store.gameOverlay.subtext"></p>
        <xp-reward-panel class="xp-reward"></xp-reward-panel>
        <div class="hunting-route" x-show="$store.gameOverlay.huntingMoving">
            <div class="hunting-route-head">
                <span x-text="$store.gameOverlay.huntingMoveFrom + 'F'"></span>
                <strong x-text="$store.gameOverlay.huntingMoveTo + 'F'"></strong>
            </div>
            <div class="hunting-route-track" aria-hidden="true">
                <i
                    x-bind:style="'width:' + Math.min(100, Math.round((($store.gameOverlay.huntingMoveStep || 0) / Math.max(1, $store.gameOverlay.huntingMoveMax || 10)) * 100)) + '%'"
                ></i>
            </div>
            <div class="hunting-route-foot">
                <span x-text="$store.gameOverlay.huntingMoveMessage"></span>
                <b
                    x-text="($store.gameOverlay.huntingMoveStep || 0) + '/' + ($store.gameOverlay.huntingMoveMax || 10)"
                ></b>
            </div>
        </div>
        <div
            class="hunting-choice"
            x-show="$store.gameOverlay.huntingChoiceVisible && !$store.gameOverlay.huntingMoving"
        >
            <div class="hunting-choice-info">
                <span x-text="$store.gameOverlay.huntingLootSummary"></span>
            </div>
            <div class="hunting-choice-hint" x-show="$store.gameOverlay.huntingMoveMessage">
                <span x-text="$store.gameOverlay.huntingMoveMessage"></span>
            </div>
            <div class="hunting-choice-buttons">
                <button
                    class="hunting-btn retreat"
                    type="button"
                    x-show="$store.gameOverlay.huntingCanRetreat"
                    @click="huntingRetreat()"
                >
                    포탈 귀환
                </button>
                <button class="hunting-btn advance" type="button" @click="huntingAdvance()">10층 전진</button>
            </div>
        </div>
    </div>
</div>
<script>
    Alpine.data("gameOverlay", () => ({
        huntingRetreat() {
            window.BallFightComponentBridge?.huntingRetreat();
        },
        huntingAdvance() {
            window.BallFightComponentBridge?.huntingAdvance();
        }
    }));
</script>
