<div
    class="overlay"
    id="overlay"
    x-data="gameOverlay"
    x-show="visible"
    x-transition:enter="overlay-enter"
    x-transition:enter-start="overlay-enter-start"
    x-transition:enter-end="overlay-enter-end"
    x-transition:leave="overlay-leave"
    x-transition:leave-start="overlay-leave-start"
    x-transition:leave-end="overlay-leave-end"
    x-bind:class="{
        transient: transient,
        'result-sequence-active': resultSequence,
        'result-sequence-slide': resultSequenceSlide,
        'result-sequence-empty-experience': resultSequence?.id === 'experience' && !resultSequence?.xpReward
    }"
>
    <div class="result-sequence-frame">
        <div class="overlay-card">
            <span x-text="label">Waiting Room</span>
            <strong x-text="text">START THE FIGHT</strong>
            <p x-show="subtext" x-text="subtext"></p>
            <xp-reward-panel class="xp-reward"></xp-reward-panel>
            <div class="mastery-reward" x-show="masteryReward">
                <span class="mastery-reward-label">숙련도 보상</span>
                <div class="mastery-reward-title">
                    <b x-text="masteryReward?.sourceName"></b>
                    <em x-text="masteryReward?.tierLabel"></em>
                </div>
                <b class="mastery-reward-effect-name" x-text="masteryReward?.effectName"></b>
                <p class="mastery-reward-effect" x-text="masteryReward?.effectDescription"></p>
                <p class="mastery-reward-scope" x-text="masteryReward?.scopeText"></p>
                <p
                    class="mastery-reward-next"
                    x-text="'다음 도전 시 상대 Lv.' + (masteryReward?.nextOpponentLevel ?? 1) + ' 시작'"
                ></p>
            </div>
        </div>
        <button
            class="result-sequence-tab"
            type="button"
            x-show="resultSequence"
            x-bind:class="{ final: resultSequence?.isFinal }"
            x-bind:aria-label="resultSequence?.isFinal ? '결과 확인' : '다음 결과 보기'"
            @click="handleResultSequenceAction()"
        >
            <span
                x-text="'결과 ' + (resultSequence?.currentStep ?? 1) + '/' + (resultSequence?.totalSteps ?? 1)"
            ></span>
            <b x-text="resultSequence?.isFinal ? '확인' : '》'"></b>
        </button>
    </div>
</div>
<script>
    window.createGameUI("gameOverlay", () => ({
        visible: false,
        transient: false,
        label: "",
        text: "",
        subtext: "",
        masteryReward: null,
        resultSequence: null,
        resultSequenceSlide: false,
        resultSequenceStepKey: "",

        handleResultSequenceAction() {
            if (this.resultSequence?.isFinal) {
                Alpine.store("uiManager").invokeGameAction("confirmResultSequence");
                return;
            }
            Alpine.store("uiManager").invokeGameAction("advanceResultSequence");
        },
        show({
            label,
            text,
            subtext = "",
            transient = false,
            xpReward = null,
            masteryReward = null,
            resultSequence = null
        } = {}) {
            const nextStepKey = resultSequence ? `${resultSequence.id}:${resultSequence.currentStep}` : "";
            const shouldSlide = Boolean(
                this.resultSequenceStepKey && nextStepKey && this.resultSequenceStepKey !== nextStepKey
            );
            this.visible = true;
            this.transient = transient;
            this.label = label ?? "";
            this.text = text ?? "";
            this.subtext = subtext;
            this.masteryReward = masteryReward;
            this.resultSequence = resultSequence;
            this.resultSequenceStepKey = nextStepKey;
            this.resultSequenceSlide = false;
            if (shouldSlide) {
                requestAnimationFrame(() => {
                    this.resultSequenceSlide = true;
                });
            }
            const xpRewardPanel = Alpine.store("uiManager").requireComponent("xpRewardPanel");
            if (xpReward) {
                xpRewardPanel.animate(xpReward);
            } else {
                xpRewardPanel.hide();
            }
        },
        hide() {
            this.reset();
        },
        reset() {
            this.visible = false;
            this.transient = false;
            this.label = "";
            this.text = "";
            this.subtext = "";
            this.masteryReward = null;
            this.resultSequence = null;
            this.resultSequenceSlide = false;
            this.resultSequenceStepKey = "";
            Alpine.store("uiManager").requireComponent("xpRewardPanel").reset();
        },
        showTransient(label, text) {
            this.show({ label, text, transient: true });
        }
    }));
</script>
