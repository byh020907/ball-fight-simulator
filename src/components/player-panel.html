<section
    class="player-panel"
    id="playerPanel"
    x-data="playerPanel"
    x-bind:class="{ locked: $store.playerPanel.locked }"
>
    <div class="player-panel-actions" aria-label="보조 메뉴">
        <button class="help-icon" type="button" title="게임 도움말" @click="openHelp()">?</button>
        <button
            class="collection-icon"
            type="button"
            title="컬렉션"
            aria-label="컬렉션 열기"
            @click="openCollectionHub()"
        >
            C
        </button>
    </div>
    <div class="player-title">
        <span>내 캐릭터</span>
        <div class="player-title-row">
            <canvas
                id="playerFaceCanvas"
                width="50"
                height="50"
                x-init="
                    $el.width = 50;
                    $el.height = 50
                "
            ></canvas>
            <strong
                x-text="$store.playerPanel.fighter?.name"
                x-bind:style="'color:' + ($store.playerPanel.fighter?.color || '#000')"
            ></strong>
        </div>
    </div>
    <p class="player-note">
        <span x-text="$store.playerPanel.fighter?.title || ''"></span>
        <span
            x-show="!$store.playerPanel.locked"
            x-text="' \u00B7 시작 전 ' + $store.playerPanel.totalPoints + ' 포인트를 배분하세요.'"
        ></span>
        <span
            x-show="!$store.playerPanel.locked && $store.playerPanel.bonusPoints > 0"
            class="bonus-points-badge"
            x-text="' (+' + $store.playerPanel.bonusPoints + ' 보너스)'"
        ></span>
    </p>
    <div class="player-xp-meter">
        <div class="player-xp-head">
            <strong x-text="$store.playerPanel.experience.levelLabel"></strong>
            <span x-text="Number($store.playerPanel.experience.totalXp || 0).toLocaleString() + ' XP'"></span>
        </div>
        <div class="player-xp-bar" aria-hidden="true">
            <div
                class="player-xp-fill"
                x-bind:style="'width:' + ($store.playerPanel.experience.progressPct || 0) + '%; background:' + ($store.playerPanel.fighter?.color || '#59d6ff')"
            ></div>
        </div>
        <div class="player-xp-foot">
            <span x-text="$store.playerPanel.experience.progressText"></span>
            <span x-text="$store.playerPanel.experience.nextText"></span>
        </div>
        <div
            class="player-xp-reward"
            x-show="$store.playerPanel.experience.nextRewardText"
            x-text="$store.playerPanel.experience.nextRewardText"
        ></div>
    </div>
    <div class="player-equipment-panel">
        <div class="player-equipment-head">
            <strong>장비</strong>
            <span
                x-text="'Lv.' + ($store.playerPanel.equipmentSummary.characterLevel || 1) + ' · ' + $store.playerPanel.equipmentSummary.inventoryUsed + '/' + $store.playerPanel.equipmentSummary.inventorySlots"
            ></span>
        </div>
        <div class="player-equipment-slots">
            <template x-for="slot in $store.playerPanel.equipmentSummary.slots" :key="slot.id">
                <div class="player-equipment-slot" x-bind:class="{ empty: slot.empty, locked: slot.locked }">
                    <span x-text="slot.label"></span>
                    <b x-text="slot.name"></b>
                    <em x-show="slot.locked" x-text="'Lv.' + slot.requiredLevel"></em>
                </div>
            </template>
        </div>
        <div class="player-equipment-foot">
            <span x-text="$store.playerPanel.equipmentSummary.statLine"></span>
            <button type="button" @click="openEquipmentHub()">장비 화면</button>
        </div>
    </div>
    <div class="point-meter">
        <span
            x-text="'사용 ' + ($store.playerPanel.totalPoints - $store.playerPanel.remainingPoints) + '/' + $store.playerPanel.totalPoints"
        ></span>
        <b
            x-text="$store.playerPanel.remainingPoints > 0 ? $store.playerPanel.remainingPoints + ' 남음' : '준비 완료'"
        ></b>
    </div>
    <div class="allocation-summary">
        <span x-text="$store.playerPanel.allocationSummary"></span>
    </div>
    <div class="stat-board">
        <template x-for="stat in $store.playerPanel.statDefs" :key="stat.key">
            <div class="stat-row">
                <div class="stat-copy">
                    <strong x-text="stat.label"></strong>
                    <span x-text="stat.description"></span>
                </div>
                <button
                    type="button"
                    @click="adjustStat(stat.key, -10)"
                    x-bind:disabled="$store.playerPanel.locked || ($store.playerPanel.allocation[stat.key] ?? 0) <= 0"
                >
                    -10
                </button>
                <button
                    type="button"
                    @click="adjustStat(stat.key, -1)"
                    x-bind:disabled="$store.playerPanel.locked || ($store.playerPanel.allocation[stat.key] ?? 0) <= 0"
                >
                    -
                </button>
                <em x-text="($store.playerPanel.allocation[stat.key] ?? 0) + '%'"></em>
                <button
                    type="button"
                    @click="adjustStat(stat.key, 1)"
                    x-bind:disabled="$store.playerPanel.locked || $store.playerPanel.remainingPoints <= 0"
                >
                    +
                </button>
                <button
                    type="button"
                    @click="adjustStat(stat.key, 10)"
                    x-bind:disabled="$store.playerPanel.locked || $store.playerPanel.remainingPoints <= 0"
                >
                    +10
                </button>
            </div>
        </template>
    </div>
    <div class="challenge-level-row" x-show="!$store.playerPanel.locked">
        <span class="challenge-label">도전 단계</span>
        <button
            type="button"
            class="challenge-btn"
            @click="adjustChallengeLevel(-1)"
            x-bind:disabled="$store.playerPanel.challengeLevel <= 0"
        >
            -
        </button>
        <em class="challenge-value" x-text="$store.playerPanel.challengeLevel"></em>
        <button
            type="button"
            class="challenge-btn"
            @click="adjustChallengeLevel(1)"
            x-bind:disabled="$store.playerPanel.challengeLevel >= $store.playerPanel.highestUnlockedLevel"
        >
            +
        </button>
        <span class="challenge-max" x-text="'/ ' + $store.playerPanel.highestUnlockedLevel"></span>
    </div>
    <div
        class="bonus-summary"
        x-show="$store.playerPanel.progressionBonusSummary"
        x-text="$store.playerPanel.progressionBonusSummary"
    ></div>
    <div class="player-actions" data-player-actions>
        <button
            class="action-btn"
            type="button"
            @click="randomAllocation()"
            x-bind:disabled="$store.playerPanel.locked"
        >
            자동 배분
        </button>
        <button
            class="action-btn reset"
            type="button"
            @click="resetAllocation()"
            x-bind:disabled="$store.playerPanel.locked"
        >
            초기화
        </button>
    </div>
</section>
<script>
    Alpine.data("playerPanel", () => ({
        adjustStat(key, delta) {
            window.BallFightComponentBridge?.adjustStat(key, delta);
        },
        randomAllocation() {
            window.BallFightComponentBridge?.randomAllocation();
        },
        resetAllocation() {
            window.BallFightComponentBridge?.resetAllocation();
        },
        adjustChallengeLevel(delta) {
            window.BallFightComponentBridge?.adjustChallengeLevel(delta);
        },
        openCollectionHub() {
            if (window.BallFightComponentBridge?.openCollectionHub) {
                window.BallFightComponentBridge.openCollectionHub("roster");
                return;
            }
            window.CollectionHubService?.open?.("roster");
        },
        openEquipmentHub() {
            if (window.BallFightComponentBridge?.openCollectionHub) {
                window.BallFightComponentBridge.openCollectionHub("equipment");
                return;
            }
            window.CollectionHubService?.open?.("equipment");
        },
        openHelp() {
            window.BallFightComponentBridge?.openHelp();
        }
    }));
</script>
