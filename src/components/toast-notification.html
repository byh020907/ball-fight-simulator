<div x-data="toastNotification" aria-live="polite">
    <div
        class="toast"
        x-show="visible"
        x-transition:enter="toast-enter"
        x-transition:leave="toast-leave"
        x-text="message"
    ></div>
</div>

<script>
    window.createGameUI("toastNotification", () => {
        let _queue = [];
        let _timer = null;

        function processQueue() {
            if (_timer || _queue.length === 0) return;
            const item = _queue.shift();
            this.message = item.message;
            this.visible = true;
            _timer = setTimeout(() => {
                this.visible = false;
                _timer = null;
                processQueue.call(this);
            }, item.duration);
        }

        return {
            visible: false,
            message: "",
            show(message, duration = 3500) {
                _queue.push({ message, duration });
                processQueue.call(this);
            }
        };
    });
</script>

<style scoped>
.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #202020;
    color: #fff;
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    z-index: 9999;
    pointer-events: none;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    white-space: nowrap;
}
.toast-enter {
    opacity: 0;
    transform: translateX(-50%) translateY(-20px);
}
.toast-leave {
    opacity: 0;
    transform: translateX(-50%) translateY(10px);
    transition: all 300ms ease;
}
</style>
