<div
    x-data="collectionHub"
    class="ch-overlay"
    x-show="state.visible"
    x-transition.opacity.duration.200ms
    role="dialog"
    aria-modal="true"
    aria-label="컬렉션"
    @click.self="closeCollectionHub()"
    @keydown.escape="closeCollectionHub()"
    @keydown.left.prevent="setCollectionTab(state.tabs[Math.max(0, state.tabs.findIndex(t => t.id === state.activeTab) - 1)]?.id)"
    @keydown.right.prevent="setCollectionTab(state.tabs[Math.min(state.tabs.length - 1, state.tabs.findIndex(t => t.id === state.activeTab) + 1)]?.id)"
    tabindex="-1"
>
    <div class="ch-frame">
        <div class="ch-header">
            <strong
                class="ch-title"
                x-bind:class="{ 'ch-title--holding': state.debugModeHoldActive }"
                @pointerdown.prevent="startDebugModeHold($event)"
                @pointerup="cancelDebugModeHold()"
                @pointercancel="cancelDebugModeHold()"
                @pointerleave="cancelDebugModeHold()"
                @contextmenu.prevent
                >컬렉션</strong
            >
            <span class="ch-summary">
                <span>숙련도 <b x-text="state.summary.cumulativeLevels + '/' + state.summary.maxLevels"></b></span>
                <span>·</span>
                <span
                    >업적 <b x-text="state.summary.unlockedAchievements + '/' + state.summary.totalAchievements"></b
                ></span>
                <span>·</span>
                <span>숙련도 합계 <b x-text="state.summary.masteryTotal"></b></span>
            </span>
            <button class="ch-close" type="button" aria-label="닫기" @click="closeCollectionHub()">✕</button>
        </div>

        <div class="ch-tabs" role="tablist">
            <template x-for="tab in state.tabs" :key="tab.id">
                <button
                    class="ch-tab"
                    type="button"
                    role="tab"
                    x-bind:aria-selected="state.activeTab === tab.id"
                    x-bind:class="{ active: state.activeTab === tab.id }"
                    x-text="tab.label"
                    @click="setCollectionTab(tab.id)"
                ></button>
            </template>
        </div>

        <div class="ch-content" x-show="state.activeTab === 'roster'" role="tabpanel">
            <div class="ch-codex-tabs" role="tablist" aria-label="도감 종류">
                <button
                    class="ch-codex-tab"
                    type="button"
                    role="tab"
                    x-bind:aria-selected="state.codexSection === 'characters'"
                    x-bind:class="{ active: state.codexSection === 'characters' }"
                    @click="setCodexSection('characters')"
                >
                    캐릭터
                </button>
                <button
                    class="ch-codex-tab"
                    type="button"
                    role="tab"
                    x-bind:aria-selected="state.codexSection === 'monsters'"
                    x-bind:class="{ active: state.codexSection === 'monsters' }"
                    @click="setCodexSection('monsters')"
                >
                    몬스터
                </button>
            </div>
            <section
                class="ch-codex-panel"
                x-bind:class="{ 'ch-codex-panel--detail-open': state.selectedCharacterId }"
                x-show="state.codexSection === 'characters'"
                role="tabpanel"
            >
                <div class="ch-toolbar">
                    <input
                        class="ch-search"
                        type="search"
                        placeholder="캐릭터 검색..."
                        x-model="state.searchQueries.roster"
                        @input="syncDebugModeFromSearch()"
                    />
                    <select class="ch-select" x-model="state.filters.roster" @change="setCollectionFilter($el.value)">
                        <option value="all">전체</option>
                        <option value="unplayed">미기록</option>
                        <option value="played">플레이</option>
                        <option value="won">우승</option>
                        <option value="master">마스터</option>
                    </select>
                    <select class="ch-select" x-model="state.sortModes.roster">
                        <option value="roster">로스터 순</option>
                        <option value="wins">우승 많은 순</option>
                        <option value="recent">최근 플레이</option>
                    </select>
                </div>
                <div class="ch-scroll-region">
                    <div class="ch-grid">
                        <template x-for="item in state.filteredRosterItems" :key="item.id">
                            <div
                                class="ch-card"
                                x-bind:class="{ selected: state.selectedCharacterId === item.id }"
                                @click="selectCollectionCharacter(item.id)"
                            >
                                <div
                                    class="ch-card-head"
                                    x-bind:style="'background:' + item.color"
                                    x-bind:class="{ unplayed: !item.hasRecord }"
                                >
                                    <span class="ch-card-icon" x-text="item.isLocked ? '?' : item.name.charAt(0)"></span>
                                    <div class="ch-card-head-text">
                                        <span class="ch-card-name" x-text="item.name"></span>
                                        <span
                                            class="ch-card-mastery"
                                            x-text="['-','☆','☆☆','☆☆☆'][item.masteryLevel]"
                                        ></span>
                                    </div>
                                </div>
                                <div class="ch-card-body" x-bind:class="{ unplayed: !item.hasRecord }">
                                    <span x-show="item.isLocked" class="ch-empty-badge">미해금</span>
                                    <span x-show="!item.isLocked && !item.hasRecord" class="ch-empty-badge">미기록</span>
                                    <span x-show="!item.isLocked && item.hasRecord">우승 <b x-text="item.tournamentWins"></b>회</span>
                                    <span
                                        class="ch-xp-chip"
                                        x-show="!item.isLocked"
                                        x-text="item.experienceLevelLabel + ' · ' + Number(item.experienceTotalXp || 0).toLocaleString() + 'XP'"
                                    ></span>
                                    <span x-show="!item.isLocked && item.bestPlacement"
                                        >최고 <b x-text="item.bestPlacement + '위'"></b
                                    ></span>
                                    <span x-show="!item.isLocked && item.masteryUnlocked" class="ch-mast-badge">숙련도 ✓</span>
                                    <span x-show="item.isCurrent" class="ch-current-badge">현재</span>
                                </div>
                            </div>
                        </template>
                        <div class="ch-empty" x-show="state.filteredRosterItems.length === 0">검색 결과가 없습니다</div>
                    </div>
                </div>
                <div class="ch-detail" x-show="state.selectedCharacterId">
                    <template x-for="item in state.filteredRosterItems" :key="item.id">
                        <div x-show="item.id === state.selectedCharacterId">
                            <div class="ch-detail-header">
                                <div class="ch-detail-tabs" role="tablist" aria-label="캐릭터 상세">
                                    <button
                                        class="ch-detail-tab"
                                        type="button"
                                        role="tab"
                                        x-bind:aria-selected="state.characterDetailTab === 'overview'"
                                        x-bind:class="{ active: state.characterDetailTab === 'overview' }"
                                        @click="state.characterDetailTab = 'overview'"
                                    >
                                        상세 정보
                                    </button>
                                    <button
                                        class="ch-detail-tab"
                                        type="button"
                                        role="tab"
                                        x-bind:aria-selected="state.characterDetailTab === 'levelRewards'"
                                        x-bind:class="{ active: state.characterDetailTab === 'levelRewards' }"
                                        x-show="!item.isLocked"
                                        @click="state.characterDetailTab = 'levelRewards'"
                                    >
                                        레벨 보상
                                    </button>
                                    <button
                                        class="ch-detail-tab"
                                        type="button"
                                        role="tab"
                                        x-show="item.rebirth.visible"
                                        x-bind:aria-selected="state.characterDetailTab === 'rebirth'"
                                        x-bind:class="{ active: state.characterDetailTab === 'rebirth' }"
                                        @click="state.characterDetailTab = 'rebirth'"
                                    >
                                        환생
                                    </button>
                                </div>
                                <button
                                    class="ch-detail-close"
                                    type="button"
                                    aria-label="캐릭터 상세 닫기"
                                    title="상세 닫기"
                                    @click="closeCollectionCharacterDetail()"
                                >
                                    &times;
                                </button>
                            </div>
                            <div
                                class="ch-detail-body"
                                x-show="state.characterDetailTab === 'overview'"
                                role="tabpanel"
                            >
                                <div class="ch-locked-detail" x-show="item.isLocked">
                                    <strong>?</strong>
                                    <span>미해금</span>
                                    <p x-text="item.unlockHint"></p>
                                </div>
                                <div class="ch-unlocked-detail" x-show="!item.isLocked">
                                <div class="ch-detail-xp">
                                    <div class="ch-detail-xp-head">
                                        <strong x-text="item.experienceLevelLabel"></strong>
                                        <span
                                            x-text="Number(item.experienceTotalXp || 0).toLocaleString() + ' XP'"
                                        ></span>
                                    </div>
                                    <div class="ch-detail-xp-bar" aria-hidden="true">
                                        <div
                                            class="ch-detail-xp-fill"
                                            x-bind:style="'width:' + item.experienceProgressPct + '%; background:' + item.color"
                                        ></div>
                                    </div>
                                    <div class="ch-detail-xp-foot">
                                        <span x-text="item.experienceProgressText"></span>
                                        <span x-text="item.experienceNextText"></span>
                                    </div>
                                    <div
                                        class="ch-detail-xp-reward"
                                        x-text="'다음 보상 · ' + item.experienceNextRewardText"
                                    ></div>
                                </div>
                                <span>토너먼트 완료 <b x-text="item.tournamentsCompleted"></b></span>
                                <span>토너먼트 우승 <b x-text="item.tournamentWins"></b></span>
                                <span>매치 승리 <b x-text="item.matchWins"></b></span>
                                <span x-show="item.bestPlacement"
                                    >최고 등수 <b x-text="item.bestPlacement + '위'"></b
                                ></span>
                                <span
                                    >누적 피해 <b x-text="Number(item.totalDamageDealt || 0).toLocaleString()"></b
                                ></span>
                                <span x-show="item.comebackMatchWins"
                                    >역전승 <b x-text="item.comebackMatchWins"></b
                                ></span>
                                <span>
                                    숙련도 <b x-text="['미해금','BRONZE','SILVER','GOLD'][item.masteryLevel]"></b>
                                    <span x-show="item.masteryLevel === 0">· 이 캐릭터로 우승</span>
                                    <span x-show="item.masteryLevel === 1">· 다음: SILVER (난도 1)</span>
                                    <span x-show="item.masteryLevel === 2">· 다음: GOLD (난도 2)</span>
                                    <span x-show="item.masteryLevel === 3">· MAX</span>
                                </span>
                                </div>
                            </div>
                            <div
                                class="ch-level-reward-list"
                                x-show="state.characterDetailTab === 'levelRewards'"
                                role="tabpanel"
                            >
                                <template x-for="reward in item.levelRewards" :key="reward.id">
                                    <div class="ch-level-reward" x-bind:class="{ earned: reward.earned }">
                                        <strong x-text="'Lv.' + reward.level"></strong>
                                        <span class="ch-level-reward-text" x-text="reward.text"></span>
                                        <span
                                            class="ch-level-reward-status"
                                            x-bind:class="{ earned: reward.earned }"
                                            x-text="reward.statusLabel"
                                        ></span>
                                    </div>
                                </template>
                            </div>
                            <div class="ch-rebirth" x-show="state.characterDetailTab === 'rebirth'" role="tabpanel">
                                <div class="ch-rebirth-head">
                                    <div>
                                        <strong x-text="'환생 ' + item.rebirth.rebirthCount + '회'"></strong>
                                        <span
                                            x-text="'장착 ' + item.rebirth.equippedCount + '/' + item.rebirth.maxEquippedCards"
                                        ></span>
                                    </div>
                                    <span
                                        class="ch-rebirth-stage"
                                        x-bind:style="'--rebirth-color:' + item.rebirth.visual.color"
                                        x-text="'불꽃 단계 ' + item.rebirth.visual.stage"
                                    ></span>
                                </div>
                                <p class="ch-rebirth-note" x-show="!item.rebirth.canRebirth">
                                    Lv.10에 도달하면 여기서 환생 보상을 고를 수 있습니다.
                                </p>
                                <button
                                    class="ch-btn ch-rebirth-start"
                                    type="button"
                                    x-show="item.rebirth.canRebirth"
                                    @click="beginRebirth(item.id)"
                                    x-text="item.rebirth.pendingOfferCards.length ? '진행 중인 보상 선택' : '환생 보상 선택'"
                                >
                                    환생 보상 선택
                                </button>
                                <div class="ch-rebirth-offers" x-show="item.rebirth.pendingOfferCards.length">
                                    <span class="ch-rebirth-label">진행 중인 보상 후보</span>
                                    <template x-for="card in item.rebirth.pendingOfferCards" :key="card.id">
                                        <div class="ch-rebirth-card ch-rebirth-offer">
                                            <span class="ch-rebirth-kind" x-text="card.categoryLabel"></span>
                                            <strong x-text="card.name"></strong>
                                            <span x-text="formatRebirthCardEffect(card)"></span>
                                            <span
                                                class="ch-rebirth-rank"
                                                x-show="card.type !== 'statReward'"
                                                x-text="card.rankLabel"
                                            ></span>
                                            <button
                                                class="ch-btn"
                                                type="button"
                                                @click="completeRebirth(item.id, card.id)"
                                            >
                                                선택
                                            </button>
                                        </div>
                                    </template>
                                </div>
                                <div class="ch-rebirth-stats">
                                    <span class="ch-rebirth-label">누적 기초 수치</span>
                                    <div class="ch-rebirth-stat-grid">
                                        <template
                                            x-for="[stat, value] in Object.entries(item.rebirth.statBonuses)"
                                            :key="stat"
                                        >
                                            <span x-text="formatRebirthStatBonus(stat, value)"></span>
                                        </template>
                                    </div>
                                </div>
                                <div class="ch-rebirth-owned" x-show="item.rebirth.ownedCards.length">
                                    <span class="ch-rebirth-label">보유 카드</span>
                                    <template x-for="card in item.rebirth.ownedCards" :key="card.id">
                                        <div class="ch-rebirth-card" x-bind:class="{ equipped: card.equipped }">
                                            <span class="ch-rebirth-kind" x-text="card.categoryLabel"></span>
                                            <strong x-text="card.name"></strong>
                                            <span x-text="formatRebirthCardEffect(card)"></span>
                                            <span class="ch-rebirth-rank" x-text="card.rankLabel"></span>
                                            <button
                                                class="ch-btn"
                                                type="button"
                                                @click="toggleRebirthCardEquip(item.id, card.id)"
                                                x-text="card.equipped ? '해제' : '장착'"
                                            ></button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
            <section class="ch-codex-panel" x-show="state.codexSection === 'monsters'" role="tabpanel">
                <div class="ch-toolbar">
                    <input
                        class="ch-search"
                        type="search"
                        placeholder="몬스터 검색..."
                        x-model="state.searchQueries.monsters"
                    />
                    <select class="ch-select" x-model="state.filters.monsters" @change="setMonsterFilter($el.value)">
                        <option value="all">전체</option>
                        <option value="discovered">조우</option>
                        <option value="unknown">미조우</option>
                        <option value="common">common</option>
                        <option value="rare">rare</option>
                        <option value="unique">unique</option>
                        <option value="epic">epic</option>
                    </select>
                    <select class="ch-select" x-model="state.sortModes.monsters">
                        <option value="codex">도감 순</option>
                        <option value="kills">처치 많은 순</option>
                    </select>
                </div>
                <div class="ch-scroll-region">
                    <div class="ch-grid">
                        <template x-for="item in state.filteredMonsterItems" :key="item.id">
                            <div
                                class="ch-card ch-monster-card"
                                x-bind:class="{ selected: state.selectedMonsterId === item.id, unknown: !item.isDiscovered }"
                                @click="selectCollectionMonster(item.id)"
                            >
                                <div
                                    class="ch-card-head"
                                    x-bind:style="'background:' + (item.isDiscovered ? item.color : '#666666')"
                                >
                                    <span class="ch-card-icon" x-text="item.isDiscovered ? item.faceLabel : '?'"></span>
                                    <div class="ch-card-head-text">
                                        <span
                                            class="ch-card-name"
                                            x-text="item.isDiscovered ? item.name : '미조우'"
                                        ></span>
                                        <span
                                            class="ch-monster-rarity"
                                            x-show="item.isDiscovered"
                                            x-text="item.rarityLabel"
                                        ></span>
                                    </div>
                                </div>
                                <div class="ch-card-body">
                                    <span x-show="!item.isDiscovered" class="ch-empty-badge">첫 조우 후 상세 공개</span>
                                    <span x-show="item.isDiscovered">처치 <b x-text="item.kills"></b>회</span>
                                    <span
                                        x-show="item.isDiscovered"
                                        x-text="'조우 지역 ' + item.regions.filter(region => region.isDiscovered).length"
                                    ></span>
                                </div>
                            </div>
                        </template>
                        <div class="ch-empty" x-show="state.filteredMonsterItems.length === 0">
                            검색 결과가 없습니다
                        </div>
                    </div>
                </div>
                <div class="ch-detail" x-show="state.selectedMonsterId">
                    <template x-for="item in state.filteredMonsterItems" :key="item.id">
                        <div x-show="item.id === state.selectedMonsterId" class="ch-monster-detail">
                            <div class="ch-monster-detail-head">
                                <span
                                    class="ch-monster-detail-face"
                                    x-bind:style="'background:' + (item.isDiscovered ? item.color : '#666666')"
                                    x-text="item.isDiscovered ? item.faceLabel : '?'"
                                ></span>
                                <div>
                                    <strong x-text="item.isDiscovered ? item.name : '미조우'"></strong>
                                    <span x-show="item.isDiscovered" x-text="item.rarityLabel"></span>
                                </div>
                                <label
                                    class="ch-monster-region-picker"
                                    x-show="item.isDiscovered && item.regions.length"
                                >
                                    <span>지역</span>
                                    <select class="ch-select" x-model="state.selectedMonsterRegionId">
                                        <template x-for="region in item.regions" :key="region.id">
                                            <option
                                                x-bind:value="region.id"
                                                x-text="region.name + (region.isDiscovered ? '' : ' · 미조우')"
                                            ></option>
                                        </template>
                                    </select>
                                </label>
                                <button
                                    class="ch-detail-close"
                                    type="button"
                                    aria-label="몬스터 상세 닫기"
                                    title="상세 닫기"
                                    @click="closeCollectionMonsterDetail()"
                                >
                                    &times;
                                </button>
                            </div>
                            <div class="ch-monster-unknown" x-show="!item.isDiscovered">
                                첫 조우 후 이름, 행동, 기본 스펙과 통계가 공개됩니다.
                            </div>
                            <div
                                class="ch-monster-unknown"
                                x-show="item.isDiscovered && selectedMonsterRegion(item) && !selectedMonsterRegion(item).isDiscovered"
                            >
                                이 지역에서는 아직 조우하지 않았습니다.
                            </div>
                            <div
                                class="ch-detail-body"
                                x-show="item.isDiscovered && selectedMonsterRegion(item)?.isDiscovered"
                            >
                                <strong x-text="selectedMonsterRegion(item)?.behaviorDescription"></strong>
                                <div class="ch-monster-stat-grid">
                                    <span>HP <b x-text="selectedMonsterRegion(item)?.stats.hp"></b></span>
                                    <span>공격 <b x-text="selectedMonsterRegion(item)?.stats.damage"></b></span>
                                    <span>방어 <b x-text="selectedMonsterRegion(item)?.stats.defense"></b></span>
                                    <span>속도 <b x-text="selectedMonsterRegion(item)?.stats.speed"></b></span>
                                </div>
                                <div class="ch-monster-records">
                                    <span>전체 처치 <b x-text="item.kills"></b></span>
                                    <span>선택 지역 처치 <b x-text="selectedMonsterRegion(item)?.kills"></b></span>
                                    <span>첫 조우 <b x-text="item.firstEncounterFloor + '층'"></b></span>
                                    <span>마지막 조우 <b x-text="item.lastEncounterFloor + '층'"></b></span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </div>

        <div class="ch-content ch-developer" x-show="state.activeTab === 'developer'" role="tabpanel">
            <div class="ch-developer-groups">
                <section class="ch-developer-group" aria-labelledby="ch-developer-character-title">
                    <h3 id="ch-developer-character-title" class="ch-developer-group-title">캐릭터 설정</h3>
                    <div class="ch-developer-grid">
                        <label class="ch-developer-field ch-developer-field--wide">
                            <span>캐릭터</span>
                            <select
                                class="ch-select"
                                x-model="state.developer.targetCharacterId"
                                @change="syncDeveloperTarget()"
                            >
                                <template x-for="item in state.rosterItems" :key="item.id">
                                    <option x-bind:value="item.id" x-text="item.developerName || item.name"></option>
                                </template>
                            </select>
                        </label>
                        <div class="ch-developer-field ch-developer-field--action">
                            <span>레벨</span>
                            <button class="ch-btn" type="button" @click="setDebugCharacterToMaxLevel()">
                                Lv.10 적용
                            </button>
                        </div>
                        <div
                            class="ch-developer-field ch-developer-field--wide"
                            x-show="state.rosterItems.find(item => item.id === state.developer.targetCharacterId)?.isHidden"
                        >
                            <span>히든 캐릭터</span>
                            <div class="ch-developer-control-row">
                                <button class="ch-btn" type="button" @click="setDebugHiddenCharacterUnlocked(true)">해금</button>
                                <button class="ch-btn" type="button" @click="setDebugHiddenCharacterUnlocked(false)">잠금</button>
                            </div>
                        </div>
                        <div class="ch-developer-field ch-developer-field--action">
                            <span>토너먼트</span>
                            <button class="ch-btn" type="button" @click="recordDebugTournamentWin()">우승 처리</button>
                        </div>
                        <div class="ch-developer-field ch-developer-field--wide">
                            <span>환생 횟수</span>
                            <div class="ch-developer-control-row">
                                <input
                                    class="ch-search"
                                    type="number"
                                    min="0"
                                    max="999"
                                    x-model.number="state.developer.rebirthCount"
                                />
                                <button class="ch-btn" type="button" @click="setDebugRebirthCount()">환생 적용</button>
                            </div>
                        </div>
                        <div class="ch-developer-field ch-developer-field--wide">
                            <span>컬렉션 상태</span>
                            <button class="ch-btn" type="button" @click="seedDebugCollectionSample()">
                                컬렉션 샘플 적용
                            </button>
                        </div>
                    </div>
                </section>

                <section class="ch-developer-group" aria-labelledby="ch-developer-elementalist-title">
                    <h3 id="ch-developer-elementalist-title" class="ch-developer-group-title">Elementalist VFX</h3>
                    <div class="ch-elementalist-preview">
                        <div class="ch-developer-field">
                            <span>연출 선택</span>
                            <div class="ch-developer-control-row">
                                <select
                                    class="ch-select"
                                    x-model="state.developer.elementalistPreviewId"
                                    x-effect="$el.value = state.developer.elementalistPreviewId"
                                    @change="restartElementalistVfxPreview()"
                                >
                                    <template
                                        x-for="option in state.developer.elementalistPreviewOptions"
                                        :key="option.id"
                                    >
                                        <option
                                            x-bind:value="option.id"
                                            x-bind:selected="option.id === state.developer.elementalistPreviewId"
                                            x-text="option.label"
                                        ></option>
                                    </template>
                                </select>
                                <button
                                    class="ch-btn"
                                    type="button"
                                    @click="triggerOrRestartElementalistVfxPreview()"
                                    x-text="state.developer.elementalistPreviewId === 'wet' ? '젖음 발동' : '다시 재생'"
                                ></button>
                            </div>
                        </div>
                        <div class="ch-elementalist-preview-stage">
                            <canvas
                                class="ch-elementalist-preview-canvas"
                                data-elementalist-vfx-preview
                                aria-label="선택한 Elementalist 원소 연출 미리보기"
                            ></canvas>
                        </div>
                        <p
                            class="ch-elementalist-preview-description"
                            x-text="state.developer.elementalistPreviewOptions.find(option => option.id === state.developer.elementalistPreviewId)?.description"
                        ></p>
                    </div>
                </section>

                <section class="ch-developer-group" aria-labelledby="ch-developer-hunting-title">
                    <h3 id="ch-developer-hunting-title" class="ch-developer-group-title">사냥터 테스트</h3>
                    <div class="ch-developer-grid">
                        <label class="ch-developer-field">
                            <span>사냥터 지역</span>
                            <select class="ch-select" x-model="state.developer.huntingStageId">
                                <template x-for="stage in state.developer.stages" :key="stage.id">
                                    <option x-bind:value="stage.id" x-text="stage.name"></option>
                                </template>
                            </select>
                        </label>
                        <div class="ch-developer-field">
                            <span>시작 층</span>
                            <div class="ch-developer-control-row">
                                <input
                                    class="ch-search"
                                    type="number"
                                    min="1"
                                    x-bind:max="state.developer.maxFloor"
                                    x-model.number="state.developer.huntingFloor"
                                />
                                <button class="ch-btn" type="button" @click="startDebugHunting()">사냥터 시작</button>
                            </div>
                        </div>
                        <div class="ch-developer-field ch-developer-field--wide">
                            <span>전투 조우 테스트</span>
                            <div class="ch-developer-control-row">
                                <select
                                    class="ch-select"
                                    x-model="state.developer.huntingEncounterType"
                                    @change="syncDeveloperEventSelection()"
                                >
                                    <template x-for="encounter in state.developer.encounters" :key="encounter.id">
                                        <option x-bind:value="encounter.id" x-text="encounter.label"></option>
                                    </template>
                                </select>
                                <button class="ch-btn" type="button" @click="startDebugHuntingEncounter()">
                                    전투 준비 열기
                                </button>
                            </div>
                        </div>
                        <div class="ch-developer-field ch-developer-field--wide">
                            <span>이벤트 미리보기</span>
                            <div class="ch-developer-control-row">
                                <select
                                    class="ch-select"
                                    x-model="state.developer.huntingEventType"
                                    @change="syncDeveloperEventSelection()"
                                >
                                    <template x-for="event in state.developer.events" :key="event.id">
                                        <option x-bind:value="event.id" x-text="event.label"></option>
                                    </template>
                                </select>
                                <button class="ch-btn" type="button" @click="startDebugHuntingEvent()">
                                    미리보기 열기
                                </button>
                            </div>
                        </div>
                        <label
                            class="ch-developer-field ch-developer-field--wide"
                            x-show="state.developer.huntingEventType === 'elite_mob' || state.developer.huntingEncounterType === 'elite'"
                        >
                            <span>정예 조합</span>
                            <select
                                class="ch-select"
                                x-model="state.developer.eliteCombinationId"
                                @change="syncDeveloperEventSelection()"
                            >
                                <template
                                    x-for="combination in state.developer.eliteCombinations"
                                    :key="combination.id"
                                >
                                    <option x-bind:value="combination.id" x-text="combination.label"></option>
                                </template>
                            </select>
                        </label>
                    </div>
                </section>
            </div>
            <div class="ch-developer-actions">
                <button class="ch-btn ch-btn--danger" type="button" @click="exitDebugMode()">디버그 종료</button>
            </div>
        </div>

        <div class="ch-content" x-show="state.activeTab === 'mastery'" role="tabpanel">
            <div class="ch-toolbar">
                <select class="ch-select" x-model="state.filters.mastery" @change="setCollectionFilter($el.value)">
                    <option value="all">전체</option>
                    <option value="unlocked">해금</option>
                    <option value="locked">미해금</option>
                    <option value="active">현재 적용</option>
                </select>
            </div>
            <div class="ch-scroll-region">
                <div class="ch-list">
                    <template x-for="item in state.filteredMasteryItems" :key="item.id">
                        <div class="ch-mast-card" x-bind:class="{ unlocked: item.unlocked, active: item.active }">
                            <div class="ch-mast-source" x-text="item.sourceName"></div>
                            <div class="ch-mast-info">
                                <strong x-text="item.name"></strong>
                                <span
                                    class="ch-mast-tier"
                                    x-text="['미해금','BRONZE','SILVER','GOLD'][item.level]"
                                ></span>
                                <span
                                    class="ch-mast-desc"
                                    x-text="item.level > 0 ? item.description.replace('{value}', item.formatValue(item.tierValues[item.level])) : (item.description.replace('{value}', item.formatValue(item.tierValues[1])) + ' · 미해금')"
                                ></span>
                                <span class="ch-mast-next" x-show="item.level === 0"
                                    >해금 조건: <span x-text="item.unlockCondition"></span
                                ></span>
                                <span class="ch-mast-next" x-show="item.level === 1">다음: SILVER (난도 1 우승)</span>
                                <span class="ch-mast-next" x-show="item.level === 2">다음: GOLD (난도 2 우승)</span>
                                <span class="ch-mast-next" x-show="item.level === 3">최대 등급</span>
                            </div>
                            <div class="ch-mast-status">
                                <span x-show="item.unlocked && item.active" class="ch-mast-badge">적용 중</span>
                                <span x-show="item.unlocked && item.isSelf" class="ch-mast-badge ch-mast-badge--self"
                                    >보유 · 현재 캐릭터에는 미적용</span
                                >
                                <span x-show="!item.unlocked" class="ch-mast-badge ch-mast-badge--locked">미해금</span>
                            </div>
                        </div>
                    </template>
                    <div class="ch-empty" x-show="state.filteredMasteryItems.length === 0">
                        <span x-show="state.filters.mastery === 'unlocked'">해금한 숙련도 효과가 없습니다</span>
                        <span x-show="state.filters.mastery !== 'unlocked'">숙련도 효과가 없습니다</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="ch-content" x-show="state.activeTab === 'achievements'" role="tabpanel">
            <div class="ch-toolbar">
                <select class="ch-select" x-model="state.filters.achievements" @change="setCollectionFilter($el.value)">
                    <option value="all">전체</option>
                    <option value="unlocked">달성</option>
                    <option value="locked">미달성</option>
                </select>
            </div>
            <div class="ch-scroll-region">
                <div class="ch-list">
                    <template x-for="item in state.filteredAchievementItems" :key="item.id">
                        <div
                            class="ch-ach-card"
                            x-bind:class="'ch-ach-tier--' + item.tier + (item.unlocked ? ' unlocked' : '')"
                        >
                            <div class="ch-ach-info">
                                <strong x-text="item.name"></strong>
                                <span class="ch-ach-desc" x-text="item.description"></span>
                                <span
                                    class="ch-ach-reward"
                                    x-show="item.rewardText"
                                    x-text="'보상: ' + item.rewardText"
                                ></span>
                                <span
                                    class="ch-ach-reward"
                                    x-show="item.progressText"
                                    x-text="'진행: ' + item.progressText"
                                ></span>
                            </div>
                            <div class="ch-ach-status">
                                <span
                                    class="ch-ach-tier-label"
                                    x-text="item.tier"
                                    x-bind:class="'ch-tier--' + item.tier"
                                ></span>
                            </div>
                        </div>
                    </template>
                    <div class="ch-empty" x-show="state.filteredAchievementItems.length === 0">
                        등록된 업적이 없습니다
                    </div>
                </div>
            </div>
        </div>

        <div class="ch-content" x-show="state.activeTab === 'storage'" role="tabpanel">
            <div class="ch-toolbar">
                <input
                    class="ch-search"
                    type="search"
                    placeholder="상자 등급 검색..."
                    x-model="state.searchQueries.storage"
                />
                <select class="ch-select" x-model="state.filters.storage" @change="setCollectionFilter($el.value)">
                    <option value="all">전체</option>
                    <option value="openable">개봉 가능</option>
                    <option value="common">common</option>
                    <option value="uncommon">uncommon</option>
                    <option value="rare">rare</option>
                    <option value="epic">epic</option>
                    <option value="legendary">legendary</option>
                </select>
                <span class="ch-storage-currency">
                    파편 <b x-text="Number(state.storage.shards || 0).toLocaleString()"></b>
                </span>
            </div>
            <div class="ch-scroll-region">
                <div class="ch-list">
                    <template x-for="item in state.filteredStorageItems" :key="item.id">
                        <div
                            class="ch-ach-card"
                            x-bind:class="'ch-chest--' + item.rarity"
                            x-bind:style="item.canOpen ? 'cursor:pointer' : ''"
                            @click="item.canOpen && openChest(item)"
                        >
                            <div class="ch-ach-info">
                                <strong x-text="item.rarityLabel + ' 상자'"></strong>
                                <span class="ch-ach-desc" x-text="item.rewardText"></span>
                                <span class="ch-ach-reward" x-text="'개봉 비용: 파편 ' + item.openCost"></span>
                            </div>
                            <div class="ch-ach-status">
                                <span
                                    class="ch-ach-tier-label"
                                    x-bind:class="{ unlocked: item.canOpen }"
                                    x-text="item.canOpen ? '개봉 가능' : '잠김'"
                                ></span>
                            </div>
                        </div>
                    </template>
                    <div class="ch-empty" x-show="state.filteredStorageItems.length === 0">
                        보관 중인 상자가 없습니다
                    </div>
                </div>
            </div>
        </div>

        <collection-equipment-panel x-show="state.activeTab === 'equipment'"></collection-equipment-panel>
        <collection-fusion-dialog></collection-fusion-dialog>
        <collection-shop-panel></collection-shop-panel>
    </div>
</div>

<script>
    window.createGameUI("collectionHub", () => {
        const DEBUG_MODE_HOLD_DURATION_MS = 1000;
        let dialogElement = null;
        let tabResizeObserver = null;
        let debugModeHoldTimerId = null;

        function focusDialog() {
            requestAnimationFrame(() => dialogElement.focus());
        }

        const state = Alpine.reactive({
            visible: false,
            activeTab: "roster",
            codexSection: "characters",
            tabs: [],
            filters: { roster: "all", monsters: "all", mastery: "all", achievements: "all", storage: "all" },
            searchQueries: { roster: "", monsters: "", mastery: "", achievements: "", storage: "" },
            sortModes: { roster: "roster", monsters: "codex", achievements: "default" },
            selectedCharacterId: null,
            characterDetailTab: "overview",
            selectedMonsterId: null,
            selectedMonsterRegionId: null,
            debugModeHoldActive: false,
            rosterItems: [],
            monsterCodexItems: [],
            masteryItems: [],
            achievementItems: [],
            storage: { shards: 0, chests: [], stats: {}, consumables: [], huntingConsumableUseLimitUpgrade: null },
            equipment: {
                items: [],
                enhancementStones: 0,
                inventoryUsed: 0,
                inventorySlots: 5,
                canExpand: false,
                expandCost: 0,
                expandGain: 0,
                fusion: { sourceItemCount: 3, recipes: [] },
                equippedSlots: {}
            },
            developer: {
                active: false,
                currentCharacterId: null,
                targetCharacterId: null,
                rebirthCount: 0,
                huntingStageId: "cave",
                huntingFloor: 1,
                maxFloor: 100,
                stages: [],
                huntingEncounterType: "normal",
                encounters: [],
                huntingEventType: "portal",
                events: [],
                eliteCombinationId: null,
                eliteCombinations: [],
                elementalistPreviewId: "single:fire",
                elementalistPreviewOptions: []
            },
            summary: {},

            get filteredRosterItems() {
                const tab = this.activeTab;
                if (tab !== "roster" || this.codexSection !== "characters") return [];
                const filter = this.filters.roster || "all";
                const query = (this.searchQueries.roster || "").toLowerCase();
                const sort = this.sortModes.roster || "roster";
                let items = [...(this.rosterItems || [])];
                if (query) items = items.filter((i) => i.name.toLowerCase().includes(query));
                if (filter === "unplayed") items = items.filter((i) => !i.hasRecord);
                else if (filter === "played") items = items.filter((i) => i.hasRecord);
                else if (filter === "won") items = items.filter((i) => i.tournamentWins > 0);
                else if (filter === "master") items = items.filter((i) => i.masteryLevel >= 3);
                if (sort === "wins") items = items.sort((a, b) => b.tournamentWins - a.tournamentWins);
                else if (sort === "recent")
                    items = items.sort((a, b) => (b.lastTournamentAt ?? 0) - (a.lastTournamentAt ?? 0));
                return items;
            },

            get filteredMonsterItems() {
                if (this.activeTab !== "roster" || this.codexSection !== "monsters") return [];
                const filter = this.filters.monsters || "all";
                const query = (this.searchQueries.monsters || "").toLowerCase();
                const sort = this.sortModes.monsters || "codex";
                let items = [...(this.monsterCodexItems || [])];
                if (query) items = items.filter((item) => item.isDiscovered && item.name.toLowerCase().includes(query));
                if (filter === "discovered") items = items.filter((item) => item.isDiscovered);
                else if (filter === "unknown") items = items.filter((item) => !item.isDiscovered);
                else if (filter !== "all") items = items.filter((item) => item.rarity === filter);
                if (sort === "kills") items = items.sort((a, b) => b.kills - a.kills || a.name.localeCompare(b.name));
                return items;
            },

            get filteredMasteryItems() {
                const filter = this.filters.mastery || "all";
                let items = [...(this.masteryItems || [])];
                if (filter === "unlocked") items = items.filter((i) => i.unlocked);
                else if (filter === "locked") items = items.filter((i) => !i.unlocked);
                else if (filter === "active") items = items.filter((i) => i.active);
                return items;
            },

            get filteredAchievementItems() {
                const filter = this.filters.achievements || "all";
                let items = [...(this.achievementItems || [])];
                if (filter === "unlocked") items = items.filter((i) => i.unlocked);
                else if (filter === "locked") items = items.filter((i) => !i.unlocked);
                return items;
            },

            get filteredStorageItems() {
                const query = (this.searchQueries.storage || "").toLowerCase();
                const filter = this.filters.storage || "all";
                let items = [...(this.storage.chests || [])];
                if (query) items = items.filter((i) => i.rarity.toLowerCase().includes(query));
                if (filter === "openable") items = items.filter((i) => i.canOpen);
                else if (filter !== "all") items = items.filter((i) => i.rarity === filter);
                return items;
            }
        });

        function closeCollectionHub() {
            cancelDebugModeHold();
            stopElementalistVfxPreview();
            state.visible = false;
            state.selectedCharacterId = null;
            state.selectedMonsterId = null;
            state.selectedMonsterRegionId = null;
            Alpine.store("uiManager").requireComponent("collectionFusionDialog").hide();
            Alpine.store("uiManager").requireComponent("collectionShopPanel").hide();
        }

        function setCollectionTab(tabId) {
            const validTabs = state.tabs.length > 0 ? state.tabs.map((t) => t.id) : ["roster"];
            if (!validTabs.includes(tabId)) return;
            state.activeTab = tabId;
            if (tabId === "developer") restartElementalistVfxPreview();
            else stopElementalistVfxPreview();
            revealActiveTab();
        }

        function setCodexSection(section) {
            if (["characters", "monsters"].includes(section)) state.codexSection = section;
        }

        function setCollectionFilter(filterId) {
            const tab = state.activeTab;
            if (tab && filterId) state.filters[tab] = filterId;
        }

        function selectCollectionCharacter(characterId) {
            if (state.selectedCharacterId !== characterId) state.characterDetailTab = "overview";
            state.selectedCharacterId = characterId;
        }

        function closeCollectionCharacterDetail() {
            state.selectedCharacterId = null;
            state.characterDetailTab = "overview";
        }

        function openCharacterRebirth(characterId) {
            if (!state.rosterItems.some((item) => item.id === characterId)) return false;
            state.visible = true;
            state.activeTab = "roster";
            state.codexSection = "characters";
            state.selectedCharacterId = characterId;
            state.characterDetailTab = "rebirth";
            focusDialog();
            return true;
        }

        function formatRebirthCardEffect(card) {
            const statLabels = { hp: "HP", damage: "공격", speed: "속도", defense: "방어력" };
            const stats = Object.entries(card?.stats ?? {})
                .filter(([, value]) => Number(value) > 0)
                .map(([stat, value]) => `${statLabels[stat] ?? stat} +${value}`);
            if (stats.length) return stats.join(" · ");
            const effectParts = [`현재: ${card?.effectText ?? "효과 정보 없음"}`];
            if (card?.nextUnlockText) effectParts.push(card.nextUnlockText);
            return effectParts.join(" · ");
        }

        function formatRebirthStatBonus(stat, value) {
            const statLabels = { hp: "HP", damage: "공격", speed: "속도", defense: "방어력" };
            return `${statLabels[stat] ?? stat} +${value}`;
        }

        function setMonsterFilter(filterId) {
            if (filterId) state.filters.monsters = filterId;
        }

        function selectCollectionMonster(monsterId) {
            const item = state.monsterCodexItems.find((monster) => monster.id === monsterId);
            if (state.selectedMonsterId !== monsterId) {
                state.selectedMonsterRegionId =
                    item?.regions.find((region) => region.isDiscovered)?.id ?? item?.regions[0]?.id ?? null;
            }
            state.selectedMonsterId = monsterId;
        }

        function closeCollectionMonsterDetail() {
            state.selectedMonsterId = null;
            state.selectedMonsterRegionId = null;
        }

        function selectedMonsterRegion(item) {
            return (
                item?.regions.find((region) => region.id === state.selectedMonsterRegionId) ?? item?.regions[0] ?? null
            );
        }

        function revealActiveTab() {
            requestAnimationFrame(() => {
                const activeTab = dialogElement.querySelector(".ch-tab.active");
                if (activeTab) activeTab.scrollIntoView({ block: "nearest", inline: "nearest" });
            });
        }

        function getGameActionBridge() {
            return Alpine.store("uiManager")?.requireGameActionBridge?.() ?? null;
        }

        function stopElementalistVfxPreview() {
            getGameActionBridge()?.stopDebugElementalistVfxPreview?.();
        }

        function restartElementalistVfxPreview() {
            requestAnimationFrame(() => {
                if (!state.visible || state.activeTab !== "developer" || !state.developer.active) return;
                const canvas = dialogElement?.querySelector("[data-elementalist-vfx-preview]");
                if (!canvas) return;
                getGameActionBridge()?.startDebugElementalistVfxPreview?.(
                    canvas,
                    state.developer.elementalistPreviewId
                );
            });
        }

        function triggerOrRestartElementalistVfxPreview() {
            if (state.developer.elementalistPreviewId === "wet") {
                getGameActionBridge()?.triggerDebugElementalistWetPreview?.();
                return;
            }
            restartElementalistVfxPreview();
        }

        function observeTabLayout() {
            tabResizeObserver = new ResizeObserver(revealActiveTab);
            tabResizeObserver.observe(dialogElement);
        }

        function stopObservingTabLayout() {
            tabResizeObserver.disconnect();
            tabResizeObserver = null;
        }

        function syncDeveloperTarget() {
            const target = state.rosterItems.find((item) => item.id === state.developer.targetCharacterId);
            state.developer.rebirthCount = target?.rebirth?.rebirthCount ?? 0;
        }

        function syncDeveloperEventSelection() {
            const requiresEliteCombination =
                state.developer.huntingEventType === "elite_mob" || state.developer.huntingEncounterType === "elite";
            if (!requiresEliteCombination) return;
            const selected =
                state.developer.eliteCombinations.find(
                    (combination) => combination.id === state.developer.eliteCombinationId
                ) ?? state.developer.eliteCombinations[0];
            if (!selected) return;
            state.developer.eliteCombinationId = selected.id;
            state.developer.huntingFloor = Math.max(Number(state.developer.huntingFloor) || 1, selected.minimumFloor);
        }

        function cancelDebugModeHold() {
            if (debugModeHoldTimerId !== null) clearTimeout(debugModeHoldTimerId);
            debugModeHoldTimerId = null;
            state.debugModeHoldActive = false;
        }

        function startDebugModeHold(event) {
            if (event.pointerType === "mouse" && event.button !== 0) return;
            cancelDebugModeHold();
            state.debugModeHoldActive = true;
            debugModeHoldTimerId = setTimeout(() => {
                debugModeHoldTimerId = null;
                state.debugModeHoldActive = false;
                const result = this.bridge.enterDebugMode();
                if (result.ok) setCollectionTab("developer");
            }, DEBUG_MODE_HOLD_DURATION_MS);
        }

        return {
            state,
            init() {
                dialogElement = this.$root;
                observeTabLayout();
            },
            destroy() {
                cancelDebugModeHold();
                stopElementalistVfxPreview();
                stopObservingTabLayout();
                dialogElement = null;
            },
            closeCollectionHub,
            setCollectionTab,
            setCodexSection,
            setCollectionFilter,
            selectCollectionCharacter,
            closeCollectionCharacterDetail,
            openCharacterRebirth,
            formatRebirthCardEffect,
            formatRebirthStatBonus,
            setMonsterFilter,
            selectCollectionMonster,
            closeCollectionMonsterDetail,
            selectedMonsterRegion,
            syncDeveloperTarget,
            syncDeveloperEventSelection,
            restartElementalistVfxPreview,
            triggerOrRestartElementalistVfxPreview,
            revealActiveTab,
            startDebugModeHold,
            cancelDebugModeHold,
            get bridge() {
                return Alpine.store("uiManager").requireGameActionBridge();
            },
            async openChest(item) {
                if (item.canOpen) {
                    await Alpine.store("uiManager").invokeGameAction("openChest", item.id);
                }
            },
            beginRebirth(characterId) {
                return this.bridge.beginRebirth(characterId);
            },
            completeRebirth(characterId, cardId) {
                return this.bridge.completeRebirth(characterId, cardId);
            },
            toggleRebirthCardEquip(characterId, cardId) {
                return this.bridge.toggleRebirthCardEquip(characterId, cardId);
            },
            syncDebugModeFromSearch() {
                if ((state.searchQueries.roster || "").trim() !== "디버그") return;
                const result = this.bridge.enterDebugMode();
                if (result.ok) setCollectionTab("developer");
            },
            setDebugCharacterToMaxLevel() {
                return this.bridge.setDebugCharacterToMaxLevel(state.developer.targetCharacterId);
            },
            setDebugRebirthCount() {
                return this.bridge.setDebugRebirthCount(
                    state.developer.targetCharacterId,
                    state.developer.rebirthCount
                );
            },
            setDebugHiddenCharacterUnlocked(unlocked) {
                return this.bridge.setDebugHiddenCharacterUnlocked(
                    state.developer.targetCharacterId,
                    Boolean(unlocked)
                );
            },
            recordDebugTournamentWin() {
                return this.bridge.recordDebugTournamentWin(state.developer.targetCharacterId);
            },
            seedDebugCollectionSample() {
                return this.bridge.seedDebugCollectionSample(state.developer.targetCharacterId);
            },
            startDebugHunting() {
                return this.bridge.startDebugHunting(
                    state.developer.targetCharacterId,
                    state.developer.huntingStageId,
                    state.developer.huntingFloor
                );
            },
            startDebugHuntingEvent() {
                syncDeveloperEventSelection();
                return this.bridge.startDebugHuntingEvent(
                    state.developer.targetCharacterId,
                    state.developer.huntingStageId,
                    state.developer.huntingFloor,
                    state.developer.huntingEventType,
                    state.developer.eliteCombinationId
                );
            },
            startDebugHuntingEncounter() {
                syncDeveloperEventSelection();
                return this.bridge.startDebugHuntingEncounter(
                    state.developer.targetCharacterId,
                    state.developer.huntingStageId,
                    state.developer.huntingFloor,
                    state.developer.huntingEncounterType,
                    state.developer.eliteCombinationId
                );
            },
            exitDebugMode() {
                stopElementalistVfxPreview();
                const result = this.bridge.exitDebugMode();
                if (result.ok) {
                    state.searchQueries.roster = "";
                    state.activeTab = "roster";
                }
                return result;
            },
            render(vm) {
                state.rosterItems = vm.rosterItems ?? [];
                state.monsterCodexItems = vm.monsterCodexItems ?? [];
                state.masteryItems = vm.masteryItems ?? [];
                state.achievementItems = vm.achievementItems ?? [];
                state.equipment = vm.equipment ?? {
                    items: [],
                    enhancementStones: 0,
                    inventoryUsed: 0,
                    inventorySlots: 5,
                    fusion: { sourceItemCount: 3, recipes: [] },
                    equippedSlots: {}
                };
                state.storage = vm.storage ?? {
                    shards: 0,
                    chests: [],
                    stats: {},
                    consumables: [],
                    huntingConsumableUseLimitUpgrade: null
                };
                state.summary = vm.summary ?? {};
                const developer = vm.developer ?? {};
                const targetCharacterId = state.rosterItems.some(
                    (item) => item.id === state.developer.targetCharacterId
                )
                    ? state.developer.targetCharacterId
                    : (developer.currentCharacterId ?? state.rosterItems[0]?.id ?? null);
                const target = state.rosterItems.find((item) => item.id === targetCharacterId);
                const eliteCombinations = developer.eliteCombinations ?? [];
                const eliteCombinationId = eliteCombinations.some(
                    (combination) => combination.id === state.developer.eliteCombinationId
                )
                    ? state.developer.eliteCombinationId
                    : (eliteCombinations[0]?.id ?? null);
                const encounters = developer.encounters ?? [];
                const huntingEncounterType = encounters.some(
                    (encounter) => encounter.id === state.developer.huntingEncounterType
                )
                    ? state.developer.huntingEncounterType
                    : (encounters[0]?.id ?? "normal");
                const elementalistPreviewOptions = developer.active
                    ? (this.bridge.getDebugElementalistVfxPreviewOptions?.() ?? [])
                    : [];
                const elementalistPreviewId = elementalistPreviewOptions.some(
                    (option) => option.id === state.developer.elementalistPreviewId
                )
                    ? state.developer.elementalistPreviewId
                    : "single:fire";
                state.developer = {
                    active: Boolean(developer.active),
                    currentCharacterId: developer.currentCharacterId ?? null,
                    targetCharacterId,
                    rebirthCount: target?.rebirth?.rebirthCount ?? 0,
                    huntingStageId: state.developer.huntingStageId ?? developer.stages?.[0]?.id ?? "cave",
                    huntingFloor: state.developer.huntingFloor ?? 1,
                    maxFloor: developer.maxFloor ?? 100,
                    stages: developer.stages ?? [],
                    huntingEncounterType,
                    encounters,
                    huntingEventType: state.developer.huntingEventType ?? developer.events?.[0]?.id ?? "portal",
                    events: developer.events ?? [],
                    eliteCombinationId,
                    eliteCombinations,
                    elementalistPreviewId,
                    elementalistPreviewOptions
                };
                syncDeveloperEventSelection();
                state.tabs = vm.tabs ?? [];
                if (!state.tabs.some((tab) => tab.id === state.activeTab)) setCollectionTab("roster");
            },
            open(tabId) {
                state.visible = true;
                state.activeTab = tabId || "roster";
                focusDialog();
                if (state.activeTab === "developer") restartElementalistVfxPreview();
            },
            close() {
                closeCollectionHub();
            }
        };
    });
