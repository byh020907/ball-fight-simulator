<div
    x-data="rebirthPicker"
    class="bf-popup-overlay"
    x-show="visible"
    x-transition.opacity.duration.200ms
    role="dialog"
    aria-modal="true"
    aria-label="환생 카드 선택"
    tabindex="-1"
    @keydown.escape.stop
>
    <div class="bf-popup-card">
        <div class="bf-popup-scroll">
            <strong class="bf-popup-title">환생 카드 선택</strong>
            <div class="rebirth-picker-cards">
                <template x-for="(card, index) in cards" :key="card.id">
                    <button class="rebirth-picker-card" type="button" @click="pickCard(index)">
                        <small x-text="card.categoryLabel"></small>
                        <strong x-text="card.name"></strong>
                        <span x-text="card.description"></span>
                        <em x-text="card.effectText"></em>
                    </button>
                </template>
            </div>
        </div>
    </div>
</div>

<script>
    window.createGameUI("rebirthPicker", () => {
        let resolveSelection = null;
        let dialogElement = null;

        function focusDialog() {
            requestAnimationFrame(() => dialogElement.focus());
        }

        return {
            visible: false,
            cards: [],
            init() {
                dialogElement = this.$root;
            },
            pickCard(index) {
                this.visible = false;
                this.cards = [];
                if (!resolveSelection) return;
                const resolve = resolveSelection;
                resolveSelection = null;
                resolve(index);
            },
            show(cards) {
                if (resolveSelection) {
                    const resolve = resolveSelection;
                    resolveSelection = null;
                    resolve(-1);
                }
                return new Promise((resolve) => {
                    resolveSelection = resolve;
                    this.cards = cards.map((card) => ({
                        id: card.id,
                        categoryLabel: card.categoryLabel,
                        name: card.name,
                        description: card.description,
                        effectText: card.effectText
                    }));
                    this.visible = this.cards.length > 0;
                    if (this.visible) focusDialog();
                });
            }
        };
    });
</script>
