<div x-data="battleLog" id="battleLog">
    <template x-for="(item, index) in state.items" :key="index">
        <li x-text="item"></li>
    </template>
</div>
<script>
    Alpine.data("battleLog", () => {
        const state = Alpine.reactive({
            items: []
        });
        return {
            state,
            init() {
                this.$watch("$store.battleLog", (val) => {
                    if (!val) return;
                    state.items = val.items ? [...val.items] : [];
                }, { immediate: true });
            }
        };
    });
</script>
