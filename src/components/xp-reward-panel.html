<div x-data="xpRewardPanel" class="xp-reward" x-show="state.visible" x-bind:class="{ levelup: state.levelUp }">
    <div class="xp-reward-head">
        <span x-text="state.characterName"></span>
        <b x-text="'+' + state.xpGained + ' XP'"></b>
    </div>
    <div class="xp-reward-level">
        <strong x-text="state.levelLabel"></strong>
        <em x-show="state.levelUp">LEVEL UP</em>
    </div>
    <xp-progress-bar></xp-progress-bar>
    <div class="xp-reward-foot">
        <span x-text="state.progressText"></span>
        <span x-text="state.nextText"></span>
    </div>
    <div class="xp-reward-next" x-show="state.nextRewardText" x-text="'다음 보상 · ' + state.nextRewardText"></div>
</div>
<script>
    Alpine.data("xpRewardPanel", () => {
        const state = Alpine.reactive({
            visible: false,
            characterName: "",
            xpGained: 0,
            levelLabel: "Lv.1",
            levelUp: false,
            progressText: "",
            nextText: "",
            nextRewardText: ""
        });

        let _token = null;

        function startAnimation(val) {
            const startPct = Math.max(0, Math.min(100, val.progressBeforePct ?? 0));
            const endPct = Math.max(0, Math.min(100, val.progressAfterPct ?? 0));
            const token = `${Date.now()}-${Math.random()}`;
            _token = token;
            Alpine.store("xpReward").animatedProgressPct = startPct;

            setTimeout(() => {
                if (_token !== token) return;
                Alpine.store("xpReward").animatedProgressPct = val.levelUp ? 100 : endPct;
            }, 16);

            if (val.levelUp) {
                setTimeout(() => {
                    if (_token !== token) return;
                    state.levelLabel = val.nextLevelLabel ?? `Lv.${val.level ?? 1}`;
                    Alpine.store("xpReward").animatedProgressPct = 0;
                    setTimeout(() => {
                        if (_token !== token) return;
                        Alpine.store("xpReward").animatedProgressPct = endPct;
                    }, 40);
                }, 760);
            }
        }

        return {
            state,
            init() {
                this.$watch("$store.xpReward", (val) => {
                    if (!val) return;
                    if (!val.visible) {
                        state.visible = false;
                        return;
                    }
                    state.characterName = val.characterName ?? "";
                    state.xpGained = val.xpGained ?? 0;
                    state.levelLabel = val.levelLabel ?? "Lv.1";
                    state.levelUp = Boolean(val.levelUp);
                    state.progressText = val.progressText ?? "";
                    state.nextText = val.nextText ?? "";
                    state.nextRewardText = val.nextRewardText ?? "";
                    state.visible = true;
                    startAnimation(val);
                }, { immediate: true });
            }
        };
    });
</script>

.xp-reward-level,
.xp-reward-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}

.xp-reward-head span,
.xp-reward-foot span,
.xp-reward-next {
    min-width: 0;
    font-size: 0.76rem;
    font-weight: 800;
    color: #555555;
}

.xp-reward-head b {
    flex: 0 0 auto;
    font-size: 1rem;
    color: #0a8d32;
}

.xp-reward-level strong {
    font-size: 1.08rem;
    letter-spacing: 0;
}

.xp-reward-level em {
    flex: 0 0 auto;
    border: 2px solid #202020;
    background: #ffcb3d;
    color: #202020;
    padding: 3px 7px;
    font-style: normal;
    font-size: 0.68rem;
    font-weight: 900;
}

.levelup .xp-bar-fill {
    background: linear-gradient(90deg, #0a8d32, #ffcb3d);
}
</style>
