<div
    x-data="xpRewardPanel($el.parentElement?.dataset.componentId)"
    class="xp-reward"
    x-show="visible"
    x-bind:class="{ levelup: levelUp, 'bar-resetting': barResetting }"
>
    <div class="xp-reward-head">
        <span x-text="'획득 경험치 · ' + characterName"></span>
        <b x-text="'+' + xpGained + ' XP'"></b>
    </div>
    <div class="xp-reward-level">
        <strong x-text="levelLabel"></strong>
        <em x-show="levelUp">LEVEL UP</em>
    </div>
    <xp-progress-bar></xp-progress-bar>
    <div class="xp-reward-foot">
        <span x-text="progressText"></span>
        <span x-text="nextText"></span>
    </div>
    <div class="xp-reward-earned" x-show="earnedRewardText && levelUp" x-text="'획득 보상 · ' + earnedRewardText"></div>
    <div class="xp-reward-next" x-show="nextRewardText" x-text="'다음 보상 · ' + nextRewardText"></div>
</div>
<script>
    window.createGameUI("xpRewardPanel", () => {
        let _token = null;

        function startAnimation(val) {
            const startPct = Math.max(0, Math.min(100, val.progressBeforePct ?? 0));
            const endPct = Math.max(0, Math.min(100, val.progressAfterPct ?? 0));
            const token = `${Date.now()}-${Math.random()}`;
            _token = token;
            this.levelUp = false;
            this.barResetting = true;
            this.levelLabel = val.levelUp ? val.previousLevelLabel ?? "Lv.1" : val.levelLabel ?? "Lv.1";
            this.animatedProgressPct = startPct;

            setTimeout(() => {
                if (_token !== token) return;
                this.barResetting = false;
                this.animatedProgressPct = val.levelUp ? 100 : endPct;
            }, 16);

            if (val.levelUp) {
                setTimeout(() => {
                    if (_token !== token) return;
                    this.levelLabel = val.nextLevelLabel ?? `Lv.${val.level ?? 1}`;
                    this.levelUp = true;
                    this.barResetting = true;
                    this.progressText = val.progressText ?? "";
                    this.nextText = val.nextText ?? "";
                    this.earnedRewardText = val.earnedRewardText ?? "";
                    this.nextRewardText = val.nextRewardText ?? "";
                    this.animatedProgressPct = 0;
                    setTimeout(() => {
                        if (_token !== token) return;
                        this.barResetting = false;
                        this.animatedProgressPct = endPct;
                    }, 40);
                }, 760);
            }
        }

        return {
            visible: false,
            characterName: "",
            xpGained: 0,
            previousLevelLabel: "Lv.1",
            levelLabel: "Lv.1",
            levelUp: false,
            barResetting: false,
            animatedProgressPct: 0,
            progressText: "",
            nextText: "",
            earnedRewardText: "",
            nextRewardText: "",
            animate(val) {
                if (!val) {
                    this.reset();
                    return;
                }
                this.characterName = val.characterName ?? "";
                this.xpGained = val.xpGained ?? 0;
                this.previousLevelLabel = val.previousLevelLabel ?? "Lv.1";
                this.levelLabel = this.previousLevelLabel;
                this.levelUp = false;
                this.barResetting = false;
                this.progressText = val.levelUp ? val.previousProgressText ?? "" : val.progressText ?? "";
                this.nextText = val.levelUp ? val.previousNextText ?? "" : val.nextText ?? "";
                this.earnedRewardText = val.levelUp ? "" : val.earnedRewardText ?? "";
                this.nextRewardText = val.levelUp ? val.previousNextRewardText ?? "" : val.nextRewardText ?? "";
                this.visible = true;
                startAnimation.call(this, val);
            },
            hide() {
                this.reset();
            },
            reset() {
                _token = null;
                this.visible = false;
                this.characterName = "";
                this.xpGained = 0;
                this.previousLevelLabel = "Lv.1";
                this.levelLabel = "Lv.1";
                this.levelUp = false;
                this.barResetting = false;
                this.animatedProgressPct = 0;
                this.progressText = "";
                this.nextText = "";
                this.earnedRewardText = "";
                this.nextRewardText = "";
            }
        };
    });
</script>
<style scoped>
:scope {
    width: 100%;
    max-width: 100%;
    min-width: 0;
    box-sizing: border-box;
    display: grid;
    gap: 8px;
    margin: 18px auto 0;
    padding: 14px 16px;
    border: 2px solid #202020;
    background: #ffffff;
    box-shadow: 4px 4px 0 #202020;
    color: #202020;
    text-align: left;
}

.xp-reward-head,
.xp-reward-level,
.xp-reward-foot {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}

.xp-reward-head span,
.xp-reward-foot span,
.xp-reward-earned,
.xp-reward-next {
    min-width: 0;
    font-size: 0.76rem;
    font-weight: 800;
    color: #555555;
    line-height: 1.35;
    overflow-wrap: anywhere;
}

.xp-reward-head span,
.xp-reward-foot span {
    flex: 1 1 auto;
}

.xp-reward-earned {
    color: #0a8d32;
}

.xp-reward-head b {
    flex: 0 0 auto;
    font-size: 1.35rem;
    color: #0a8d32;
}

.xp-reward-level strong {
    font-size: 1.3rem;
    letter-spacing: 0;
}

.xp-reward-level em {
    flex: 0 0 auto;
    border: 2px solid #202020;
    background: #ffcb3d;
    color: #202020;
    padding: 3px 7px;
    font-style: normal;
    font-size: 0.68rem;
    font-weight: 900;
}

:scope.bar-resetting .xp-bar-fill {
    transition: none;
}

:scope.levelup .xp-bar-fill {
    background: linear-gradient(90deg, #0a8d32, #ffcb3d);
}

:scope.levelup .xp-reward-level strong {
    animation: xp-reward-level-pop 420ms cubic-bezier(0.2, 1.3, 0.35, 1) both;
}

:scope.levelup .xp-reward-level em {
    animation: xp-reward-level-badge 360ms ease-out both;
}

@keyframes xp-reward-level-pop {
    0% {
        color: #0a8d32;
        transform: scale(0.82);
    }
    65% {
        transform: scale(1.18);
    }
    100% {
        color: #202020;
        transform: scale(1);
    }
}

@keyframes xp-reward-level-badge {
    0% {
        opacity: 0;
        transform: translateY(6px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
