<div
    x-data="patchNotes"
    class="patch-overlay"
    x-show="visible"
    x-transition.opacity.duration.200ms
    role="dialog"
    aria-modal="true"
    aria-label="패치노트"
    tabindex="-1"
    @click.self="dismissNotes()"
    @keydown.escape="dismissNotes()"
>
    <div class="patch-card">
        <div class="patch-card-scroll">
            <template x-for="(entry, eIdx) in entries" :key="entry.version">
                <div>
                    <strong class="patch-title" x-text="entry.title"></strong>
                    <span class="patch-date" x-text="entry.date"></span>
                    <ul class="patch-list">
                        <template x-for="item in entry.changes" :key="item.text">
                            <li>
                                <span
                                    class="patch-badge"
                                    x-bind:class="'patch-badge--' + item.type"
                                    x-text="item.type"
                                ></span>
                                <span x-text="item.text"></span>
                            </li>
                        </template>
                    </ul>
                    <hr class="patch-divider" x-show="eIdx < entries.length - 1" />
                </div>
            </template>
        </div>
        <button class="patch-dismiss" type="button" @click="dismissNotes()">확인</button>
    </div>
</div>

<script>
    window.createGameUI("patchNotes", () => {
        let dialogElement = null;

        function focusDialog() {
            requestAnimationFrame(() => dialogElement.focus());
        }

        function dismissNotes() {
            this.visible = false;
            this.entries = [];
            if (typeof window.__dismissPatchNotes === "function") window.__dismissPatchNotes();
        }

        return {
            visible: false,
            entries: [],
            init() {
                dialogElement = this.$root;
            },
            dismissNotes,
            show(entries) {
                this.entries = entries;
                this.visible = true;
                focusDialog();
            }
        };
    });
</script>
