<div
    x-data="actionPicker"
    class="bf-popup-overlay"
    x-show="visible"
    x-transition.opacity.duration.200ms
    @pick-action="handlePickAction($event.detail.index)"
>
    <div class="bf-popup-card">
        <div class="bf-popup-scroll">
            <strong class="bf-popup-title">매치 액션 선택</strong>
            <p class="action-picker-desc">전투 중 클릭하여 발동하세요</p>
            <div class="action-cards">
                <template x-for="(card, index) in cards" :key="card.id">
                    <button class="action-card" type="button" @click="$dispatch('pick-action', { index })">
                        <strong x-text="card.name"></strong>
                        <span x-text="card.description"></span>
                        <small x-text="'HP ' + card.hpCost + '% 소모'"></small>
                    </button>
                </template>
            </div>
        </div>
    </div>
</div>

<script>
    window.createGameUI("actionPicker", () => {
        let _resolve = null;

        return {
            visible: false,
            cards: [],
            handlePickAction(index) {
                this.visible = false;
                const cards = this.cards;
                this.cards = [];
                if (_resolve) {
                    const r = _resolve;
                    _resolve = null;
                    r(index);
                }
            },
            show(cards) {
                if (_resolve) {
                    const r = _resolve;
                    _resolve = null;
                    r(-1);
                }
                return new Promise((resolve) => {
                    _resolve = resolve;
                    this.cards = cards.map((c) => ({
                        id: c.id,
                        name: c.name,
                        description: c.description,
                        hpCost: c.hpCostPercent
                    }));
                    this.visible = this.cards.length > 0;
                });
            }
        };
    });
</script>
